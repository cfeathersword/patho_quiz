<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathophysiology Practice Exam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #5a5a56; --text3: #999994;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb; --blue-text: #185fa5; --blue-border: #b5d4f4;
    --green-bg: #eaf3de; --green-text: #3b6d11; --green-border: #c0dd97;
    --amber-bg: #faeeda; --amber-text: #854f0b; --amber-border: #fac775;
    --correct-bg: #eaf3de; --correct-border: #639922; --correct-text: #27500a;
    --wrong-bg: #fcebeb; --wrong-border: #a32d2d; --wrong-text: #501313;
    --accent: #1D9E75;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2e2e2b;
      --text: #f0ede6; --text2: #aaa89f; --text3: #6b6965;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-bg: #042c53; --blue-text: #85b7eb; --blue-border: #185fa5;
      --green-bg: #173404; --green-text: #97c459; --green-border: #3b6d11;
      --amber-bg: #412402; --amber-text: #fac775; --amber-border: #854f0b;
      --correct-bg: #173404; --correct-border: #639922; --correct-text: #c0dd97;
      --wrong-bg: #501313; --wrong-border: #a32d2d; --wrong-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; padding: 2rem 0 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .type-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  margin-bottom: 4px;
}
.type-btn {
  padding: 5px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
}
.type-btn:hover { background: var(--border); color: var(--text); }
.type-btn.active { background: #2d6a4f; color: #fff; border-color: #2d6a4f; font-weight: 600; }

.topic-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .topic-btn { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .topic-btn:hover { background: var(--bg2); }
  .topic-btn.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .score-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; min-height: 24px; }
  .score-pill { font-size: 13px; color: var(--text2); }
  .score-pill span { font-weight: 600; color: var(--text); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-num { font-size: 12px; color: var(--text3); }
  .q-type { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em; }
  .type-MCQ { background: var(--blue-bg); color: var(--blue-text); }
  .type-SAQ { background: var(--green-bg); color: var(--green-text); }
  .type-LAQ { background: var(--amber-bg); color: var(--amber-text); }
  .question { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.65; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .opt { padding: 11px 14px; border: 0.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text); background: var(--bg); transition: all 0.15s; text-align: left; font-family: inherit; line-height: 1.5; }
  .opt:hover:not(:disabled) { background: var(--bg2); border-color: var(--border2); }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); font-weight: 500; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }
  .opt:disabled { cursor: default; }
  .answer-box { background: var(--bg2); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; font-size: 14px; color: var(--text); line-height: 1.75; margin-bottom: 1.25rem; display: none; }
  .answer-box.show { display: block; }
  .answer-box strong { color: var(--accent); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 9px 20px; border: 0.5px solid var(--border2); border-radius: 10px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 10px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--bg2); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 600; color: var(--text); }
  .topic-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg3); color: var(--text3); display: inline-block; margin-bottom: 8px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  footer { text-align: center; padding: 2rem 0 1rem; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Pathophysiology Practice Exam</h1>
    <p>MCQ · Short Answer · Long Answer — all topics</p>
  </header>

  <div class="card">
    <div class="section-label">Filter by topic &amp; type</div>
    <div class="topic-nav" id="topicNav"></div>
    <div class="type-nav" id="typeNav">
      <button class="type-btn active" onclick="setType('All')">All types</button>
      <button class="type-btn" onclick="setType('MCQ')">MCQ</button>
      <button class="type-btn" onclick="setType('SAQ')">SAQ</button>
      <button class="type-btn" onclick="setType('LAQ')">LAQ</button>
    </div>

    <div class="stats-grid" id="statsGrid" style="display:none"></div>
    <div class="score-bar" id="scoreBar"></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

    <div class="q-meta">
      <span class="q-num" id="qNum"></span>
      <span class="q-type" id="qType"></span>
    </div>
    <div class="topic-tag" id="qTopic"></div>
    <div class="question" id="qText"></div>
    <div class="options" id="opts"></div>
    <div class="answer-box" id="answerBox"></div>
    <div class="btn-row">
      <button class="btn" id="revealBtn" onclick="reveal()">Show answer</button>
      <button class="btn btn-primary" onclick="next()">Next question →</button>
      <button class="btn" onclick="shuffle()">Shuffle</button>
      <button class="btn" onclick="resetStats()">Reset score</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <footer>Offline quiz — all content from your Pathophysiology lecture slides.</footer>
</div>

<script>
const QUESTIONS = [

  // ── CNS ──
  // MCQ
  {topic:"CNS", type:"MCQ",
   q:"Which pathological hallmarks are characteristic of Alzheimer's disease?",
   opts:["Lewy bodies and dopamine loss","Neurofibrillary tangles and β-amyloid plaques","Demyelination and gliosis","Prion aggregates and cortical thinning"], ans:1,
   explain:"Alzheimer's is defined by intracellular neurofibrillary tangles (from altered tau protein) and extracellular β-amyloid (senile) plaques, leading to neuronal loss and cortical atrophy."},
  {topic:"CNS", type:"MCQ",
   q:"In Parkinson's disease, which pathway degenerates to produce motor deficits?",
   opts:["Corticospinal tract","Nigrostriatal pathway","Spinocerebellar tract","Limbic pathway"], ans:1,
   explain:"Loss of dopamine-producing neurons in the substantia nigra leads to degeneration of the nigrostriatal pathway, causing the cardinal features: tremor, rigidity, bradykinesia, and postural instability."},
  {topic:"CNS", type:"MCQ",
   q:"An absence seizure typically lasts:",
   opts:["30–60 seconds","1–5 minutes","5–10 seconds","10–15 seconds"], ans:2,
   explain:"Absence seizures last approximately 5–10 seconds, characterised by cessation of activity and loss of awareness without falling."},
  {topic:"CNS", type:"MCQ",
   q:"Which type of dementia is associated with prion particles and is rapidly fatal after symptoms appear?",
   opts:["Vascular dementia","Alcohol-related dementia","Creutzfeldt-Jakob dementia","Fronto-temporal lobar degeneration"], ans:2,
   explain:"Creutzfeldt-Jakob disease is caused by prion particles. It presents with dementia, behavioural and motor changes, and death occurs soon after symptoms become apparent."},
  {topic:"CNS", type:"MCQ",
   q:"Which disorder is a warning sign for future stroke?",
   opts:["TIA","Angina","DVT","Varicose veins"], ans:0,
   explain:"A transient ischaemic attack (TIA) causes temporary neurological symptoms from focal brain ischaemia, resolving within 24 hours. It is a major warning sign of impending stroke and requires urgent investigation and management."},
  {topic:"CNS", type:"MCQ",
   q:"What protein forms the core of Lewy bodies in Parkinson's disease?",
   opts:["Tau","Alpha-synuclein","Haemoglobin","Fibrin"], ans:1,
   explain:"Lewy bodies — the pathological hallmark of Parkinson's disease — are intracytoplasmic inclusions composed primarily of alpha-synuclein protein aggregates found in dopaminergic neurons of the substantia nigra."},
  {topic:"CNS", type:"MCQ",
   q:"What does the acronym TRAP represent in Parkinson's disease?",
   opts:["Tremor, Rigidity, Akinesia, Postural instability","Tension, Rest, Ataxia, Pain","Tachycardia, Rash, Anuria, Pallor","Thrombus, Rupture, Arrhythmia, Pressure"], ans:0,
   explain:"TRAP summarises the four cardinal features of Parkinson's disease: Tremor (resting), Rigidity (lead-pipe/cogwheel), Akinesia/Bradykinesia (slowness), and Postural instability."},
  {topic:"CNS", type:"MCQ",
   q:"What is the hallmark lesion of Alzheimer's disease?",
   opts:["Plaques and tangles","Thrombi","Aneurysms","Calcifications"], ans:0,
   explain:"Alzheimer's is defined by two pathological hallmarks: extracellular β-amyloid (senile) plaques and intracellular neurofibrillary tangles (from hyperphosphorylated tau protein), both leading to neuronal loss and cortical atrophy."},
  {topic:"CNS", type:"MCQ",
   q:"Which neurotransmitter is deficient in Parkinson's disease?",
   opts:["Serotonin", "Acetylcholine", "Dopamine", "GABA"], ans:2,
   explain:"Parkinson's results from loss of dopaminergic neurons in the substantia nigra (nigrostriatal pathway)."},
  {topic:"CNS", type:"MCQ",
   q:"Which histological hallmarks are characteristic of Alzheimer's disease?",
   opts:["Lewy bodies and plaques", "Beta-amyloid plaques and neurofibrillary tangles", "Demyelination and oligodendrocyte loss", "Caseous necrosis and granulomas"], ans:1,
   explain:"AD hallmarks: extracellular beta-amyloid plaques (from APP) + intracellular neurofibrillary tangles (tau)."},
  {topic:"CNS", type:"MCQ",
   q:"A patient has right-sided motor weakness and expressive aphasia after a stroke. Which hemisphere is affected?",
   opts:["Right hemisphere", "Left hemisphere", "Cerebellum", "Brainstem"], ans:1,
   explain:"Left hemisphere damage → right-sided motor deficit and language (aphasia) impairment."},
  {topic:"CNS", type:"MCQ",
   q:"Which diagnostic test is most critical in early stroke to differentiate ischaemic from haemorrhagic?",
   opts:["MRI", "CT scan", "EEG", "Lumbar puncture"], ans:1,
   explain:"CT is the key early test — essential because treating haemorrhagic as ischaemic (thrombolytics) can be fatal."},
  {topic:"CNS", type:"MCQ",
   q:"Multiple sclerosis involves demyelination primarily of:",
   opts:["Peripheral motor neurons", "White matter of brain and spinal cord", "Basal ganglia", "Neuromuscular junctions"], ans:1,
   explain:"MS causes demyelination in the CNS white matter, disrupting impulse conduction."},
  {topic:"CNS", type:"MCQ",
   q:"Which type of seizure involves rhythmic alternating contraction and relaxation of muscles?",
   opts:["Absence", "Myoclonic", "Tonic", "Clonic"], ans:3,
   explain:"Clonic phase = rhythmic contraction/relaxation. Tonic = sustained contraction. Absence = brief loss of awareness."},
  {topic:"CNS", type:"MCQ",
   q:"TIA differs from stroke in that:",
   opts:["TIA causes permanent neurological damage", "TIA symptoms resolve within ~24 hours", "TIA only occurs in haemorrhagic form", "TIA does not increase future stroke risk"], ans:1,
   explain:"TIA is a brief interruption resolving within ~24 hours; an important warning sign for stroke."},
  {topic:"CNS", type:"MCQ",
   q:"Which of the following is a hallmark feature of Parkinson's disease?",
   opts:["Ascending paralysis from lower limbs", "Resting tremor, rigidity, akinesia, and postural instability (TRAP)", "Symmetric joint inflammation with morning stiffness", "Loss of sensation in 'glove and stocking' distribution"], ans:1,
   explain:"Parkinson's TRAP mnemonic: Tremor (resting), Rigidity, Akinesia/bradykinesia, Postural instability."},
  // SAQ
  {topic:"CNS", type:"SAQ",
   q:"List four cardinal signs of Parkinson's disease and name two neurotransmitters impaired.",
   opts:null, ans:null,
   explain:"Cardinal signs: (1) Resting tremor, (2) Rigidity (lead-pipe/cogwheel), (3) Bradykinesia (slowness of movement), (4) Postural instability. Impaired neurotransmitters: Dopamine (reduced — primary deficit) and Acetylcholine (imbalanced relative to dopamine loss)."},
  {topic:"CNS", type:"SAQ",
   q:"Differentiate between ischaemic and haemorrhagic stroke, and define a transient ischaemic attack (TIA).",
   opts:null, ans:null,
   explain:"Ischaemic stroke: occlusion of a cerebral artery (thrombus or embolus) causing infarction; treated with thrombolytics (if within window) and antiplatelets. Haemorrhagic stroke: rupture of a cerebral vessel causing bleeding into brain tissue; thrombolytics are contraindicated; managed surgically and supportively. TIA: transient episode of neurological dysfunction from focal brain ischaemia, resolving within 24 hours (usually minutes), with no permanent infarction — a major warning sign of impending stroke."},
  {topic:"CNS", type:"SAQ",
   q:"List five risk factors for Alzheimer's disease.",
   opts:null, ans:null,
   explain:"(1) Advanced age, (2) Family history/genetic factors (e.g. APOE-ε4), (3) Female sex, (4) History of head trauma, (5) Cardiovascular risk factors (hypertension, diabetes, obesity), (6) Low educational attainment, (7) Depression."},
  // LAQ
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathophysiology of Alzheimer's disease including intracellular and extracellular changes, stages of clinical progression, and management.",
   opts:null, ans:null,
   explain:"Intracellular: altered tau protein → microtubule collapse → neurofibrillary tangles. Extracellular: secretases cleave amyloid precursor protein (APP) → β-amyloid fragments aggregate → senile (β-amyloid) plaques. Both pathways → oxidative stress, overstimulation of NMDA receptors (excitotoxicity), cholinergic dysfunction, neuronal loss, cortical atrophy, and neuroinflammation. Clinical stages: Mild — confusion, memory loss, depression, personality changes (managed with SSRIs, memory aids, NMDA antagonists, cholinesterase inhibitors). Moderate — ↓attention span, dyspraxia, incontinence, behavioural issues (managed with assisted care, continence aids, psychotropic agents). Severe — total dependence, vegetative state (total care). Alzheimer's represents 50–70% of all dementias."},
  // SAQ
  {topic:"CNS", type:"SAQ",
   q:"Define Alzheimer's disease. What are its two histological hallmarks and how do they cause neuronal loss?",
   explain:"Alzheimer's disease is a progressive, irreversible decline in cerebral function, particularly memory. The two hallmarks are: (1) Extracellular beta-amyloid plaques — formed from APP fragments, accumulate between neurons and disrupt synaptic signalling. (2) Intracellular neurofibrillary tangles — composed of hyperphosphorylated tau protein, collapse the neuron's internal transport system. Both trigger neuroinflammation and progressive neuronal loss, causing cerebral atrophy and ventricular enlargement."},
  {topic:"CNS", type:"SAQ",
   q:"List four signs and symptoms of Parkinson's disease (TRAP mnemonic).",
   explain:"TRAP: (1) Tremor at rest — unilateral initially, 'pill-rolling'. (2) Rigidity — cogwheel rigidity on passive movement. (3) Akinesia/bradykinesia — slowness and reduced movement initiation. (4) Postural instability — impaired balance, contributor to falls. Non-motor: masked facies, shuffling gait, drooling, constipation, reduced smell."},
  {topic:"CNS", type:"SAQ",
   q:"Name two types of cerebral stroke.",
   explain:"(1) Ischaemic stroke — arterial obstruction (thrombotic or embolic), causing infarction of brain tissue. (2) Haemorrhagic stroke — rupture of a cerebral vessel, causing bleeding, haematoma formation, and raised intracranial pressure."},
  {topic:"CNS", type:"SAQ",
   q:"List three clinical features of encephalitis that would prompt investigation.",
   explain:"(1) Altered level of consciousness or confusion. (2) High fever with headache. (3) Focal neurological deficits (e.g. seizures, weakness, cranial nerve palsy)."},
  {topic:"CNS", type:"SAQ",
   q:"Name three drug classes used in the management of epilepsy.",
   explain:"(1) Antiepileptics — e.g. carbamazepine, sodium valproate, phenytoin (long-term seizure control). (2) Benzodiazepines — e.g. diazepam (acute seizure termination, status epilepticus). (3) NMDA antagonists — used in some refractory cases."},

  // ── CVS ──
  // MCQ
  {topic:"CVS", type:"MCQ",
   q:"Ischaemic heart disease is primarily defined as:",
   opts:["Infection of the myocardium","Inadequate oxygen supply to the heart","Valve regurgitation","Arrhythmia reducing cardiac output"], ans:1,
   explain:"IHD is caused by inadequate oxygen supply to the myocardium, most commonly due to atherosclerotic narrowing of coronary arteries."},
  {topic:"CVS", type:"MCQ",
   q:"Which stage of plaque development involves foam cell formation and smooth muscle migration?",
   opts:["Endothelial cell injury","Migration of inflammatory cells","Lipid accumulation and smooth muscle proliferation","Fibrous cap formation"], ans:2,
   explain:"Stage 3 involves lipid (LDL) accumulation, foam cell formation (macrophages engulfing LDL), release of toxic oxygen species, and smooth muscle migration — the core of atherogenesis."},
  {topic:"CVS", type:"MCQ",
   q:"Left heart failure primarily causes:",
   opts:["Dependent oedema and liver congestion","Pulmonary oedema and decreased cardiac output","GI distress and ascites","Anorexia and weight loss"], ans:1,
   explain:"Left ventricular failure → pulmonary congestion → pulmonary oedema, orthopnoea, paroxysmal nocturnal dyspnoea, impaired gas exchange, and cyanosis."},
  {topic:"CVS", type:"MCQ",
   q:"Which of the following is a modifiable risk factor for hypertension?",
   opts:["Age","Family history","Obesity","Sex"], ans:2,
   explain:"Obesity is a modifiable risk factor. Age, family history, and sex (male) are non-modifiable risk factors for hypertension."},
  {topic:"CVS", type:"MCQ",
   q:"Which side of heart failure commonly causes pulmonary oedema?",
   opts:["Left","Right","Both","Neither"], ans:0,
   explain:"Left ventricular failure → reduced forward output → pulmonary venous congestion → pulmonary oedema, causing dyspnoea, orthopnoea, paroxysmal nocturnal dyspnoea, and impaired gas exchange."},
  {topic:"CVS", type:"MCQ",
   q:"Which type of MI is associated with ST elevation on ECG?",
   opts:["STEMI","NSTEMI","TIA","Angina"], ans:0,
   explain:"STEMI (ST-Elevation Myocardial Infarction) results from complete coronary occlusion causing transmural (full-thickness) infarction. It is distinguished from NSTEMI (partial occlusion, no persistent ST elevation) and is managed with urgent primary PCI or thrombolysis."},
  {topic:"CVS", type:"MCQ",
   q:"STEMI is characterised by which ECG change?",
   opts:["ST depression and T-wave inversion", "ST elevation and Q waves", "Prolonged PR interval", "Delta waves"], ans:1,
   explain:"STEMI: transmural infarction → ST elevation + Q waves. NSTEMI: ST depression/T inversion, no Q waves."},
  {topic:"CVS", type:"MCQ",
   q:"Which drug class is the mainstay of thrombolytic therapy in ischaemic stroke?",
   opts:["Beta-blockers", "ACE inhibitors", "Thrombolytics", "Diuretics"], ans:2,
   explain:"Thrombolytics are time-critical in ischaemic stroke to restore perfusion."},
  {topic:"CVS", type:"MCQ",
   q:"Right-sided heart failure characteristically causes:",
   opts:["Pulmonary oedema and dyspnoea", "Peripheral oedema, hepatomegaly, and JVD", "Orthopnoea and frothy pink sputum", "ST elevation on ECG"], ans:1,
   explain:"Right HF backs blood into systemic veins → peripheral oedema, hepatomegaly, jugular venous distension."},
  {topic:"CVS", type:"MCQ",
   q:"Which drug class is first-line to reduce preload in acute heart failure?",
   opts:["Beta-blockers", "ACE inhibitors", "Diuretics", "Antiplatelets"], ans:2,
   explain:"Diuretics (e.g. furosemide) reduce preload and oedema in heart failure."},
  {topic:"CVS", type:"MCQ",
   q:"Atherosclerosis begins with which event?",
   opts:["Platelet aggregation", "Calcification of the vessel wall", "Endothelial injury allowing LDL penetration", "Venous valve incompetence"], ans:2,
   explain:"Atherosclerosis: endothelial injury → LDL penetration → foam cells → necrotic core → fibrous cap."},
  {topic:"CVS", type:"MCQ",
   q:"Which angina type is caused by coronary artery vasospasm, typically at rest?",
   opts:["Stable angina", "Unstable angina", "Variant (Prinzmetal) angina", "Decubitus angina"], ans:2,
   explain:"Variant/Prinzmetal angina: vasospasm, occurs at rest, often nocturnal."},
  {topic:"CVS", type:"MCQ",
   q:"Primary hypertension accounts for approximately what percentage of cases?",
   opts:["5%", "25%", "50%", "95%"], ans:3,
   explain:"95% is primary (essential) hypertension — RAAS dysregulation; 5% is secondary (renal/hormonal)."},
  {topic:"CVS", type:"MCQ",
   q:"Cardiogenic shock occurs when approximately what percentage of myocardium is damaged?",
   opts:["10%", "20%", "40%", "60%"], ans:2,
   explain:"Cardiogenic shock: ~40% myocardial damage → ↓CO → ↓BP → anaerobic metabolism → vicious cycle."},
  {topic:"CVS", type:"MCQ",
   q:"In DVT (deep vein thrombosis), which three factors constitute Virchow's triad?",
   opts:["Hypertension, tachycardia, fever", "Venous stasis, hypercoagulability, endothelial injury", "Anaemia, thrombocytopenia, haemolysis", "Oliguria, haematuria, proteinuria"], ans:1,
   explain:"DVT risk: Virchow's triad — venous stasis, hypercoagulability, endothelial injury."},
  // SAQ
  {topic:"CVS", type:"SAQ",
   q:"Define atherosclerosis. List five major risk factors.",
   opts:null, ans:null,
   explain:"Atherosclerosis is progressive thickening and hardening of arterial walls due to lipid-laden plaque (atheroma) formation within the intima. Risk factors: (1) Hypercholesterolaemia/elevated LDL, (2) Hypertension, (3) Smoking, (4) Diabetes/metabolic disorders, (5) Ageing, (6) Family history, (7) Obesity, (8) Inflammation, (9) Oxidative stress."},
  {topic:"CVS", type:"SAQ",
   q:"List the differences between right and left heart failure.",
   opts:null, ans:null,
   explain:"Right heart failure: congestion of peripheral tissues → dependent oedema and ascites, liver congestion (signs of impaired liver function), GI tract congestion (anorexia, GI distress, weight loss). Left heart failure: decreased cardiac output (activity intolerance, signs of decreased tissue perfusion) and pulmonary congestion → impaired gas exchange (cyanosis, hypoxia), pulmonary oedema (cough with frothy sputum, orthopnoea, paroxysmal nocturnal dyspnoea)."},
  {topic:"CVS", type:"SAQ",
   q:"Name three types of angina and list five precipitating factors.",
   opts:null, ans:null,
   explain:"Types: (1) Stable angina – predictable, brought on by exertion, relieved by rest. (2) Unstable angina – unpredictable, occurs at rest, sign of impending MI. (3) Variant (Prinzmetal's) angina – caused by coronary artery spasm. Precipitating factors: physical exertion, emotional stress, cold weather, heavy meals, smoking, anaemia, tachycardia."},
  // LAQ
  {topic:"CVS", type:"LAQ",
   q:"Describe the pathophysiology, clinical evaluation, and management of STEMI.",
   opts:null, ans:null,

  {topic:"GI", type:"SAQ",
   q:"Describe the causes, complications, and management of GERD.",
   opts:null, ans:null,
   explain:"Causes: incompetent lower oesophageal sphincter (LOS), obesity, hiatus hernia, pregnancy, fatty/spicy foods, alcohol, smoking, lying flat after eating. Complications: oesophagitis, oesophageal stricture, Barrett's oesophagus (precancerous metaplasia), oesophageal adenocarcinoma. Management: lifestyle (weight loss, elevate head of bed, avoid triggers), antacids, H2 blockers (ranitidine), proton pump inhibitors (omeprazole — first line), surgical fundoplication for refractory cases."},
  {topic:"GI", type:"SAQ",
   q:"Describe the pathogenesis, diagnosis, and management of H. pylori-associated peptic ulcer disease.",
   opts:null, ans:null,
   explain:"Pathogenesis: H. pylori produces urease → ammonia → mucosal damage; triggers local inflammation; disrupts mucus layer and stimulates acid secretion → ulceration. Diagnosis: urea breath test (non-invasive, gold standard), stool antigen test, serology (IgG), endoscopy with CLO test/biopsy. Management: triple therapy — PPI + clarithromycin + amoxicillin (or metronidazole) for 7–14 days. Test for eradication 4–6 weeks after treatment."},
  // LAQ
  {topic:"GI", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of cirrhosis.",
   opts:null, ans:null,
   explain:"Causes: chronic viral hepatitis (HBV, HCV), alcohol abuse, NAFLD, autoimmune hepatitis. Pathophysiology: repeated hepatocyte injury → inflammation → stellate cell activation → fibrosis → disruption of normal liver architecture with regenerative nodules → portal hypertension. Histology: progressive stages — steatosis → hepatitis → fibrosis → cirrhosis → hepatocellular carcinoma. Signs/symptoms: fatigue, jaundice, ascites, oedema, spider naevi, palmar erythema, gynaecomastia, hepatic encephalopathy, coagulopathy. Investigations: LFTs (↑AST/ALT/bilirubin, ↓albumin), coagulation studies (↑PT), FBC, liver ultrasound, fibroscan (elastography), liver biopsy. Management: treat underlying cause (antivirals, alcohol cessation), low-sodium diet, diuretics (spironolactone + furosemide) for ascites, beta-blockers for portal hypertension, lactulose for encephalopathy, liver transplantation for end-stage disease."},
  // SAQ
  {topic:"GI", type:"SAQ",
   q:"Name three factors that cause GORD.",
   explain:"(1) Reduced lower oesophageal sphincter (LOS) tone — due to altered neuromuscular control. (2) Increased intra-abdominal pressure — from obesity, pregnancy, or straining. (3) Delayed gastric emptying — allows prolonged gastric distension and acid production."},
  {topic:"GI", type:"SAQ",
   q:"Define cirrhosis and list four complications.",
   explain:"Cirrhosis is extensive hepatic scarring with replacement of normal hepatocyte organisation by regenerative nodules. Complications: (1) Portal hypertension → oesophageal varices. (2) Hepatic encephalopathy — toxin accumulation causing confusion/coma. (3) Bacterial peritonitis — ascitic fluid infection. (4) Hepatocellular carcinoma — oncogene activation in dividing hepatocytes."},

  {topic:"Endocrine", type:"MCQ",

  // SAQ

  {topic:"MSK", type:"MCQ",

  // LAQ
  {topic:"MSK", type:"LAQ",
   q:"Describe the pathophysiology, signs and symptoms, investigations, and management of rheumatoid arthritis.",
   opts:null, ans:null,
   explain:"Pathophysiology: autoimmune activation (CD4+ T cells, B cells) → synovial membrane inflammation → pannus (vascular granulation tissue) formation → invasion and destruction of cartilage and bone. Pro-inflammatory cytokines (TNF-α, IL-1, IL-6) sustain the inflammatory cycle. Signs/symptoms: symmetrical joint pain and swelling (MCP, PIP, wrists, knees), morning stiffness >1 hour, systemic features (fatigue, fever, weight loss), extra-articular features (rheumatoid nodules, pulmonary fibrosis, vasculitis, Sjögren's overlap). Investigations: ESR and CRP ↑, rheumatoid factor (positive in ~70%), anti-CCP antibody (most specific), X-ray (periarticular osteoporosis, joint space narrowing, erosions), ultrasound/MRI for early synovitis. Management: DMARDs (methotrexate — first line), biological agents (anti-TNF: etanercept, adalimumab; anti-IL-6: tocilizumab), NSAIDs and corticosteroids (short-term), physiotherapy, occupational therapy, surgical joint replacement if severe."},
  // SAQ
  {topic:"MSK", type:"SAQ",
   q:"Describe the pathophysiology and clinical presentation of gout, and outline acute and long-term management.",
   opts:null, ans:null,
   explain:"Pathophysiology: hyperuricaemia (reduced renal excretion in >90%) → monosodium urate crystal deposition in joints and soft tissues → neutrophil-mediated inflammatory response (crystals activate NLRP3 inflammasome → IL-1β release) → intense acute arthritis. Crystals cannot be dissolved once formed. Clinical presentation: acute monoarthritis (podagra — 1st MTP joint in >50%), sudden onset of severe pain, erythema, warmth, swelling; self-limiting in 5–14 days. Chronic gout: tophi (crystal deposits in soft tissue), joint damage, renal stones. Management — Acute: NSAIDs (first-line), colchicine (inhibits neutrophil microtubule function), corticosteroids (if contraindications to NSAIDs). Long-term: allopurinol (xanthine oxidase inhibitor — reduces uric acid production), probenecid (uricosuric — increases renal excretion), dietary modification (avoid organ meats, shellfish, alcohol, fructose), adequate hydration."},

   q:"Describe the pathophysiology, signs and symptoms, and management of Duchenne Muscular Dystrophy (DMD).",
   opts:null, ans:null,
   explain:"Pathophysiology: X-linked mutation in the dystrophin gene (Xp21) → absent dystrophin protein → sarcolemmal membrane instability → uncontrolled calcium influx → proteolysis → muscle fibre necrosis → replacement by fibrous and fatty tissue. DMD has null mutations (no dystrophin); Becker MD has partial dystrophin (milder). Signs and symptoms: delayed motor milestones (late walking), frequent falls, Gowers' sign (using arms to stand from floor), pseudohypertrophy of calves (fat replaces muscle), waddling gait, progressive proximal weakness, cardiomyopathy, and respiratory failure (leading causes of death). Management: corticosteroids (prednisolone/deflazacort — slow muscle deterioration), physiotherapy, spinal bracing (scoliosis), non-invasive ventilation (respiratory failure), cardiac monitoring and ACE inhibitors (cardiomyopathy), gene therapy approaches (exon skipping — ataluren for nonsense mutations), multidisciplinary team care."},
  // LAQ
  {topic:"MSK", type:"LAQ",
   q:"Compare and contrast osteoarthritis, rheumatoid arthritis, and gout — including pathophysiology, joint distribution, morning stiffness, key investigations, and management principles.",
   opts:null, ans:null,
   explain:"Osteoarthritis — Pathophysiology: degenerative/mechanical; IL-1 and TNF-α activate MMPs → cartilage breakdown; cartilage fibrillation → clefts → eburnation; subchondral bone hypertrophies. Joint distribution: asymmetric; weight-bearing joints (knees, hips), DIP hands, spine. Morning stiffness: <15 minutes. Key investigations: X-ray (joint space narrowing, osteophytes, subchondral sclerosis); synovial fluid is non-inflammatory. Management: NSAIDs, weight loss, exercise, intra-articular corticosteroids, joint replacement. Rheumatoid Arthritis — Pathophysiology: autoimmune; CD4+ T cells attack synovium → macrophage activation → TNF-α, IL-1, RANK ligand → pannus formation → cartilage and bone erosion. Joint distribution: symmetric; small joints (MCP, PIP, wrists, feet). Morning stiffness: >1 hour. Key investigations: anti-CCP (~90% specific), rheumatoid factor, elevated ESR/CRP, X-ray (erosions, periarticular osteoporosis), ACR/EULAR score ≥6. Management: methotrexate (DMARD first-line), anti-TNF biologics (infliximab, adalimumab), corticosteroids, physiotherapy. Gout — Pathophysiology: metabolic; reduced renal uric acid excretion → hyperuricaemia → monosodium urate crystal deposition → neutrophil-mediated NLRP3 activation → acute inflammation. Joint distribution: monoarticular; 1st MTP (podagra) in >50%, then ankles, knees. Morning stiffness: not prominent. Key investigations: serum uric acid, arthrocentesis (needle-shaped, negatively birefringent crystals under polarising microscopy). Management: acute — NSAIDs, colchicine, corticosteroids; long-term — allopurinol, probenecid, dietary modification."},
  // SAQ
  {topic:"MSK", type:"SAQ",
   q:"Compare osteoarthritis, rheumatoid arthritis, and gout across four features.",
   explain:"(1) Type: OA = degenerative; RA = autoimmune; Gout = metabolic crystal deposition. (2) Joints: OA = weight-bearing (knees/hips) asymmetrically; RA = small joints (hands/wrists) symmetrically; Gout = 1st MTP joint. (3) Morning stiffness: OA = <15 min; RA = >1 hour; Gout = not a key feature. (4) Key marker: OA = X-ray joint space narrowing; RA = anti-CCP antibody; Gout = serum uric acid + crystal arthrocentesis."},
  {topic:"MSK", type:"SAQ",
   q:"List three risk factors for developing gout.",
   explain:"(1) Diet high in purines — organ meats, seafood, red wine, legumes. (2) Reduced renal excretion of uric acid — in >90% of gout patients; worsened by diuretics and chronic renal failure. (3) Male sex and older age — 5:1 male:female ratio; postmenopausal women lose oestrogen-mediated uricosuria."},

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  // SAQ
  {topic:"Reproductive", type:"SAQ",
   q:"Differentiate between primary and secondary dysmenorrhoea.",
   opts:null, ans:null,
   explain:"Primary dysmenorrhoea: painful menstruation without underlying pathology; caused by excess prostaglandin production → uterine contractions and ischaemia; treated with NSAIDs and OCP. Secondary dysmenorrhoea: painful menstruation due to an underlying pelvic condition (e.g. endometriosis, fibroids, adenomyosis, PID); usually worsens with age; treatment targets the underlying cause."},
  {topic:"Reproductive", type:"SAQ",
   q:"Describe the pathological mechanism and clinical manifestations of endometriosis.",
   opts:null, ans:null,
   explain:"Pathological mechanism: retrograde menstruation deposits endometrial cells outside the uterus (ovaries, fallopian tubes, peritoneum, bowel) → ectopic implants respond to hormonal cycles → inflammation, scarring, adhesions, and cysts (endometriomas). Clinical manifestations: cyclical pelvic pain worsening around menstruation, dyspareunia (painful intercourse), dysmenorrhoea, subfertility/infertility, heavy menstrual bleeding, bowel/bladder symptoms (depending on location of implants)."},
  {topic:"Reproductive", type:"SAQ",
   q:"Differentiate between varicocele, hydrocele, and spermatocele.",

  {topic:"Reproductive", type:"SAQ",
   q:"List two treatments for primary dysmenorrhoea.",

  {topic:"Reproductive", type:"SAQ",

  {topic:"Inflammation", type:"MCQ",
   q:"What is the Latin term for redness in acute inflammation?",
   opts:["Rubor","Calor","Tumor","Dolor"], ans:0,
   explain:"The five cardinal signs of acute inflammation are: rubor (redness), calor (heat), tumor (swelling), dolor (pain), and loss of function. Rubor results from vasodilation and increased blood flow to the affected tissue."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which phase of acute inflammation involves white cell migration to the injury site?",
   opts:["Cellular phase","Vascular phase","Resolution phase","Fibrotic phase"], ans:0,
   explain:"The cellular phase follows the initial vascular phase. It involves leukocyte margination, rolling, adhesion to endothelium, diapedesis (squeezing through vessel walls), and chemotaxis toward the site of injury."},
  {topic:"Inflammation", type:"MCQ",
   q:"What type of exudate contains pus with cell debris and microbes?",
   opts:["Purulent","Serous","Fibrinous","Haemorrhagic"], ans:0,
   explain:"Purulent (suppurative) exudate contains pus — a mixture of dead neutrophils, cell debris, and microorganisms. It is characteristic of bacterial infections causing pyogenic (pus-forming) inflammation."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which exudate type is watery with low protein content?",
   opts:["Serous","Fibrinous","Purulent","Haemorrhagic"], ans:0,
   explain:"Serous exudate is watery, pale, and has a low protein content. It resembles serum and is typical of mild inflammation (e.g. early blister fluid). It indicates increased capillary permeability without significant cellular component."},
  {topic:"Inflammation", type:"MCQ",
   q:"What process allows white cells to squeeze through capillary walls?",
   opts:["Diapedesis","Chemotaxis","Opsonisation","Phagocytosis"], ans:0,
   explain:"Diapedesis (also called transmigration or extravasation) is the process by which leukocytes squeeze between endothelial cells to exit blood vessels and migrate into inflamed tissue. It follows rolling and firm adhesion mediated by selectins and integrins."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which inflammatory mediator is released by mast cells and causes vasodilation?",
   opts:["Histamine","Fibrin","Erythropoietin","Collagen"], ans:0,
   explain:"Histamine is stored in mast cell granules and released immediately upon injury or immune activation. It causes vasodilation and increased vascular permeability, contributing to the early vascular phase of inflammation (heat and redness)."},
  {topic:"Inflammation", type:"MCQ",
   q:"How long must inflammation persist to be classified as chronic?",
   opts:["Over two weeks","Over 48 hours","Over one week","Over one month"], ans:0,
   explain:"Chronic inflammation is generally defined as inflammation persisting beyond two weeks. It is characterised by macrophage and lymphocyte infiltration, tissue destruction, and attempts at repair (fibrosis), in contrast to the neutrophil-dominant acute phase."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which healing type involves significant tissue loss and prolonged healing time?",
   opts:["Second intention","First intention","Direct closure","Fibrinous healing"], ans:0,
   explain:"Healing by second intention occurs when wound edges cannot be approximated — there is significant tissue loss, resulting in prolonged granulation tissue formation, contraction, and scar formation. First intention (primary closure) applies to clean wounds with apposed edges."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which drug class broadly suppresses inflammatory mediator production?",
   opts:["Corticosteroids","Antihistamines","Anticoagulants","Analgesics"], ans:0,
   explain:"Corticosteroids (e.g. prednisolone, dexamethasone) broadly suppress inflammation by inhibiting phospholipase A2 → reducing arachidonic acid production → fewer prostaglandins, leukotrienes, and thromboxanes. They also reduce cytokine production and leukocyte migration."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which cells predominate in acute inflammation?",
   opts:["Macrophages", "Lymphocytes", "Neutrophils", "Plasma cells"], ans:2,
   explain:"Neutrophils are the first responders and predominant cells in acute inflammation."},
  {topic:"Inflammation", type:"MCQ",
   q:"The cardinal sign of inflammation 'calor' refers to:",
   opts:["Redness", "Heat", "Swelling", "Pain"], ans:1,
   explain:"Calor = heat (from increased blood flow). Rubor = redness. Tumor = swelling. Dolor = pain."},
  // SAQ
  {topic:"Inflammation", type:"SAQ",
   q:"Describe the two phases of the acute inflammatory response.",
   opts:null, ans:null,
   explain:"Phase 1 – Vascular phase: vasodilation and increased capillary permeability cause heat, redness, and swelling. Histamine and serotonin are key early mediators. Phase 2 – Cellular phase: leukocyte migration (margination → rolling → adhesion → chemotaxis) from vessels into tissues, causing pain and facilitating phagocytosis."},
  {topic:"Inflammation", type:"SAQ",
   q:"Distinguish between acute and chronic inflammation in terms of duration, predominant cell type, and outcomes.",
   opts:null, ans:null,
   explain:"Acute: immediate/early response (minutes–days), neutrophil-dominant, vascular phase prominent, may resolve or progress. Chronic: weeks–years, macrophage and lymphocyte infiltration, fibrosis, associated with autoimmune disease and metabolic disorders. Chronic may arise from recurrent acute episodes or from persistent stimuli."},
  {topic:"Inflammation", type:"SAQ",
   q:"Differentiate between a keloid scar and a hypertrophic scar.",
   opts:null, ans:null,
   explain:"Hypertrophic scar: raised scar that stays within the wound boundaries, may regress over time, occurs due to excessive collagen deposition during healing. Keloid: scar that extends beyond original wound margins into normal tissue, does not regress, contains thick irregular collagen bundles, more common in darker skin types."},
  // LAQ
  {topic:"Inflammation", type:"LAQ",
   q:"Explain the full pathway of inflammation from trigger to resolution or chronic disease, including key cellular events and mediators.",
   opts:null, ans:null,
   explain:"Trigger (immunological, humoral, biomechanical, physical) → Cell response: calcium entry, receptor activation, upregulation of pro-inflammatory genes, downregulation of anti-inflammatory genes, release of mediators (histamine, serotonin, bradykinin, C3a/C5a, PGE-2, LTB-4, PAF, IL-1, IL-6), expression of adhesion molecules → Microvascular consequences: enhanced endothelial permeability, leukocyte entrapment/rolling/adhesion/migration (chemotaxis), monocyte/T-lymphocyte infiltration, thrombosis, apoptosis, organ dysfunction → Either: Resolution (growth factor synthesis, angiogenesis, scar/tissue remodelling) OR Non-resolved chronic inflammation → disease (autoimmune disorders, metabolic disease)."},
  // SAQ
  {topic:"Inflammation", type:"SAQ",
   q:"Define acute inflammation and list the five cardinal signs with their causes.",
   explain:"Acute inflammation is the immediate vascular and cellular response to tissue injury or infection. (1) Redness (rubor) — local vasodilation → increased blood flow. (2) Heat (calor) — increased blood flow and metabolic activity. (3) Swelling (tumor) — increased vascular permeability → fluid exudation. (4) Pain (dolor) — bradykinin and prostaglandins stimulate nociceptors. (5) Loss of function (functio laesa) — combined result of the above signs and tissue damage."},

  {topic:"Cancer & Blood", type:"MCQ",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What type of protein in cancer cells confers resistance to programmed cell death?",
   opts:["Anti-apoptotic proteins","Fibrinogen","Histamine","Prostaglandins"], ans:0,
   explain:"Cancer cells overexpress anti-apoptotic proteins (e.g. Bcl-2) and inactivate pro-apoptotic pathways (e.g. p53 mutations). This resistance to apoptosis allows tumour cells to survive despite DNA damage signals that would normally trigger cell death."},
  {topic:"Cancer & Blood", type:"MCQ",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which anaemia is classified as macrocytic and normochromic?",
   opts:["Pernicious anaemia","Iron-deficiency anaemia","Sickle cell anaemia","Thalassaemia"], ans:0,
   explain:"Pernicious anaemia (B12 deficiency) causes macrocytic (large), normochromic red blood cells due to impaired DNA synthesis — megaloblastic changes. It results from autoimmune destruction of gastric parietal cells → loss of intrinsic factor → B12 malabsorption."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What globin chain is mutated in sickle cell anaemia?",
   opts:["β-globin chain","α-globin chain","γ-globin chain","δ-globin chain"], ans:0,
   explain:"Sickle cell anaemia is caused by a point mutation in the HBB gene encoding the β-globin chain — glutamate is replaced by valine. Under low oxygen, HbS polymerises → red cells adopt a rigid sickle shape → haemolysis and vaso-occlusion."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which haemophilia type is also known as Christmas disease?",
   opts:["Haemophilia B","Haemophilia A","Haemophilia C","Von Willebrand disease"], ans:0,
   explain:"Haemophilia B (Christmas disease) is an X-linked bleeding disorder caused by deficiency of clotting factor IX. Haemophilia A involves factor VIII deficiency. Both present with joint bleeds and prolonged bleeding after injury."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What cells are the histological hallmark of Hodgkin lymphoma?",
   opts:["Reed-Sternberg cells","Plasma cells","Mast cells","Neutrophils"], ans:0,
   explain:"Reed-Sternberg cells are large, binucleated or multinucleated cells (owl-eye appearance) that are pathognomonic for Hodgkin lymphoma. They are derived from germinal centre B cells and are required for the histological diagnosis."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What abnormal product do multiple myeloma cells produce in excess?",
   opts:["Abnormal immunoglobulins (M proteins)","Excess erythrocytes","Deficient platelets","Excess fibrin"], ans:0,
   explain:"Multiple myeloma is a malignant proliferation of plasma cells that produces monoclonal immunoglobulins (M proteins / paraproteins). These accumulate in blood and urine (Bence Jones proteins), causing bone marrow failure, renal damage, and immunodeficiency."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What is polycythaemia?",
   opts:["Overproduction of erythrocytes","Deficiency of platelets","Excess white cells","Reduced haemoglobin"], ans:0,
   explain:"Polycythaemia (polycythaemia vera) is a myeloproliferative disorder characterised by overproduction of erythrocytes → increased blood viscosity → risk of thrombosis, stroke, and organ damage. It is associated with a JAK2 V617F mutation."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"In sickle cell anaemia, haemolysis occurs because:",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Haemophilia B is caused by a deficiency of which clotting factor?",

  // SAQ
  {topic:"Cancer & Blood", type:"SAQ",
   q:"Differentiate between iron deficiency anaemia and pernicious (megaloblastic) anaemia.",

   q:"Describe eight factors that can cause cancer.",
   opts:null, ans:null,
   explain:"(1) Chemical carcinogens (e.g. tobacco smoke, asbestos). (2) Radiation (UV, ionising). (3) Viral infections (HPV, EBV, HBV, HCV). (4) Genetic mutations/inherited syndromes (BRCA1/2, Li-Fraumeni). (5) Chronic inflammation. (6) Hormonal factors (oestrogen exposure). (7) Immunosuppression. (8) Dietary factors (high-fat diet, processed meat, low fibre)."},
  {topic:"Cancer & Blood", type:"SAQ",
   q:"Compare iron deficiency anaemia and pernicious anaemia across four features.",
   explain:"(1) Cause: Iron deficiency = inadequate iron (blood loss, poor intake, malabsorption); Pernicious = autoimmune loss of intrinsic factor → B12 malabsorption. (2) Blood picture: Iron deficiency = microcytic, hypochromic RBCs; Pernicious = macrocytic megaloblastic RBCs. (3) Symptoms: Iron deficiency = fatigue, pallor, brittle nails; Pernicious = fatigue + neurological signs (numbness, gait problems). (4) Treatment: Iron deficiency = oral/IV iron; Pernicious = lifelong B12 injections."},
  {topic:"Cancer & Blood", type:"SAQ",
   q:"List three factors that can cause cancer.",
   explain:"(1) Chemical carcinogens — tobacco smoke, benzene, asbestos cause irreversible DNA damage (initiation). (2) Oncogenic infections — HPV (cervical cancer), HBV/HCV (hepatocellular carcinoma), H. pylori (gastric cancer). (3) Ionising radiation and UV light — cause DNA strand breaks and mutations in proto-oncogenes/tumour suppressor genes."},

];

const TOPICS_ALL = ["All", ...new Set(QUESTIONS.map(q => q.topic))];
let filtered = [...QUESTIONS];
let idx = 0;
let revealed = false;
let correct = 0, attempted = 0;
let activeTopic = "All";
let activeType = "All";

function init() {
  const nav = document.getElementById("topicNav");
  nav.innerHTML = TOPICS_ALL.map(t =>
    `<button class="topic-btn${t==="All"?" active":""}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">${t}</button>`
  ).join("");
  render();
}

function setTopic(t) {
  activeTopic = t;
  applyFilters();
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
}

function setType(t) {
  activeType = t;
  applyFilters();
  document.querySelectorAll(".type-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
}

function applyFilters() {
  filtered = QUESTIONS.filter(q => {
    const topicMatch = activeTopic === "All" || q.topic === activeTopic;
    const typeMatch  = activeType  === "All" || q.type  === activeType;
    return topicMatch && typeMatch;
  });
  idx = 0; correct = 0; attempted = 0;
  render();
}

function render() {
  const q = filtered[idx];
  document.getElementById("qNum").textContent = `Question ${idx+1} of ${filtered.length}`;
  document.getElementById("qType").className = `q-type type-${q.type}`;
  document.getElementById("qType").textContent = q.type;
  document.getElementById("qTopic").textContent = q.topic;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("progFill").style.width = `${Math.round(((idx+1)/filtered.length)*100)}%`;

  const ab = document.getElementById("answerBox");
  ab.innerHTML = `<strong>Model answer</strong>${q.explain}`;
  ab.className = "answer-box";
  revealed = false;

  const optsDiv = document.getElementById("opts");
  if (q.opts) {
    optsDiv.innerHTML = q.opts.map((o,i) =>
      `<button class="opt" onclick="checkOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join("");
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("hint").textContent = "Select the best answer.";
  } else {
    optsDiv.innerHTML = "";
    document.getElementById("revealBtn").style.display = "inline-block";
    document.getElementById("hint").textContent = q.type === "LAQ" ? "Draft your full essay answer before revealing." : "Try to recall key points before revealing the model answer.";
  }
  updateScore();
}

function checkOpt(i) {
  if (revealed) return;
  revealed = true;
  attempted++;
  const q = filtered[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach((b, j) => {
    b.disabled = true;
    if (j === q.ans) b.classList.add("correct");
    else if (j === i) b.classList.add("wrong");
  });
  if (i === q.ans) correct++;
  document.getElementById("answerBox").classList.add("show");
  updateScore();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("answerBox").classList.add("show");
}

function next() {
  idx = (idx + 1) % filtered.length;
  render();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; correct = 0; attempted = 0;
  render();
}

function resetStats() {
  correct = 0; attempted = 0;
  updateScore();
}

function updateScore() {
  const sb = document.getElementById("scoreBar");
  if (attempted === 0) { sb.innerHTML = `<span class="score-pill">Attempt an MCQ to track your score</span>`; return; }
  const pct = Math.round((correct/attempted)*100);
  sb.innerHTML = `<span class="score-pill">MCQ score: <span>${correct}/${attempted}</span></span><span class="score-pill">Accuracy: <span>${pct}%</span></span>`;
}

init();
</script>
</body>
</html>
