   q:"Describe eight factors that can cause cancer.",
   opts:null, ans:null,
   explain:"(1) Chemical carcinogens (e.g. tobacco smoke, asbestos). (2) Radiation (UV, ionising). (3) Viral infections (HPV, EBV, HBV, HCV). (4) Genetic mutations/inherited syndromes (BRCA1/2, Li-Fraumeni). (5) Chronic inflammation. (6) Hormonal factors (oestrogen exposure). (7) Immunosuppression. (8) Dietary factors (high-fat diet, processed meat, low fibre)."},
  {topic:"Cancer & Blood", type:"SAQ",
   q:"Compare iron deficiency anaemia and pernicious anaemia across four features.",
   explain:"(1) Cause: Iron deficiency = inadequate iron (blood loss, poor intake, malabsorption); Pernicious = autoimmune loss of intrinsic factor → B12 malabsorption. (2) Blood picture: Iron deficiency = microcytic, hypochromic RBCs; Pernicious = macrocytic megaloblastic RBCs. (3) Symptoms: Iron deficiency = fatigue, pallor, brittle nails; Pernicious = fatigue + neurological signs (numbness, gait problems). (4) Treatment: Iron deficiency = oral/IV iron; Pernicious = lifelong B12 injections."},
  {topic:"Cancer & Blood", type:"SAQ",
   q:"List three factors that can cause cancer.",
   explain:"(1) Chemical carcinogens — tobacco smoke, benzene, asbestos cause irreversible DNA damage (initiation). (2) Oncogenic infections — HPV (cervical cancer), HBV/HCV (hepatocellular carcinoma), H. pylori (gastric cancer). (3) Ionising radiation and UV light — cause DNA strand breaks and mutations in proto-oncogenes/tumour suppressor genes."},

  // ── NEWLY ADDED: Inflammation & Healing ──
  {topic:"Inflammation", type:"SAQ",
   q:"Describe the process of healing and repair.",
   explain:"Wound healing has four overlapping phases. (1) Haemostasis (minutes): vasoconstriction, platelet aggregation, and clot formation stop bleeding. (2) Inflammatory phase (days 1–4): neutrophils then macrophages debride the wound; macrophages release growth factors (PDGF, TGF-β, VEGF) to initiate repair. (3) Proliferative phase (days 4–21): fibroblasts synthesise type III collagen; angiogenesis forms granulation tissue; myofibroblasts cause wound contraction; epithelial cells re-epithelialise the surface. (4) Remodelling (weeks–2 years): type III collagen replaced by stronger type I; wound achieves ~80% of original tensile strength. First intention (primary): clean wound edges apposed → minimal scarring. Second intention (secondary): significant tissue loss → heals from the base by granulation → more scarring."},
  {topic:"Inflammation", type:"SAQ",
   q:"List three factors that impede wound healing.",
   explain:"(1) Infection — bacteria compete for nutrients, produce proteolytic enzymes that destroy collagen, and prolong the inflammatory phase, preventing progression to repair. (2) Poor nutrition — vitamin C deficiency impairs collagen synthesis (hydroxylation of proline/lysine); zinc deficiency impairs cell proliferation and immune function. (3) Poor oxygen delivery/ischaemia — oxygen is essential for fibroblast activity, collagen cross-linking, and oxidative killing by neutrophils; peripheral vascular disease and anaemia are common causes. Other factors: diabetes (impaired leukocyte function, poor perfusion), corticosteroids (suppress inflammation and collagen synthesis), advanced age, and immunosuppression."},
  {topic:"Inflammation", type:"SAQ",
   q:"Describe common pathological mechanisms of neurodegeneration.",
   explain:"(1) Oxidative stress — excess reactive oxygen species (ROS) from dopamine metabolism and mitochondrial dysfunction damage neuronal DNA, proteins, and lipid membranes, overwhelming antioxidant defences. (2) Mitochondrial dysfunction — impaired complex I (ATP production) in neurons causes membrane depolarisation, calcium influx, and activation of destructive enzymes (caspases, calpains). (3) Excitotoxicity — excess glutamate overstimulates NMDA receptors → excessive calcium influx → mitochondrial failure and apoptosis. (4) Neuroinflammation — chronically activated microglia and astrocytes release TNF-α, IL-1β, and ROS, perpetuating neuronal damage. (5) Protein misfolding and aggregation — alpha-synuclein (Parkinson's), beta-amyloid and tau (Alzheimer's) aggregate and spread via prion-like propagation. (6) Impaired protein clearance — failure of the ubiquitin-proteasome system and autophagy allows toxic aggregates to accumulate."},

  // ── NEWLY ADDED: CNS ──
  {topic:"CNS", type:"SAQ",
   q:"List the major factors that can contribute to Parkinson's disease.",
   explain:"(1) Age — the strongest risk factor; prevalence rises sharply after 60 years. (2) Genetic mutations — LRRK2 (most common familial PD, autosomal dominant), SNCA (alpha-synuclein — encodes the protein forming Lewy bodies), Parkin and PINK1 (autosomal recessive early-onset PD), GBA mutation (greatest genetic risk for sporadic PD). (3) Environmental toxins — pesticides (rotenone, paraquat), herbicides, heavy metals (manganese), and MPTP selectively damage dopaminergic neurons. (4) Mitochondrial dysfunction — impaired complex I → oxidative stress → neuronal death. (5) Oxidative stress — excess ROS from dopamine metabolism via MAO-B damages substantia nigra neurons. (6) Neuroinflammation — activated microglia release TNF-α and IL-1β. (7) Male sex — men are 1.5× more likely to develop PD. (8) Head trauma — repeated injury associated with increased risk."},
  {topic:"CNS", type:"SAQ",
   q:"Describe the key changes that take place in neurons in multiple sclerosis.",
   explain:"(1) Demyelination — autoreactive T-lymphocytes and macrophages attack oligodendrocytes (myelin-producing CNS cells), stripping the myelin sheath and disrupting saltatory conduction → slowed or blocked impulse transmission. (2) Plaque formation — areas of demyelination form sclerotic plaques with inflammation, oedema, and gliosis in periventricular white matter, optic nerves, brainstem, cerebellum, and spinal cord. (3) Remyelination (early disease) — oligodendrocyte precursors partially repair myelin ('shadow plaques'), explaining the relapse-remission pattern. (4) Axonal injury — in chronic plaques, axons become transected; this is irreversible and underlies progressive disability. (5) Gliosis — reactive astrocytes fill lesions with scar tissue, further disrupting axonal function. (6) Synaptic and neuronal loss — progressive brain volume loss measurable on MRI underlies cognitive decline."},
  {topic:"CNS", type:"SAQ",
   q:"List four main pharmacological treatments in multiple sclerosis.",
   explain:"(1) Disease-modifying therapies (DMTs) — interferons (IFN-β1a/1b, first-line; reduce relapse rate ~30%), glatiramer acetate (first-line), natalizumab (anti-α4-integrin — prevents T-cell CNS entry), alemtuzumab (anti-CD52 — depletes T and B cells), ocrelizumab (anti-CD20 — approved for progressive MS). (2) High-dose IV methylprednisolone — for acute relapses; shortens duration but does not alter long-term outcome. (3) Symptom management — baclofen or tizanidine (spasticity), amantadine or modafinil (fatigue), anticholinergics (bladder urgency), SSRIs/SNRIs (depression and neuropathic pain), fampridine (improves walking speed). (4) Beta-interferons (IFN-β) — subcutaneous or intramuscular injection; reduce relapse frequency by ~30%; first-line for relapsing-remitting MS."},
  {topic:"CNS", type:"SAQ",
   q:"Define epilepsy. List three types of epileptic seizures and their sub-types.",
   explain:"Epilepsy is a chronic neurological disorder characterised by recurrent, unprovoked seizures (≥2, >24 hours apart, or 1 seizure with high recurrence risk) from abnormal, excessive neuronal activity. Three types: (1) Focal (partial) seizures — arise in one hemisphere: focal aware (simple partial — consciousness preserved), focal impaired awareness (complex partial — consciousness affected), focal with secondary generalisation (spreads to become generalised). (2) Generalised seizures — both hemispheres from onset: tonic-clonic (grand mal — most dramatic), absence (petit mal — brief staring spells in children), tonic (sustained contraction), clonic (rhythmic jerking), myoclonic, atonic/drop attacks. (3) Unknown onset — includes epileptic spasms (infantile spasms — West syndrome; clusters of sudden flexion/extension in infants)."},
  {topic:"CNS", type:"SAQ",
   q:"What is status epilepticus and why is it a medical emergency?",
   explain:"Status epilepticus (SE) is defined as a continuous seizure lasting ≥5 minutes, or two or more seizures without full recovery of consciousness between them. It is a medical emergency because prolonged abnormal neuronal activity causes: sustained neuronal hypoxia, cerebral oedema, lactic acidosis, hyperthermia, rhabdomyolysis, and irreversible neuronal death. Mortality is ~10–30% if untreated. First-line management: IV/IM benzodiazepines (lorazepam or diazepam); followed by IV levetiracetam, phenytoin, or sodium valproate if benzodiazepines fail; general anaesthesia and intubation for refractory SE."},
  {topic:"CNS", type:"SAQ",
   q:"Name two pharmacological and two non-pharmacological management strategies for epilepsy.",
   explain:"Pharmacological: (1) Sodium valproate — broad-spectrum; blocks voltage-gated sodium channels and enhances GABA activity; effective for generalised and focal seizures. (2) Carbamazepine — first-line for focal (partial) seizures; blocks sodium channels; also used in trigeminal neuralgia. Others include lamotrigine, levetiracetam, topiramate, phenytoin. Non-pharmacological: (1) Ketogenic diet — high-fat, low-carbohydrate diet; produces ketones that stabilise neuronal membranes; effective in drug-resistant childhood epilepsy. (2) Vagus nerve stimulation (VNS) — implanted device delivers intermittent electrical stimulation to the left vagus nerve, reducing seizure frequency in refractory cases. Also: epilepsy surgery (resection of the seizure focus) and lifestyle modification (adequate sleep, avoidance of triggers — alcohol, stress, flickering lights)."},
  {topic:"CNS", type:"SAQ",
   q:"Describe four types of disorders of the nervous system.",
   explain:"(1) Neurodegenerative disorders — progressive neuronal loss: Parkinson's disease (substantia nigra), Alzheimer's disease (cortex and hippocampus), motor neurone disease (motor cortex and anterior horn cells), Huntington's disease (striatum). (2) Cerebrovascular disorders — disruption of blood supply: ischaemic stroke (thrombosis/embolism → infarction), haemorrhagic stroke (vessel rupture → haematoma), TIA, subarachnoid haemorrhage, vascular dementia. (3) Demyelinating disorders — myelin destruction: multiple sclerosis (CNS — autoimmune), Guillain-Barré syndrome (PNS — post-infectious). (4) Infectious disorders — inflammatory/infective damage: bacterial meningitis (N. meningitidis, S. pneumoniae), viral encephalitis (HSV-1), brain abscess, prion disease (CJD). Also: traumatic brain injury and neoplastic disorders (primary brain tumours — glioblastoma; metastases)."},
  {topic:"CNS", type:"SAQ",
   q:"Name two types of brain trauma and differentiate between them.",
   explain:"(1) Closed (non-penetrating) TBI — the skull remains intact; brain injured by rapid acceleration-deceleration forces causing coup-contrecoup injuries, diffuse axonal injury (DAI), contusion, and haematomas (epidural from middle meningeal artery rupture; subdural from torn bridging veins; intracerebral). Low infection risk. Common in MVAs, falls, and contact sports. (2) Open (penetrating) TBI — the skull is breached by an object (bullet, bone fragment, blade) that penetrates the dura and brain parenchyma, causing direct laceration and destruction. High infection risk (meningitis, brain abscess). Common in gunshot wounds, stabbings, and depressed skull fractures. Prognosis depends on the regions traversed."},
  {topic:"CNS", type:"SAQ",
   q:"Describe the signs and symptoms of raised intracranial pressure (ICP).",
   explain:"Normal ICP is 7–15 mmHg. Raised ICP (>20 mmHg) results from a mass lesion, cerebral oedema, hydrocephalus, or venous sinus thrombosis (Monro-Kellie doctrine). Cushing's triad (sign of imminent herniation): (1) Hypertension (widened pulse pressure), (2) Bradycardia (reflex), (3) Irregular/slow respirations. Other features: Headache — worst in the morning, aggravated by Valsalva; Nausea and projectile vomiting — from brainstem pressure; Papilloedema — optic disc swelling on fundoscopy; Altered consciousness — confusion to coma; Unilateral fixed dilated pupil — CN III compression from uncal herniation; Contralateral hemiplegia — corticospinal tract compression; False localising sign — Kernohan's notch (ipsilateral hemiparesis from contralateral peduncle compression against tentorium)."},
  {topic:"CNS", type:"SAQ",
   q:"Define Lewy bodies and their effect on the brain.",
   explain:"Lewy bodies are abnormal intracytoplasmic protein inclusions found in neurons, composed primarily of misfolded alpha-synuclein bound with ubiquitin. They are the pathological hallmark of Parkinson's disease and Lewy body dementia (DLB). Effects: (1) In Parkinson's disease — Lewy bodies form predominantly in dopaminergic neurons of the substantia nigra pars compacta → neuronal dysfunction and death → dopamine depletion → TRAP motor features. (2) In Lewy body dementia — Lewy bodies are distributed widely in the neocortex and limbic system → progressive cognitive decline, vivid recurrent visual hallucinations, Parkinsonism, REM sleep behaviour disorder, and characteristic cognitive fluctuations. Mechanism of toxicity: alpha-synuclein aggregates disrupt the ubiquitin-proteasome system and autophagy, impair mitochondrial function, promote oxidative stress, and spread via prion-like propagation. Note: antipsychotics are contraindicated in DLB (severe neuroleptic sensitivity)."},

  // ── NEWLY ADDED: CVS ──
  {topic:"CVS", type:"SAQ",
   q:"List five tests for the evaluation of angina.",
   explain:"(1) Resting 12-lead ECG — may show prior MI (Q waves), LVH, or baseline ischaemic changes; often normal in stable angina. (2) Exercise treadmill test (ETT/stress test) — provokes ischaemia; ST depression ≥1 mm is positive; assesses functional capacity. (3) Coronary CT angiography (CCTA) — non-invasive imaging of coronary arteries; shows stenosis and plaque burden; first-line investigation in NICE guidelines for stable chest pain. (4) Myocardial perfusion imaging (MPI/SPECT) — nuclear scan shows areas of reduced perfusion at stress vs. rest; identifies ischaemic but viable myocardium. (5) Invasive coronary angiography — gold standard; directly visualises coronary anatomy; allows PCI in the same sitting. Others: echocardiography (wall motion abnormalities), blood tests (fasting lipids, HbA1c, FBC to exclude anaemia)."},
  {topic:"CVS", type:"SAQ",
   q:"List four tests used for the evaluation of myocardial infarction.",
   explain:"(1) 12-lead ECG — immediate; identifies STEMI (ST elevation, new LBBB, Q waves), NSTEMI (ST depression, T-wave inversion), and localises the territory affected. (2) High-sensitivity cardiac troponin (I and T) — rises within 1–3 hours, peaks at 12–24 hours, normalises over 5–14 days; most sensitive and specific biomarker for myocardial necrosis. (3) Echocardiography — assesses LV function, regional wall motion abnormalities (hypokinesis/akinesis in the infarcted territory), and complications (papillary muscle rupture, VSD, pericardial effusion). (4) Coronary angiography — definitive identification of the culprit vessel; performed urgently in STEMI to guide primary PCI. Others: CXR (pulmonary oedema, cardiac silhouette), CK-MB (less specific than troponin but useful for re-infarction detection)."},
  {topic:"CVS", type:"SAQ",
   q:"Name two main types of hypertension.",
   explain:"(1) Primary (essential) hypertension — accounts for ~95% of cases. No single identifiable cause; multifactorial: RAAS dysregulation, sympathetic nervous system overactivity, sodium sensitivity, endothelial dysfunction, and genetic predisposition. Develops gradually over years; diagnosed by exclusion. Managed with lifestyle changes and antihypertensives (ACE inhibitors, ARBs, calcium channel blockers, thiazide diuretics). (2) Secondary hypertension — ~5% of cases; a specific underlying cause exists. Key causes: renal parenchymal disease (most common — CKD, glomerulonephritis), renovascular disease (renal artery stenosis → ↑renin → ↑angiotensin II), primary hyperaldosteronism (Conn's syndrome — adrenal adenoma → ↑aldosterone), phaeochromocytoma (catecholamine excess), Cushing's syndrome (cortisol excess), coarctation of the aorta. Suspect in young patients, resistant hypertension, or associated hypokalaemia."},
  {topic:"CVS", type:"SAQ",
   q:"What is an aneurysm? Name two primary types of aneurysms.",
   explain:"An aneurysm is a permanent, localised dilatation of a blood vessel to more than 150% (1.5×) of its normal diameter, due to weakness in the vessel wall. (1) True aneurysm — involves all three arterial wall layers (intima, media, adventitia). May be fusiform (spindle-shaped — entire circumference dilated) or saccular/berry (localised outpouching). Common locations: abdominal aortic aneurysm (AAA — infrarenal, atherosclerosis-related; risk of fatal rupture), intracranial Berry aneurysm (circle of Willis bifurcations — rupture causes subarachnoid haemorrhage). (2) False (pseudo) aneurysm — not a true dilatation; a contained rupture where blood leaks through the arterial wall and is contained by surrounding tissue (haematoma); does NOT involve all three layers. Common cause: arterial puncture (post-angiography at femoral artery), trauma, or anastomotic leak. Pulsatile haematoma; high rupture risk; requires urgent treatment. Note: Aortic dissection (tear in the intima allowing blood to track within the media) is also a related emergency."},
  {topic:"CVS", type:"SAQ",
   q:"Name two types of myocardial infarction and describe a key difference in ECG tracing.",
   explain:"(1) STEMI (ST-Elevation MI) — transmural infarction (full thickness myocardial wall). ECG: ST-segment elevation ≥1 mm in ≥2 contiguous limb leads, or ≥2 mm in precordial leads; progresses to pathological Q waves (sign of irreversible necrosis). Requires immediate reperfusion (primary PCI within 90 minutes or thrombolysis). (2) NSTEMI (Non-ST-Elevation MI) — subendocardial infarction. ECG: ST-segment depression and/or T-wave inversion — NO ST elevation, NO pathological Q waves. Troponin is elevated (distinguishes from unstable angina). Managed medically with anticoagulation, antiplatelet therapy, and early angiography within 24–72 hours. Key ECG difference: STEMI = ST elevation; NSTEMI = ST depression or T-wave changes without ST elevation."},
  {topic:"CVS", type:"SAQ",
   q:"List five main clinical complaints and five types of drugs used in the management of STEMI.",
   explain:"Five clinical complaints: (1) Severe crushing central/substernal chest pain radiating to the left arm, jaw, or neck — unrelieved by rest or nitroglycerin. (2) Diaphoresis (cold, clammy sweating) — from sympathetic activation. (3) Nausea and vomiting — from vagal stimulation and severe pain. (4) Dyspnoea — from reduced cardiac output and early pulmonary oedema. (5) Sense of impending doom / extreme anxiety — a classical symptom. Five drug types: (1) Antiplatelets — aspirin 300 mg immediately + P2Y12 inhibitor (ticagrelor or clopidogrel) — dual antiplatelet therapy (DAPT). (2) Anticoagulants — unfractionated heparin or enoxaparin — prevent further thrombus extension. (3) Thrombolytics — alteplase (tPA) — if primary PCI not available within 120 minutes. (4) Beta-blockers (e.g. metoprolol) — reduce HR, myocardial O2 demand, and arrhythmia risk. (5) ACE inhibitors (e.g. ramipril) — prevent ventricular remodelling post-MI; statins (e.g. atorvastatin 80 mg) — stabilise remaining plaques."},
  {topic:"CVS", type:"SAQ",
   q:"What is the cardiac conduction system pathway, and how does it relate to ECG changes in MI?",
   explain:"The normal conduction pathway: SA node (right atrium — pacemaker, 60–100 bpm) → AV node (delays conduction 0.12 s → PR interval on ECG) → Bundle of His → right and left bundle branches → Purkinje fibres (rapid ventricular activation → QRS complex). MI disrupts myocardial electrical conduction in the affected territory, producing characteristic ECG changes based on location: ST elevation (STEMI — transmural injury current), T-wave inversion (subendocardial ischaemia), and pathological Q waves (transmural necrosis — irreversible infarction, present after 6–24 hours). The territory affected identifies the culprit artery: inferior MI (II, III, aVF — right coronary artery), anterior MI (V1–V4 — left anterior descending artery), lateral MI (I, aVL, V5–V6 — circumflex artery)."},

  // ── NEWLY ADDED: Renal ──
  {topic:"Renal", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and pharmacological interventions of acute pyelonephritis.",
   explain:"Pathophysiology: Ascending infection (most commonly E. coli with P-fimbriae) travels from urethra → bladder (cystitis) → ureters → renal pelvis → nephrons. Vesicoureteral reflux (VUR) facilitates ascent. Bacterial LPS activates TLR4 → cytokines (TNF-α, IL-6, IL-8) → neutrophil recruitment → pyuria, pus formation, tubular damage. Severe: papillary necrosis, abscess, urosepsis. Signs and symptoms: Fever >38°C, rigors, costovertebral angle tenderness, nausea/vomiting (upper UTI); dysuria, frequency, urgency, cloudy urine (lower UTI co-features); in urosepsis: hypotension, tachycardia. Investigations: Urinalysis dipstick (nitrites + leukocyte esterase), urine microscopy (pyuria, bacteriuria), midstream urine (MSU) culture and sensitivity (gold standard), FBC (neutrophilia), CRP (elevated), blood cultures if systemically unwell, renal ultrasound (exclude obstruction), CT urogram if abscess or complicated. Treatment: Uncomplicated (oral, outpatient): ciprofloxacin 500 mg BD for 7 days, or trimethoprim-sulfamethoxazole for 14 days. Complicated/severe (IV, inpatient): IV ceftriaxone, co-amoxiclav, or piperacillin-tazobactam; transition to oral when improving. Analgesia (paracetamol, NSAIDs if renal function allows); IV fluids for hydration and sepsis management."},
  {topic:"Renal", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and pharmacological interventions of acute kidney injury (AKI).",
   explain:"Pathophysiology — three categories: (1) Prerenal (~60–70%): ↓renal perfusion → ↓GFR without intrinsic damage; causes: hypovolaemia, ↓cardiac output, systemic vasodilation (sepsis), NSAIDs/ACE inhibitors. Reversible if perfusion restored. (2) Intrinsic renal (~25–30%): direct parenchymal damage; most common cause is acute tubular necrosis (ATN) from prolonged ischaemia or nephrotoxins (aminoglycosides, contrast, myoglobin from rhabdomyolysis); also glomerulonephritis, acute interstitial nephritis (drug hypersensitivity). (3) Postrenal (~5–10%): obstruction to urine flow → back-pressure → ↓GFR; causes: BPH, ureteric stones, pelvic malignancy, neurogenic bladder. Signs and symptoms: Oliguria (<0.5 mL/kg/hr — cardinal feature), fluid overload (oedema, hypertension, pulmonary oedema), hyperkalaemia (peaked T waves → arrhythmia risk), metabolic acidosis, uraemia (nausea, confusion, asterixis). Investigations: Serum creatinine (AKI defined as ↑creatinine ≥26 μmol/L within 48h or ↑1.5× baseline within 7 days), electrolytes, urine dipstick and microscopy (granular casts in ATN; RBC casts in GN), renal ultrasound (exclude hydronephrosis), ECG (hyperkalaemia). Treatment: IV fluid resuscitation (prerenal); withdraw nephrotoxins; treat underlying cause; IV calcium gluconate + insulin/dextrose for hyperkalaemia; furosemide for fluid overload (once euvolaemic); renal replacement therapy (haemodialysis/haemofiltration) for refractory hyperkalaemia, acidosis, fluid overload, or uraemia."},

  // ── NEWLY ADDED: Respiratory ──
  {topic:"Respiratory", type:"SAQ",
   q:"What is the role of surfactants, and what diseases result from their deficiency?",
   explain:"Surfactants are phospholipid-protein complexes produced by type II alveolar pneumocytes that reduce alveolar surface tension (by disrupting hydrogen bonds at the air-liquid interface), preventing alveolar collapse (atelectasis) at end-expiration. Without adequate surfactant, alveoli collapse with each breath, making breathing progressively more difficult and requiring much greater inspiratory effort. Deficiency leads to: (1) Neonatal Respiratory Distress Syndrome (NRDS) — in premature infants (<35 weeks gestation) whose lungs have not yet matured enough to produce sufficient surfactant; presents with grunting, nasal flaring, intercostal recession, and cyanosis within hours of birth; managed with exogenous surfactant instillation and CPAP/ventilation. (2) ARDS (Acute Respiratory Distress Syndrome) — in adults following lung injury (sepsis, trauma, aspiration, major surgery), where surfactant is inactivated/destroyed by inflammatory mediators, causing diffuse alveolar collapse and severe hypoxaemia."},
  {topic:"Respiratory", type:"SAQ",
   q:"Classify pneumonia based on three different classification systems.",
   explain:"(1) By site of acquisition: Community-acquired pneumonia (CAP — acquired outside hospital; most common pathogen: Streptococcus pneumoniae); Hospital-acquired pneumonia (HAP — develops >48h after hospital admission; gram-negative rods and Staphylococcus aureus more common); Ventilator-associated pneumonia (VAP — develops >48h after endotracheal intubation; highest mortality). (2) By causative pathogen: Bacterial — typical (S. pneumoniae, H. influenzae — lobar consolidation) vs atypical (Mycoplasma, Legionella, Chlamydophila — patchy infiltrates, respond to macrolides not beta-lactams); Viral (influenza, SARS-CoV-2, RSV); Fungal (Pneumocystis jirovecii — PJP, in immunocompromised). (3) By anatomical pattern: Lobar pneumonia — consolidation of an entire anatomical lobe (S. pneumoniae — rusty sputum; Klebsiella — gelatinous sputum); Bronchopneumonia — patchy, multifocal inflammation affecting bronchi and surrounding alveoli; Interstitial pneumonia — affects the alveolar walls and interstitium (viral or atypical causes)."},
  {topic:"Respiratory", type:"SAQ",
   q:"What is bronchiolitis? Which population does it affect, what causes it, and is it an upper or lower respiratory tract infection?",
   explain:"Bronchiolitis is a lower respiratory tract infection (LRTI) primarily affecting infants and children under 2 years of age (peak incidence at 3–6 months). Most common cause: Respiratory Syncytial Virus (RSV — responsible for ~80% of cases); others include rhinovirus, parainfluenza, and human metapneumovirus. Pathophysiology: viral infection causes inflammation and oedema of the bronchioles → mucus plugging → partial airway obstruction → air trapping and atelectasis. Clinical features: initial coryzal symptoms (runny nose, mild fever), progressing to wheeze, tachypnoea, subcostal and intercostal recession, hyperinflation, and difficulty feeding. Diagnosis is clinical; CXR may show hyperinflation and patchy collapse. Management is largely supportive: adequate oxygenation (nasal cannula O2 if SpO2 <92%), nasogastric feeds if unable to feed, careful fluid management. Bronchodilators and corticosteroids are NOT routinely recommended."},

  // ── NEWLY ADDED: GI ──
  {topic:"Gastrointestinal", type:"SAQ",
   q:"What is Coeliac disease? Describe the cause, protein involved, unsafe foods, mechanism, and management.",
   explain:"Coeliac disease is an autoimmune condition triggered by ingestion of gluten (specifically its gliadin component) in genetically susceptible individuals (HLA-DQ2 or HLA-DQ8). Mechanism: gliadin binds tissue transglutaminase (tTG) forming a complex that activates CD4+ T-cells → release of pro-inflammatory cytokines → anti-tTG and anti-endomysial antibodies → destruction of intestinal villi (villous atrophy) → malabsorption. Unsafe foods: wheat, barley, rye, and often oats (due to cross-contamination). Clinical features: diarrhoea, steatorrhoea, weight loss, bloating, iron-deficiency anaemia, fatigue, and in children — failure to thrive. Extra-intestinal: dermatitis herpetiformis, osteoporosis, infertility. Diagnosis: serology (anti-tTG IgA, anti-EMA), duodenal biopsy (Marsh grading — villous atrophy). Management: strict lifelong gluten-free diet — the only effective treatment; reverses villous changes and reduces cancer risk (enteropathy-associated T-cell lymphoma)."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"What causes cholelithiasis and which ducts can be blocked?",
   explain:"Cholelithiasis (gallstone formation) results from imbalances in bile composition: excess cholesterol (supersaturated bile — impaired solubilisation by bile salts and lecithin), excess bilirubin (pigment stones in chronic haemolysis — sickle cell, hereditary spherocytosis), or reduced bile salts. Risk factors: the '5 Fs' — Fat (obesity), Female, Forty (age >40), Fertile (multiparity), Fair (European ancestry). Also: rapid weight loss, total parenteral nutrition (bile stasis), Crohn's disease (ileal disease → ↓bile salt reabsorption). Which ducts can be blocked: (1) Cystic duct — stone impacts → acute cholecystitis (gallbladder inflammation; RUQ pain, fever, Murphy's sign positive). (2) Common bile duct (CBD/choledocholithiasis) — obstructive jaundice (painless yellow skin, dark urine, pale stools), cholangitis (Charcot's triad: fever, jaundice, RUQ pain — life-threatening). (3) Ampulla of Vater/pancreatic duct — acute pancreatitis (epigastric pain radiating to back, ↑amylase/lipase)."},
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Describe the pathological mechanism of both acute and chronic pancreatitis, including diagnostic evaluation and management.",
   explain:"Acute pancreatitis — Pathophysiology: gallstones (most common cause) or alcohol obstruct the pancreatic duct or ampulla → digestive enzymes (lipase, trypsin, elastase) back up and are prematurely activated inside the pancreas → autodigestion (proteolysis and lipolysis of pancreatic tissue itself) → severe inflammation, fat and acinar cell necrosis, haemorrhage. Systemic inflammatory response can cause ARDS, AKI, hypovolaemic shock, and sepsis. Chronic pancreatitis — Pathophysiology: repeated inflammatory episodes (most commonly from alcohol abuse) → progressive fibrosis and ductal strictures → destroys islets of Langerhans (→ DM type 3c) and exocrine acinar cells (→ steatorrhoea). Irreversible structural destruction. Diagnosis: Acute — ↑serum amylase (>3× upper limit) and lipase; CT abdomen (gold standard for severity assessment — identifies necrosis, abscess); ultrasound (gallstones). Chronic — faecal elastase (exocrine insufficiency); CT/MRCP (calcification, ductal dilation); faecal fat. Management: Acute — nil by mouth, IV fluid resuscitation, strong analgesia (opioids), antiemetics; ERCP for gallstone obstruction; antibiotics only for infected necrosis; ICU if severe. Chronic — alcohol and smoking cessation; low-fat diet; oral pancreatic enzyme replacement (PERT — e.g. Creon); insulin for DM; analgesics (stepwise); surgical drainage or pancreatectomy in refractory cases."},

  // ── NEWLY ADDED: Endocrine ──
  {topic:"Endocrine", type:"SAQ",
   q:"What is Addison's disease? Which enzyme is primarily affected?",
   explain:"Addison's disease is primary adrenal insufficiency due to destruction of the adrenal cortex (most commonly autoimmune — anti-21-hydroxylase antibodies; also TB, metastases, haemorrhage — Waterhouse-Friderichsen syndrome in meningococcal septicaemia). Results in deficiency of both cortisol and aldosterone. The enzyme primarily affected is 21-hydroxylase, which is essential for the synthesis of both cortisol (from progesterone → 17-hydroxyprogesterone → 11-deoxycortisol → cortisol) and aldosterone. Consequence of cortisol loss: removal of negative feedback → compensatory ↑ACTH from the pituitary → ACTH acts on melanocortin receptors → hyperpigmentation (bronze skin — especially in sun-exposed areas, buccal mucosa, and skin creases). Clinical features: hypotension (postural), hyponatraemia (↓aldosterone → sodium loss), hyperkalaemia, hypoglycaemia, weight loss, fatigue, anorexia, nausea. Addisonian crisis: acute adrenal insufficiency → life-threatening shock. Diagnosis: short Synacthen (ACTH stimulation) test — cortisol fails to rise adequately. Treatment: hydrocortisone (cortisol replacement) + fludrocortisone (mineralocorticoid replacement); increased dose during illness ('sick day rules')."},
  {topic:"Endocrine", type:"SAQ",
   q:"What is Graves' disease and what is its main distinguishing sign?",
   explain:"Graves' disease is the most common cause of hyperthyroidism (~70–80% of cases), caused by TSI (thyroid-stimulating immunoglobulins) — IgG autoantibodies that bind to and continuously activate TSH receptors on thyroid follicular cells → sustained, unregulated overproduction of T3 and T4 → pituitary feedback suppresses TSH (TSH is low/undetectable). General features of hyperthyroidism: weight loss despite increased appetite, heat intolerance, palpitations and tachycardia/AF, anxiety and irritability, diarrhoea, fine tremor, menstrual irregularity, lid lag. Main distinguishing sign: Exophthalmos (proptosis) — pathognomonic for Graves' disease; bulging eyeballs from retro-orbital autoantibody-driven inflammation of orbital fibroblasts (TSH receptor expression on orbital tissue). Also specific to Graves': pretibial myxoedema (skin thickening over shins), thyroid acropachy (clubbing). A thyroid storm (life-threatening surge of thyroid hormones) can be triggered by stress, infection, or surgery. Treatment: carbimazole or propylthiouracil (antithyroid drugs); radioiodine ablation; thyroidectomy. Beta-blockers (propranolol) for symptomatic relief."},
  {topic:"Endocrine", type:"SAQ",
   q:"What is Pheochromocytoma? List the 5 Hs.",
   explain:"Phaeochromocytoma (PHEO) is a catecholamine-secreting tumour arising from chromaffin cells of the adrenal medulla (or from extra-adrenal paraganglia — paraganglioma), causing episodic or sustained hypertension from adrenaline and noradrenaline hypersecretion. It follows the 'rule of 10': 10% malignant, 10% bilateral, 10% extra-adrenal, 10% in children, 10% familial (associated with MEN2A/2B, von Hippel-Lindau, neurofibromatosis type 1). The 5 Hs: (1) Hypertension — paroxysmal or sustained; resistant to conventional antihypertensives; can cause hypertensive crisis. (2) Headache — severe, pounding, episodic. (3) Hyperhidrosis — profuse diaphoresis (excessive sweating). (4) Hyperglycaemia — catecholamines inhibit insulin secretion and stimulate glycogenolysis. (5) Heart palpitations/tachycardia — from adrenaline-driven sympathetic stimulation. Diagnosis: 24-hour urinary metanephrines and catecholamines (most sensitive), or plasma free metanephrines; CT/MRI adrenal for localisation. Treatment: surgical adrenalectomy, preceded by alpha-blockade (phenoxybenzamine) for at least 2 weeks to prevent intraoperative hypertensive crisis."},
  {topic:"Endocrine", type:"SAQ",
   q:"Define acromegaly. What is myxoedema? Explain polydipsia in diabetes.",
   explain:"Acromegaly: excess growth hormone (GH) secretion occurring after epiphyseal plate fusion (bone maturity) in adults — most commonly from a pituitary somatotroph adenoma. Results in disproportionate enlargement of the hands, feet, jaw (prognathism), brow, and soft tissues; also visceral enlargement (cardiomegaly, macroglossia). Complications: hypertension, DM (GH is counter-regulatory to insulin), sleep apnoea, colorectal cancer risk. Diagnosis: ↑IGF-1 (best screening test); failure to suppress GH on oral glucose tolerance test. Treatment: transsphenoidal surgery (first-line), then somatostatin analogues (octreotide), pegvisomant (GH receptor antagonist), or radiotherapy. GH excess before bone maturity = gigantism. Myxoedema: severe hypothyroidism characterised by non-pitting oedema (face, hands, feet) from subcutaneous accumulation of glycosaminoglycans (mucopolysaccharides), which are hydrophilic and bind water. Can progress to myxoedema coma (life-threatening — hypothermia, bradycardia, reduced consciousness). Treatment: IV T4 (levothyroxine). Polydipsia in diabetes: sustained hyperglycaemia raises plasma osmolality → osmoreceptors in the hypothalamus are activated → thirst (polydipsia) and ADH release (antidiuresis). Additionally, glucose in the renal tubule exceeds the reabsorption threshold (>10 mmol/L) → osmotic diuresis (polyuria) → further dehydration → compounding thirst."},

  {topic:"MSK", type:"SAQ",
   q:"What foods increase the risk of gout and how is it managed?",
   explain:"Foods high in purines increase uric acid production and raise the risk of gout: organ meats (liver, kidney, sweetbreads), red meat, shellfish and seafood (anchovies, sardines, mussels), alcohol (especially beer — high purine content plus impairs renal uric acid excretion), and high-fructose corn syrup beverages (fructose promotes uric acid synthesis). Over 90% of gout patients have reduced renal excretion of uric acid, worsened by diuretics (thiazides, furosemide), CKD, and dehydration. Management: Acute attack — NSAIDs (e.g. naproxen or indomethacin — first-line if no contraindications), colchicine (inhibits microtubule polymerisation → blocks neutrophil migration and NLRP3 inflammasome activation), or corticosteroids (oral prednisolone or intra-articular injection) if NSAIDs/colchicine are contraindicated. Long-term urate-lowering therapy (initiated after acute attack resolves): allopurinol (xanthine oxidase inhibitor — reduces uric acid synthesis; first-line; target serum uric acid <360 μmol/L), febuxostat (alternative), probenecid (uricosuric). Dietary modification (reduce purines, limit alcohol), adequate hydration."},
  {topic:"MSK", type:"SAQ",
   q:"Classify bone fractures.",
   explain:"Fractures are classified by multiple systems: (1) By pathology: Traumatic — normal bone subjected to excessive force; Pathological — fracture through diseased bone (osteoporosis, metastasis, Paget's disease) from minimal force; Stress/fatigue — from repetitive loading (e.g. metatarsal in athletes/military recruits). (2) By skin integrity: Closed (simple) — skin intact, no external wound; Open (compound) — bone pierces skin or wound communicates with fracture site → high infection risk → requires surgical debridement + antibiotics. (3) By location: Diaphyseal (shaft), metaphyseal, epiphyseal (Salter-Harris classification in children — involves growth plate). (4) By fracture line pattern: Transverse (90° to long axis — direct blow), oblique (angled), spiral (rotational force), comminuted (multiple fragments — high energy), greenstick (incomplete — one cortex breaks, one bends; only in children), butterfly fragment, avulsion (fragment pulled by tendon/ligament). (5) By displacement: Undisplaced vs displaced (angulation, rotation, shortening, translation)."},
  {topic:"MSK", type:"SAQ",
   q:"What is Rhabdomyolysis and what causes myocyte destruction?",
   explain:"Rhabdomyolysis is the rapid breakdown (lysis) of skeletal muscle (myocytes), releasing intracellular contents — myoglobin, creatine kinase (CK), potassium, phosphate, and urate — into the bloodstream. Myoglobin precipitates in renal tubules (especially in acidic, concentrated urine) → tubular obstruction → direct tubular toxicity → acute kidney injury (cardinal complication). Urinalysis: 'tea-coloured' or red urine without RBCs on microscopy (myoglobinuria). Classic triad: muscle pain/weakness, dark urine, elevated CK (>1000 IU/L; often >10,000). Causes of myocyte destruction: Physical — crush injuries, extreme exercise (exertional rhabdomyolysis), prolonged immobilisation (compartment syndrome), seizures, electrical injury. Metabolic — hyperthermia (heat stroke, malignant hyperthermia), hyponatraemia, hypokalaemia, hypophosphataemia. Toxic — alcohol, statins (rarely — myopathy), cocaine, heroin, MDMA. Infectious — viral myositis (influenza, EBV, HIV), Clostridium myonecrosis. Management: aggressive IV fluid resuscitation (0.9% saline or Hartmann's — target urine output >200–300 mL/hr) to flush myoglobin from renal tubules and prevent AKI."},
  {topic:"MSK", type:"SAQ",
   q:"What is the genetic cause of Duchenne Muscular Dystrophy? Define a stress fracture.",
   explain:"Duchenne Muscular Dystrophy (DMD) is caused by a mutation (deletion, duplication, or point mutation) in the DMD gene on the X chromosome (Xp21), which encodes the protein dystrophin. Inheritance is X-linked recessive (affects males; females are carriers). Dystrophin normally links the actin cytoskeleton inside muscle fibres to the extracellular matrix via the dystrophin-associated protein complex (DAPC), maintaining membrane integrity during muscle contraction. Without dystrophin, repeated mechanical stress causes membrane disruption → calcium influx → activation of calpains and proteases → myofibre necrosis → fibrosis and fatty replacement → progressive proximal muscle weakness. Clinical features: onset by age 3–5, Gower's sign (uses arms to climb up legs when rising from the floor), pseudohypertrophy of calves (replaced by fat and fibrous tissue), wheelchair-bound by ~12 years, death typically from respiratory failure or cardiomyopathy in the 20s. Treatment: corticosteroids (deflazacort, prednisolone) slow progression; exon-skipping therapies (e.g. eteplirsen); gene therapy approaches in trials. A stress (fatigue) fracture is an incomplete fracture of bone resulting from repetitive mechanical loading below the threshold of a single acute fracture. Common in athletes (metatarsals — 'march fracture'), military recruits, and those with osteoporosis. Results from imbalance between bone remodelling (osteoclast resorption > osteoblast deposition) during repetitive stress cycles. Presents with point tenderness and pain with activity, relieved by rest. Management: rest, relative offloading, gradually increasing activity."},
  {topic:"MSK", type:"SAQ",
   q:"Describe the main features of Fibromyalgia and its trigger factors.",
   explain:"Fibromyalgia is a chronic central sensitisation pain syndrome characterised by: (1) Widespread musculoskeletal pain (bilateral, above and below the waist, axial) for >3 months. (2) Fatigue — profound and disproportionate to activity level; non-restorative sleep (alpha-wave intrusions during slow-wave sleep). (3) Cognitive difficulties ('fibro fog') — impaired memory, concentration, and processing speed. (4) Multiple associated symptoms — headaches (often tension-type or migraine), IBS, bladder hypersensitivity, anxiety, and depression. Pathophysiology: central sensitisation — the central nervous system amplifies pain signals (wind-up phenomenon); reduced descending inhibitory pathways (↓serotonin and noradrenaline); dysregulation of the HPA axis (abnormal cortisol and GH rhythms); elevated substance P in CSF; low pain threshold at tender points. Trigger factors: physical trauma (injury, surgery), infections (viral illness — e.g. EBV, parvovirus), psychological stress and PTSD, sleep disturbances, inflammatory arthritis (RA, SLE can co-exist). Management: patient education and validation; graded aerobic exercise (most evidence); CBT (cognitive behavioural therapy); pharmacological — duloxetine (SNRI), pregabalin or gabapentin, amitriptyline (low-dose for sleep and pain); sleep hygiene; multidisciplinary pain management."},

  {topic:"Reproductive", type:"SAQ",
   q:"Describe BPH — risk factors, manifestations, and management.",
   explain:"Benign prostatic hyperplasia (BPH) is non-cancerous enlargement of the prostate gland, extremely common in men >50 years (affects ~50% by age 60, ~90% by age 85). Pathophysiology: testosterone is converted to 5α-dihydrotestosterone (5α-DHT) by 5α-reductase type 2 within prostatic stromal cells → DHT binds androgen receptors → periurethral zone prostatic cell proliferation → urethral compression → bladder outlet obstruction. Risk factors: advancing age (single greatest risk factor), hormonal changes (↑sensitivity to DHT), obesity (↑circulating oestrogens may contribute), family history, and metabolic syndrome. Manifestations — Lower Urinary Tract Symptoms (LUTS): Obstructive — weak or intermittent stream, urinary hesitancy, straining to void, incomplete bladder emptying, urinary retention. Irritative — frequency (day and night — nocturia), urgency, urgency incontinence. Complications: acute urinary retention, recurrent UTIs, hydronephrosis, bladder stones, bladder diverticula. Diagnosis: IPSS (International Prostate Symptom Score), digital rectal examination (DRE — smooth, symmetrically enlarged, non-tender prostate), PSA (to exclude prostate cancer), urodynamic studies, renal ultrasound with post-void residual volume. Management: alpha-blockers (tamsulosin, doxazosin — relax prostate and bladder neck smooth muscle → immediate symptom relief); 5α-reductase inhibitors (finasteride, dutasteride — ↓DHT → gland shrinkage over 3–6 months; most effective in large glands); combination therapy (superior for moderate-severe symptoms with large volume); surgical: TURP (transurethral resection of the prostate — gold standard for refractory BPH); HoLEP, PAE (prostate artery embolisation) as minimally invasive alternatives."},
  {topic:"Reproductive", type:"LAQ",
   q:"Explain the role of insulin resistance in the development of PCOS.",
   explain:"Insulin resistance is the central metabolic abnormality in ~70% of women with PCOS, occurring independently of body weight. (1) Insulin resistance → compensatory hyperinsulinaemia — the pancreas secretes excess insulin to maintain normal blood glucose levels. (2) Elevated insulin reduces hepatic production of Sex Hormone-Binding Globulin (SHBG) → increased free (biologically active) androgens (testosterone, androstenedione) in the circulation. (3) Excess insulin acts synergistically with LH on ovarian theca cells → stimulates androgen overproduction (steroidogenesis). (4) High androgens dysregulate the hypothalamic-pituitary-ovarian (HPO) axis → elevated LH:FSH ratio (LH ↑, FSH ↓) → arrests follicle development at the antral stage → chronic anovulation → accumulation of multiple small follicular cysts on the ovaries. (5) Absent ovulation → no progesterone production → prolonged unopposed oestrogen → endometrial hyperplasia risk. Long-term metabolic consequences: type 2 diabetes (β-cell burnout from chronic hyperinsulinaemia), metabolic syndrome, cardiovascular disease, non-alcoholic fatty liver disease. Management targeting insulin resistance: lifestyle modification (even 5–10% weight loss restores ovulation), metformin (↓hepatic glucose output and insulin resistance; improves menstrual regularity and reduces androgen levels), COCP (suppresses LH and ovarian androgen production; endometrial protection), clomiphene/letrozole (ovulation induction when fertility desired), spironolactone (anti-androgenic — hirsutism treatment)."},
  {topic:"Reproductive", type:"LAQ",
   q:"Explain the pathogenesis of Haemolytic Disease of the Newborn (HDN).",
   explain:"HDN occurs due to maternal alloimmunisation against foetal red cell antigens, most commonly the Rh(D) antigen (Rhesus haemolytic disease), though ABO incompatibility (milder) and other antigens (Kell, Duffy, Kidd) can also cause it. Pathogenesis: (1) Primary sensitisation: an Rh-negative mother (rr genotype) carries an Rh-positive foetus (R inherited from father). At delivery (or with antepartum haemorrhage, amniocentesis, or miscarriage), foetal Rh-positive erythrocytes enter the maternal circulation (fetomaternal haemorrhage) → primary immune response (predominantly IgM — does not cross placenta) → mother produces anti-Rh(D) IgG antibodies. First baby typically unaffected. (2) Subsequent Rh-positive pregnancy: maternal IgG anti-D antibodies (IgG is the only antibody class able to cross the placenta via FcRn receptors) enter the foetal circulation → bind to Rh-positive foetal erythrocytes → opsonisation → extravascular haemolysis in the foetal spleen (macrophage-mediated). (3) Consequences: Severe anaemia → compensatory extramedullary haemopoiesis (liver, spleen enlargement); hydrops fetalis (generalised oedema from severe anaemia and hypoalbuminaemia — can be fatal in utero); Hyperbilirubinaemia — unconjugated bilirubin from haemolysis crosses the immature blood-brain barrier → kernicterus (bilirubin encephalopathy) → permanent brain damage, deafness, cerebral palsy. Prevention: anti-D immunoglobulin (Rhogam) given to Rh-negative mothers at 28 weeks gestation, within 72 hours of delivery, and after any sensitising event (mops up foetal Rh-positive cells before sensitisation occurs). Treatment of affected neonate: phototherapy (converts unconjugated bilirubin to water-soluble isomers for excretion); exchange transfusion for severe hyperbilirubinaemia or anaemia; intrauterine blood transfusion if severe foetal anaemia detected on Doppler USS."},

  {topic:"Respiratory", type:"MCQ",
   q:"Which spirometry finding is characteristic of obstructive lung disease?",
   opts:["Increased FEV1/FVC ratio","Decreased FEV1/FVC ratio below 70%","Normal FEV1 with reduced FVC","Increased FVC with normal FEV1"], ans:1,

  {topic:"Respiratory", type:"MCQ",
   q:"What is the primary mechanism of airway narrowing in an acute asthma attack?",
   opts:["Fibrosis of bronchial walls","Mast cell degranulation releasing histamine, kinins and prostaglandins causing bronchoconstriction and mucus hypersecretion","Destruction of alveolar elastic fibres","Loss of surfactant production"], ans:1,
   explain:"In asthma, a trigger stimulates mast cells to degranulate and release cytokines (histamine, kinins, prostaglandins). These cause smooth muscle contraction (bronchoconstriction), increased mucus production and increased capillary permeability — flooding the airways with mucus and fluid."},
  {topic:"Respiratory", type:"MCQ",
   q:"What is the primary cause of COPD?",
   opts:["Autoimmune destruction of alveoli","Cigarette smoking causing airway inflammation and destruction","Recurrent viral pneumonia","Genetic defect in chloride ion transport"], ans:1,
   explain:"Cigarette smoking (and air pollutants) is the major cause of COPD. Smoke triggers inflammation of airway epithelium, releasing cytokines that cause bronchial irritation (chronic bronchitis) and breakdown of elastic lung tissue (emphysema)."},
  {topic:"Respiratory", type:"MCQ",
   q:"In emphysema, which mechanism leads to air trapping and hyperinflation?",
   opts:["Excess mucus obstructing bronchioles","Proteases destroying elastic fibres → loss of elastic recoil","Smooth muscle hypertrophy narrowing airways","Fibrosis increasing lung stiffness"], ans:1,
   explain:"Neutrophils and macrophages release proteases in response to infection/smoke. Proteases destroy elastic fibres that are essential for recoil. Without recoil, alveoli over-inflate and trap air — producing the classic barrel chest."},
  {topic:"Respiratory", type:"MCQ",

  {topic:"Respiratory", type:"MCQ",
   q:"Cystic fibrosis is caused by a defect in which gene?",
   opts:["BRCA1 on chromosome 17","CFTR on chromosome 7","Alpha-1 antitrypsin on chromosome 14","HLA on chromosome 6"], ans:1,
   explain:"Cystic fibrosis results from a mutation in the CFTR gene on chromosome 7, causing defective epithelial chloride ion transport. This leads to dehydrated, viscous mucus, impaired cilia function and mucus plugging across multiple organ systems."},
  {topic:"Respiratory", type:"MCQ",
   q:"Which stage of ARDS occurs within the first 7 days and is characterised by microvascular thrombi and alveolar proteinaceous deposits?",

   explain:"The exudative stage (days 1–7) involves: altered capillary permeability → microvascular thrombi and pulmonary oedema → proteinaceous deposits in alveoli → reduced surfactant → alveolar cell destruction → atelectasis, hypoxia, hypercapnia and cyanosis."},
  {topic:"Respiratory", type:"MCQ",

  {topic:"Respiratory", type:"MCQ",
   q:"Which sputum appearance suggests infection with Streptococcus pneumoniae?",

  {topic:"Respiratory", type:"MCQ",
   q:"Which statement correctly distinguishes restrictive from obstructive lung disease?",

  {topic:"Respiratory", type:"MCQ",

  {topic:"Respiratory", type:"MCQ",

   opts:["12–24 hours","48–72 hours","1 week","30 minutes"], ans:1,
   explain:"The Mantoux test is an intradermal injection of purified protein derivative (PPD). The hypersensitivity (induration) reaction is measured 48–72 hours later. An induration <5 mm transverse diameter is considered negative."},

  {topic:"Respiratory", type:"SAQ",
   q:"List four clinical manifestations of pneumonia.",
   opts:null, ans:null,
   explain:"(1) Hypoxaemia and tachypnoea — reduced gas exchange drives rapid shallow breathing. (2) Productive cough — inflammatory exudate accumulates in alveoli; sputum colour suggests the causative organism. (3) Pyrexia and tachycardia — systemic inflammatory response. (4) Pleuritic chest pain — inflammation extends to the pleural surface; worsens with inspiration. Other valid answers: dyspnoea, reduced lung expansion, dehydration, lethargy."},
  {topic:"Respiratory", type:"SAQ",
   q:"List four signs and symptoms of asthma.",
   opts:null, ans:null,
   explain:"(1) Dyspnoea — difficulty breathing, particularly on expiration due to airflow obstruction. (2) Wheezing — high-pitched expiratory sound from turbulent airflow through narrowed airways. (3) Cough — often worse at night; may be the sole presenting symptom in cough-variant asthma. (4) Chest tightness — from smooth muscle contraction and air trapping. Other valid: tachypnoea, nasopharyngeal congestion, GORD."},
  {topic:"Respiratory", type:"SAQ",
   q:"Name the four drugs used in standard TB treatment.",
   opts:null, ans:null,
   explain:"Standard first-line TB treatment uses four agents (RIPE mnemonic): (1) Rifampicin, (2) Isoniazid, (3) Pyrazinamide, (4) Ethambutol. Treatment typically continues for 6 months. Combination therapy prevents the development of drug resistance."},
  {topic:"Respiratory", type:"SAQ",
   q:"List three clinical manifestations of cystic fibrosis.",
   opts:null, ans:null,
   explain:"(1) Respiratory: chronic productive cough, recurrent lower respiratory tract infections, haemoptysis, pneumothorax, barrel chest and digital clubbing from progressive lung disease. (2) Gastrointestinal: meconium ileus in neonates, pancreatic insufficiency, loose and oily (steatorrhoeic) stools. (3) Progressive decline in lung function with age — FEV1 decreases as structural lung damage accumulates. Sweat glands also affected (elevated sweat chloride — basis of diagnostic sweat test)."},
  {topic:"Respiratory", type:"SAQ",
   q:"Define respiratory failure and distinguish hypoxaemia from hypoxia.",
   opts:null, ans:null,
   explain:"Respiratory failure: a serious condition in which the lungs cannot get enough oxygen into the blood to sustain the metabolic needs of the body. Normal SpO2 is 95–99%. Hypoxaemia: reduced oxygen in arterial blood (PaO2 <60 mmHg) — a measurable blood gas abnormality; central cyanosis is a clinical sign. Hypoxia: inadequate oxygen delivery to or utilisation by tissue cells — the downstream consequence of hypoxaemia. Hypercapnia (↑CO2) leads to respiratory acidosis and can co-exist in ventilatory failure."},
  {topic:"Respiratory", type:"SAQ",
   q:"List the three stages of ARDS and their key features.",
   opts:null, ans:null,
   explain:"(1) Exudative stage (days 1–7): inflammatory response, altered capillary permeability, microvascular thrombi, pulmonary oedema, proteinaceous deposits in alveoli, reduced surfactant, alveolar cell destruction → atelectasis, hypoxia, hypercapnia. (2) Proliferative stage (days 7–21): fibroblast activation, fibrinolysis, collagen deposition, further hyaline membrane development, cellular regeneration begins. (3) Fibrotic stage (>21 days): coagulation-fibrinolysis imbalance → interstitial fibrin deposits → progressive fall in lung compliance; high risk of infection and sepsis."},

  // LAQ
  {topic:"Respiratory", type:"LAQ",
   q:"Describe the pathophysiological mechanism, clinical manifestations, and management of pneumonia.",
   opts:null, ans:null,
   explain:"Pathophysiology: Pneumonia is an infection of the lower respiratory tract (bacteria, viruses, fungi, protozoa, parasites) causing inflammation of the lung parenchyma. Pathogen entry → alveolar oedema and vascular congestion → immune response damages bronchial mucous membranes and alveolar-capillary membranes → alveoli and terminal bronchioles fill with infectious debris and exudate → consolidation → reduced lung compliance → hypoxia → respiratory acidosis. Patterns: bronchopneumonia (patchy bilateral) or lobar pneumonia (single lobe). Sputum guide: rusty = Streptococcus pneumoniae; green = Pseudomonas; foul-smelling = anaerobes; gelatinous = Klebsiella. Clinical manifestations: hypoxaemia, tachypnoea, dyspnoea, tachycardia, pyrexia, productive cough (colour-specific), reduced lung expansion, pleuritic chest pain, dehydration, lethargy. Diagnosis: physical examination, chest X-ray, pulse oximetry, full blood count (leucocytosis), sputum culture; severity: PSI, CORB, or SMART-COP tools. Management: bacterial = antibiotics; viral = supportive care + antivirals; supplemental oxygen for hypoxaemia; paracetamol for pyrexia; analgesia for pleuritic pain. If sepsis: mechanical ventilation + inotropic support (e.g. dobutamine). Monitor vital signs and fluid balance."},
  {topic:"Respiratory", type:"LAQ",
   q:"Describe the pathophysiology of COPD including chronic bronchitis and emphysema, and outline its management.",
   opts:null, ans:null,
   explain:"Overview: COPD is a progressive, largely irreversible obstructive disease. FEV1/FVC <70%. Primary cause: cigarette smoking and air pollutants → airway epithelium inflammation → inflammatory cytokines → two pathways. Chronic bronchitis: bronchial irritation → increase in mucus glands and goblet cells (size and number) → damaged cilia → mucus plugging → stimulation of irritant receptors → chronic productive cough (at least 3 months). Chronic irritation → bronchial wall thickening → obstruction. 'Blue bloater': cyanosis common, intermittent wheezing, prominent vessels on X-ray. Emphysema: cytokines activate neutrophils/macrophages → release proteases → destroy elastic fibres → permanent airspace enlargement beyond terminal bronchioles, alveolar wall destruction → loss of elastic recoil → air trapping → hyperinflation → barrel chest. 'Pink puffer': severe dyspnoea early, uncommon cyanosis, hyperinflation on X-ray. Shared symptoms: dyspnoea, cough, hypoxaemia, hypercapnia, cor pulmonale; prolonged expiration always present. Management: smoking cessation (most important), bronchodilators (short and long-acting β2-agonists, anticholinergics), inhaled glucocorticosteroids, influenza and pneumococcal vaccination, pulmonary rehabilitation, dietary advice, oxygen therapy, patient education and self-management promotion."},
  {topic:"Respiratory", type:"LAQ",
   q:"List the differences between obstructive and restrictive lung disease.",
   opts:null, ans:null,
   explain:"Primary problem: Obstructive = difficulty exhaling all the air from the lungs; Restrictive = difficulty fully inhaling due to inability to expand the lungs adequately. Mechanism: Obstructive = obstruction/narrowing of airways (smooth muscle contraction, mucus, fibrosis of airway wall); Restrictive = decreased lung compliance from stiffness (lung tissue damage/scarring) or mechanical limitation (chest wall deformity, neuromuscular disease). Airflow pattern: Obstructive = airflow limitation during exhalation; Restrictive = reduced lung volume and limited expansion during inhalation. Spirometry: Obstructive = ↓FEV1/FVC ratio (<70%); Restrictive = ↓FEV1 and ↓FVC, FEV1/FVC ratio normal or elevated. Causes: Obstructive = COPD, asthma, cystic fibrosis, bronchiectasis; Restrictive = ARDS, asbestosis, radiation therapy, kyphosis/scoliosis, poliomyelitis, muscular dystrophy, pneumoconiosis. Symptoms: both cause dyspnoea and reduced exercise tolerance; obstructive symptoms worsen with exhalation; restrictive symptoms more prominent with inhalation. Treatment: Obstructive = bronchodilators, corticosteroids, lifestyle changes; Restrictive = treat underlying cause, oxygen therapy, pulmonary rehabilitation."},
  {topic:"Respiratory", type:"LAQ",
   q:"Describe the pathophysiological mechanism, cardinal signs, and treatment of asthma.",
   opts:null, ans:null,
   explain:"Definition: Chronic inflammatory disorder of the airways — complex interaction of genetic and environmental components producing airway hyperresponsiveness. Types: allergic (IgE-mediated — dust mites, pet dander, pollens), exercise-induced (within 5–20 minutes of exercise), nocturnal (related to circadian rhythm, cold air), occupational (smoke, air pollutants, chemicals). Pathophysiology: Triggering stimulus (allergen/cold/exercise/infection) activates mast cells in bronchi/bronchioles → mast cell degranulation → cytokine release: histamine, kinins, prostaglandins → (1) smooth muscle contraction (bronchoconstriction), (2) increased mucus production, (3) increased capillary permeability → fluid leaks into airway lumen → airways narrow and fill with mucus and fluid → predominantly expiratory obstruction → ↓FEV1/FVC ratio. Cardinal signs: dyspnoea, wheezing (expiratory), cough, chest tightness, tachypnoea, nasopharyngeal congestion. Diagnosis: spirometry (FEV1/FVC), peak expiratory flow, pulse oximetry, arterial blood gas, chest X-ray, clinical history. Management — acute: high Fowler's positioning, nebulised short-acting β2-agonist (e.g. salbutamol), high-flow oxygen, calm reassurance. Long-term: long-acting β2-agonists, inhaled corticosteroids, anti-leukotrienes, mast-cell stabilisers, anti-reflux medication."},
  {topic:"Respiratory", type:"LAQ",
   q:"Describe the pathophysiology, clinical manifestations, and management of ARDS.",
   opts:null, ans:null,
   explain:"Definition: Acute respiratory distress syndrome — a life-threatening condition characterised by acute lung inflammation and diffuse alveolar-capillary injury with lack of surfactant. Causes: pulmonary (direct lung injury) or extrapulmonary (systemic inflammatory response damaging pulmonary vascular endothelium → ↑capillary permeability). Pathophysiology — three stages: (1) Exudative (days 1–7): altered capillary permeability → microvascular thrombi and pulmonary oedema → proteinaceous deposits in alveoli → ↓surfactant → alveolar cell destruction → atelectasis, hypoxia, hypercapnia, cyanosis. (2) Proliferative (days 7–21): fibroblast activation + fibrinolysis → collagen deposition and hyaline membrane development; cellular regeneration begins; further ↓lung compliance and pulmonary hypertension. (3) Fibrotic (>21 days): coagulation-fibrinolysis imbalance → interstitial fibrin deposits → progressive ↓lung compliance; increased infection and sepsis risk. Clinical manifestations: dyspnoea, rapid shallow breathing, inspiratory crackles, respiratory alkalosis, severe hypoxaemia, decreased lung compliance, diffuse alveolar infiltrates on chest X-ray. Evaluation: physical examination, arterial blood gases, chest radiograph. Management: oxygenation with supplemental oxygen; mechanical ventilation with PEEP (reduces atelectasis); prone positioning (improves compliance); sedation; fluid support; inotropes for ↓cardiac output; corticosteroids (manages sepsis risk); prevention of secondary infection."},

  // ── NEWLY ADDED: Cancer & Blood ──
  {topic:"Cancer & Blood", type:"SAQ",
   q:"Define anaemia, thalassaemia, and leukaemia.",
   explain:"Anaemia: a decrease in the haemoglobin concentration or red blood cell count below the normal range for age and sex (Hb <130 g/L in adult men, <120 g/L in adult women), resulting in reduced oxygen-carrying capacity of the blood. Clinical features: fatigue, pallor, dyspnoea on exertion, tachycardia, and in severe cases — high-output cardiac failure. Classified by MCV: microcytic (iron deficiency, thalassaemia), normocytic (haemolytic, anaemia of chronic disease, bone marrow failure), macrocytic (B12/folate deficiency, alcohol, liver disease, hypothyroidism). Thalassaemia: a group of inherited (autosomal recessive) haemoglobin disorders caused by mutations reducing or abolishing synthesis of one of the globin chains (alpha- or beta-globin). Results in ineffective erythropoiesis (intramedullary destruction of defective RBCs) and haemolysis. Beta-thalassaemia major (Cooley's anaemia): severe transfusion-dependent anaemia, extramedullary haemopoiesis (bossing of skull, hepatosplenomegaly), iron overload from transfusions. Diagnosis: Hb electrophoresis (↑HbA2, ↑HbF in beta-thal). Treatment: regular transfusions + iron chelation (desferrioxamine); curative — bone marrow/stem cell transplantation. Leukaemia: malignant neoplastic disorders of haematopoietic stem cells in the bone marrow characterised by impaired differentiation and uncontrolled proliferation of immature white blood cells (blasts). Blast accumulation suppresses normal haemopoiesis → anaemia (↓RBC), thrombocytopenia (↓platelets → bleeding), and neutropenia (↓functional WBCs → infection risk). Types: ALL (most common childhood cancer), AML (most common adult acute leukaemia), CLL (most common adult leukaemia overall — 'smudge cells'), CML (Philadelphia chromosome — BCR-ABL; responds to imatinib)."},
  {topic:"Cancer & Blood", type:"SAQ",
   q:"What happens in Rh incompatibility? Define Haemophilia A and Haemophilia B.",
   explain:"Rh incompatibility: occurs when an Rh-negative mother (anti-D antibodies from prior sensitisation) carries an Rh-positive foetus. Maternal IgG anti-D antibodies cross the placenta and bind to foetal Rh-positive erythrocytes → extravascular haemolysis → anaemia, hyperbilirubinaemia (jaundice), and risk of kernicterus (bilirubin encephalopathy). The first Rh-positive pregnancy usually causes sensitisation (no symptoms in first baby); subsequent pregnancies are progressively more severely affected. Prevention: anti-D immunoglobulin (Rhogam) to Rh-negative mothers antenatally (28 weeks) and postnatally within 72 hours. Treatment of neonate: phototherapy, exchange transfusion, intrauterine transfusion if severe. Haemophilia A: hereditary X-linked recessive bleeding disorder caused by deficiency of clotting Factor VIII (part of the intrinsic pathway / tenase complex). Presents with deep tissue bleeds — haemarthroses (joint bleeds → arthropathy), intramuscular haematomas, prolonged bleeding after surgery or trauma. Laboratory: prolonged APTT, normal PT, normal platelet count. Severity: mild (Factor VIII >5%), moderate (1–5%), severe (<1% — spontaneous bleeds). Treatment: recombinant Factor VIII concentrate (prophylactic or on-demand); desmopressin (DDAVP) releases endogenous Factor VIII stores (mild disease). Haemophilia B (Christmas disease): clinically identical to Haemophilia A but caused by deficiency of Factor IX (also X-linked recessive). Distinguished by Factor IX assay. Treatment: recombinant Factor IX concentrate."},
