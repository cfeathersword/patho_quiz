   q:"TIA differs from stroke in that:",
   opts:["TIA causes permanent neurological damage", "TIA symptoms resolve within ~24 hours", "TIA only occurs in haemorrhagic form", "TIA does not increase future stroke risk"], ans:1,
   explain:"TIA is a brief interruption resolving within ~24 hours; an important warning sign for stroke."},
  {topic:"CNS", type:"MCQ",
   q:"Which of the following is a hallmark feature of Parkinson's disease?",
   opts:["Ascending paralysis from lower limbs", "Resting tremor, rigidity, akinesia, and postural instability (TRAP)", "Symmetric joint inflammation with morning stiffness", "Loss of sensation in 'glove and stocking' distribution"], ans:1,
   explain:"Parkinson's TRAP mnemonic: Tremor (resting), Rigidity, Akinesia/bradykinesia, Postural instability."},
  // SAQ
  {topic:"CNS", type:"SAQ",
   q:"List four cardinal signs of Parkinson's disease and name two neurotransmitters impaired.",
   opts:null, ans:null,
   explain:"Cardinal signs: (1) Resting tremor, (2) Rigidity (lead-pipe/cogwheel), (3) Bradykinesia (slowness of movement), (4) Postural instability. Impaired neurotransmitters: Dopamine (reduced — primary deficit) and Acetylcholine (imbalanced relative to dopamine loss)."},
  {topic:"CNS", type:"SAQ",
   q:"Differentiate between ischaemic and haemorrhagic stroke, and define a transient ischaemic attack (TIA).",
   opts:null, ans:null,
   explain:"Ischaemic stroke: occlusion of a cerebral artery (thrombus or embolus) causing infarction; treated with thrombolytics (if within window) and antiplatelets. Haemorrhagic stroke: rupture of a cerebral vessel causing bleeding into brain tissue; thrombolytics are contraindicated; managed surgically and supportively. TIA: transient episode of neurological dysfunction from focal brain ischaemia, resolving within 24 hours (usually minutes), with no permanent infarction — a major warning sign of impending stroke."},
  {topic:"CNS", type:"SAQ",
   q:"List five risk factors for Alzheimer's disease.",
   opts:null, ans:null,
   explain:"(1) Advanced age, (2) Family history/genetic factors (e.g. APOE-ε4), (3) Female sex, (4) History of head trauma, (5) Cardiovascular risk factors (hypertension, diabetes, obesity), (6) Low educational attainment, (7) Depression."},
  // LAQ
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathophysiology of Alzheimer's disease including intracellular and extracellular changes, stages of clinical progression, and management.",
   opts:null, ans:null,
   explain:"Intracellular: altered tau protein → microtubule collapse → neurofibrillary tangles. Extracellular: secretases cleave amyloid precursor protein (APP) → β-amyloid fragments aggregate → senile (β-amyloid) plaques. Both pathways → oxidative stress, overstimulation of NMDA receptors (excitotoxicity), cholinergic dysfunction, neuronal loss, cortical atrophy, and neuroinflammation. Clinical stages: Mild — confusion, memory loss, depression, personality changes (managed with SSRIs, memory aids, NMDA antagonists, cholinesterase inhibitors). Moderate — ↓attention span, dyspraxia, incontinence, behavioural issues (managed with assisted care, continence aids, psychotropic agents). Severe — total dependence, vegetative state (total care). Alzheimer's represents 50–70% of all dementias."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathophysiological mechanism, cardinal signs, and treatment/management of Parkinson's disease. (10 marks)",
   opts:null, ans:null,
   explain:"Pathophysiology (4 marks): Parkinson's disease involves progressive degeneration of the dopaminergic nigrostriatal pathway — a processing loop involving the cerebral cortex, basal ganglia, and thalamus that coordinates voluntary movement, posture, balance, and muscle tone. The exact cause remains unclear, but contributing factors include toxic dopamine metabolites promoting reactive oxygen species (ROS) formation, neuroinflammation from activated microglial cells, and pro-inflammatory cytokines in the striatum and CSF. As dopamine-producing neurons in the substantia nigra progressively die, the balance between dopamine (inhibitory) and acetylcholine (excitatory) is disrupted, causing motor deficits. Lewy bodies — protein aggregates of alpha-synuclein and ubiquitin — accumulate in surviving neurons. Symptoms only appear after 70–80% of dopaminergic neurons are lost. Cardinal signs — TRAP (4 marks): (1) Tremor at rest — characteristically 'pill-rolling' in the hands; absent during sleep or voluntary movement. (2) Rigidity — 'cogwheel' rigidity; limbs alternate between free and impeded motion during passive movement. (3) Akinesia/bradykinesia — slowness of movement; shuffling gait, loss of facial expression, decreased arm swing, micrographia. (4) Postural instability — occurs late in disease; impaired integration of visual, vestibular, and proprioceptive information; major cause of falls. Management (2 marks): Pharmacological — L-dopa (dopamine prodrug); dopamine agonists (stimulate receptors); MAO-B inhibitors (reduce dopamine destruction); muscarinic antagonists (manage tremor). Non-pharmacological — deep brain stimulation, physiotherapy, nutritional support, patient education."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathological mechanism of Alzheimer's disease and its clinical management. (10 marks)",
   opts:null, ans:null,
   explain:"Pathophysiology (5 marks): Alzheimer's disease is a progressive neurodegenerative condition characterised by profound brain atrophy due to neuronal loss. Two key histological changes occur: Intracellularly — altered tau protein causes microtubules to fragment into insoluble neurofibrillary tangles, collapsing the neuron's cytoskeleton and shape. Extracellularly — the amyloid precursor protein (APP) is cleaved by secretases into beta-amyloid fragments that are not easily cleared and accumulate as amyloid (senile) plaques in brain tissue. These changes lead to oxidative stress, overstimulation of NMDA glutamate receptors (excitotoxicity), neuroinflammation, cholinergic dysfunction, and progressive cortical atrophy. Early neuronal loss occurs in the hippocampus, affecting declarative memory first. Mutations in genes APP, PSEN1, PSEN2, and ApoE are implicated. Clinical manifestations (3 marks): Early — forgetfulness, reduced recall of new memories, some communication difficulty. Moderate — confusion, disorientation, personality changes, anxiety, depression, irritability, wandering. Severe — loss of long-term memories, inability to recognise family, dyspraxia, total dependence. Death typically occurs 5–15 years after diagnosis. Management (2 marks): No cure exists. Acetylcholinesterase inhibitors (e.g. rivastigmine) slow acetylcholine breakdown. NMDA receptor antagonists (e.g. memantine) reduce glutamate excitotoxicity. SSRIs manage depression. Advanced stages require continence aids, secure environments, psychotropic agents, and total supported care. Carers require support regarding behavioural and personality changes."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the differences between ischaemic and haemorrhagic stroke, including causes, pathophysiology, and management. (10 marks)",
   opts:null, ans:null,
   explain:"Ischaemic stroke (4 marks): Caused by sudden obstruction of a cerebral artery from atherosclerotic thrombosis or embolism. This interrupts blood supply to brain tissue, depriving neurons of oxygen and glucose → infarction. More common, lower death rate than haemorrhagic. Subtypes: thrombotic (regular, TIA, lacunar) and embolic. High cholesterol causing fatty arterial deposits is a common cause. Risk factors: hypertension, dyslipidaemia, atrial fibrillation, diabetes. Management: thrombolysis ideally within 90 minutes ('door-to-needle time') using thrombolytic drugs to dissolve the clot. Haemorrhagic stroke (4 marks): Caused by rupture of a cerebral artery → bleeding into brain tissue → raised intracranial pressure (which can displace brain tissue) → disruption of blood supply distal to the rupture. Less common but higher morbidity and mortality. Associated with chronic hypertension, cerebral aneurysm, and arteriovenous malformation (AVM). Pathophysiology: vessel rupture → intracranial haemorrhage → parenchymal displacement → parenchymal compression and meningeal signs → raised ICP and focal parenchymal damage. Management: primarily surgical — open craniotomy (clot evacuation or aneurysm clipping) or closed endovascular embolization. Key clinical note (2 marks): Determining stroke type before treatment is critical — thrombolytics given to a haemorrhagic stroke patient can be fatal. Diagnosis: CT/MRI scanning, physical and neurological assessment, NIHSS scoring, and coagulation profile."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the process of demyelination in multiple sclerosis and its clinical effects. (5 marks)",
   opts:null, ans:null,
   explain:"Multiple sclerosis (MS) is a chronic degenerative autoimmune disease primarily affecting the white matter of the brain and spinal cord. Demyelination process (3 marks): Autoimmune processes — triggered by viruses, toxins, or UV radiation — lead to destruction of oligodendrocytes, the cells responsible for producing and maintaining the myelin sheath. As the myelin sheath is progressively damaged, nerve fibres lose the ability to conduct electrical impulses efficiently via saltatory conduction (jumping between nodes of Ranvier). This causes slowing or complete block of nerve conduction and loss of function in the affected area. In early stages, acute inflammation allows immune cells to breach the blood-brain barrier. Over time, these zones harden into plaques — firm lesions distributed throughout the CNS. Further relapses cause wider neuronal and glial cell loss. MS typically follows a relapsing-remitting pattern before progressing to secondary progressive disease. Clinical effects (2 marks): Symptoms depend on which pathways are affected and include muscular weakness, visual defects (optic neuritis), numbness and paraesthesias, bladder and bowel dysfunction, fatigue, speech difficulties, loss of short-term memory, sexual dysfunction, and depression. Management is pharmacological (baclofen/diazepam for spasticity; oxybutynin for bladder; fluoxetine for depression) and requires a multi-disciplinary approach as MS is incurable."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathophysiology and management of raised intracranial pressure following traumatic brain injury. (5 marks)",
   opts:null, ans:null,
   explain:"Pathophysiology (3 marks): Intracranial pressure (ICP) represents the recordable pressure within the skull generated by three components: brain tissue, cerebrospinal fluid (CSF), and blood. Following traumatic brain injury (TBI), secondary brain trauma develops through mechanisms including hypoxia, hypotension, and oedema. These cause secondary injury by increasing intracranial content — via oedema, haemorrhage, or excessive CSF — raising ICP dangerously. Primary TBI includes coup injuries (tissue damage at the point of impact) and contrecoup injuries (damage on the opposite side). As ICP rises, pressure on the brain stem produces: deteriorating level of consciousness, rising systolic blood pressure, falling diastolic blood pressure (widening pulse pressure), bradycardia, irregular and shallow breathing, and elevated temperature. If untreated, the brain herniates through the tentorium or foramen magnum, causing irreversible damage or death. Management (2 marks): Neurological assessment and vital sign monitoring; pupil size and reactivity assessment; limb movement assessment; oxygen therapy to prevent hypoxia; hypertonic solutions to reduce cerebral oedema; IV fluids; urinary catheterisation and fluid management; blood glucose management; anticonvulsants; feeding support. The central goals are maintaining cerebral perfusion pressure and preventing secondary injury."},
  // SAQ
  {topic:"CNS", type:"SAQ",

   explain:"Alzheimer's disease is a progressive, irreversible decline in cerebral function, particularly memory. The two hallmarks are: (1) Extracellular beta-amyloid plaques — formed from APP fragments, accumulate between neurons and disrupt synaptic signalling. (2) Intracellular neurofibrillary tangles — composed of hyperphosphorylated tau protein, collapse the neuron's internal transport system. Both trigger neuroinflammation and progressive neuronal loss, causing cerebral atrophy and ventricular enlargement."},

   q:"Describe the pathophysiology of traumatic brain injury (TBI), including primary and secondary mechanisms, and explain the causes, signs and management of raised intracranial pressure (ICP). (10 marks)",
   opts:null, ans:null,
   explain:"TBI definition (1 mark): TBI occurs when external mechanical force damages the brain, ranging from mild bruising to life-threatening injury. Causes include traffic accidents, falls, sporting incidents, and violence.\n\nPrimary brain trauma (2 marks): Occurs at the moment of impact. Coup injuries = damage at the impact site. Contrecoup injuries = damage on the opposite side of the brain. Direct mechanical damage causes immediate cell death and loss of neurological function.\n\nSecondary brain trauma (2 marks): Develops hours to days after initial injury. Key mechanisms include hypoxia, hypotension, cerebral oedema, and inflammation. These lead to raised intracranial pressure (ICP), ischaemia, and further cell death.\n\nCauses of raised ICP (2 marks): ICP increases when intracranial content expands beyond the rigid skull — tumour growth, haematoma or haemorrhage, cerebral oedema, or excessive CSF. Hypoxia and hypercapnia worsen ICP by causing cerebral vasodilation.\n\nSigns and symptoms of raised ICP (2 marks): Decreased level of consciousness; headache and visual disturbance; sluggish/unequal pupil response; Cushing's triad — rising systolic BP, falling diastolic BP (widening pulse pressure), bradycardia; irregular slow or shallow breathing; high temperature; abnormal motor response (posturing).\n\nManagement (1 mark): Neurological assessment and GCS monitoring; oxygen therapy; IV fluids; hypertonic solutions (e.g. mannitol) to reduce oedema; anticonvulsants; blood glucose management; catheterisation and fluid balance; nutritional support. If untreated, rising ICP causes fatal brain herniation."},
  {topic:"CNS", type:"LAQ",
   q:"Compare and contrast ischaemic and haemorrhagic stroke, including their causes, pathophysiology, and management approaches. Explain why accurate diagnosis before treatment is critical. (10 marks)",
   opts:null, ans:null,
   explain:"Ischaemic stroke (4 marks): Caused by sudden obstruction of a cerebral artery from atherosclerotic thrombosis or embolism, interrupting blood supply. More common; lower death rate. Subtypes: thrombotic (clot on plaque) and embolic (clot travels from elsewhere). Associated with high cholesterol (fatty arterial deposits) and atrial fibrillation. Management: thrombolysis within 90 minutes ('door-to-needle') using thrombolytics to dissolve the clot. Shorter time = better outcome.\n\nHaemorrhagic stroke (4 marks): Caused by rupture of a cerebral artery → bleeding into brain tissue → raised intracranial pressure (may displace brain tissue) → disrupts blood supply distal to rupture. Less common but higher morbidity and mortality. Strongly associated with chronic hypertension, cerebral aneurysm, and arteriovenous malformation (AVM). Management: primarily surgical — craniotomy (clot evacuation or aneurysm clipping) or endovascular embolisation, or medical (ventriculostomy, osmotic diuretics).\n\nWhy diagnosis matters (2 marks): Giving thrombolytics to a haemorrhagic stroke patient would worsen bleeding and could cause death. CT scan (key early test) and MRI are essential before treatment. NIHSS, carotid duplex, cerebral angiography, and coagulation profile are also used."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the risk factors for stroke, distinguishing between modifiable, non-modifiable, and medical risk factors. Include the role of a transient ischaemic attack (TIA) as a warning sign. (8 marks)",
   opts:null, ans:null,
   explain:"Non-modifiable risk factors (2 marks): Older age; gender (men slightly higher risk); family history of stroke.\n\nMedical risk factors (2 marks): Prior TIA (strongest predictor of future stroke); ischaemic heart disease; atrial fibrillation (increases embolic risk); valvular heart disease; diabetes mellitus.\n\nModifiable risk factors (2 marks): Hypertension (most important modifiable factor); dyslipidaemia (high cholesterol → atherosclerosis); smoking; obesity; poor diet and sedentary lifestyle; excessive alcohol; living in regional/remote areas (reduced care access).\n\nTIA as a warning sign (2 marks): A 'mini-stroke' in which blood supply to the brain is briefly interrupted. Symptoms (weakness, speech difficulty, visual loss) usually resolve within 24 hours. TIA indicates significant underlying thrombotic or embolic disease and signals a high immediate risk of full stroke. Urgent investigation and intervention are required to prevent a completed CVA. Note: 80% of strokes are preventable by addressing modifiable risk factors."},
  {topic:"CNS", type:"LAQ",
   q:"Explain the clinical signs and symptoms of stroke as they relate to the side of the brain affected, and describe the FAST tool used in clinical recognition. (8 marks)",
   opts:null, ans:null,
   explain:"FAST recognition tool (2 marks): Face — has the mouth drooped? Arms — can both arms be raised? Speech — is speech slurred or confused? Time — call 000 immediately. Other signs: sudden weakness/numbness, dizziness, severe headache, visual loss, difficulty swallowing.\n\nLeft hemisphere damage (3 marks): Loss of motor function on the RIGHT side of the body (contralateral); language impairment — expressive aphasia (cannot produce speech) or receptive aphasia (cannot understand speech despite ability to speak); right visual field deficit; frustration and depression over loss of independence; intellectual impairment.\n\nRight hemisphere damage (3 marks): Loss of motor function on the LEFT side of the body (contralateral); language centres NOT typically affected; left visual field deficit; apparent unconcern or denial of deficits (anosognosia); poor judgement and impulsive behaviour.\n\nNeurological basis: Each cerebral hemisphere controls the opposite side of the body due to decussation (crossing) of motor pathways in the brainstem and spinal cord. Damage to one hemisphere causes contralateral motor and sensory deficits."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the pathophysiological mechanism, cardinal signs, non-motor clinical manifestations, and full management (pharmacological and non-pharmacological) of Parkinson's disease. (10 marks)",
   opts:null, ans:null,
   explain:"Pathophysiology (3 marks): Progressive degeneration of the dopaminergic nigrostriatal pathway — the circuit linking the substantia nigra to the basal ganglia, thalamus, and cerebral cortex, essential for smooth voluntary movement, posture, balance, and muscle tone. Dopamine-producing neurons in the substantia nigra progressively die. Motor signs appear only after ~70–80% of neurons are lost. Contributing mechanisms: ROS formation from dopamine metabolites; neuroinflammation via activated microglial cells (pro-inflammatory cytokines in striatum and CSF); Lewy bodies — aggregates of alpha-synuclein and ubiquitin proteins — accumulate in surviving neurons.\n\nCardinal signs — TRAP (3 marks): (1) Tremor at rest — 'pill-rolling' in hands; absent during sleep/action. (2) Rigidity — 'cogwheel' rigidity; alternates between free and impeded motion during passive movement. (3) Akinesia/bradykinesia — slowness; shuffling gait, micrographia, decreased arm swing, freezing of gait (FOG). (4) Postural instability — impaired balance (visual, vestibular, proprioceptive integration); falls.\n\nNon-motor manifestations (2 marks): Autonomic dysfunction (orthostatic hypotension, constipation, urinary issues, sweating); depression, anxiety, dementia; sleep disorders; poor olfaction; 20–30% develop dementia; disease reaches end state in 10–15 years.\n\nManagement (2 marks): Pharmacological — L-dopa (dopamine prodrug, mainstay); dopamine agonists; MAO-B inhibitors; peripheral decarboxylase inhibitors; muscarinic antagonists (tremor); SSRIs (depression). Non-pharmacological — deep brain stimulation; physiotherapy and daily exercise; speech therapy; falls prevention; nutritional support; patient and carer education."},
  {topic:"CNS", type:"LAQ",
   q:"Define Alzheimer's disease and describe its pathophysiology, risk factors, clinical manifestations across all three stages, and management. (10 marks)",
   opts:null, ans:null,
   explain:"Definition (1 mark): Alzheimer's disease (AD) is the most common form of dementia (50–70% of cases) — a progressive, irreversible neurodegenerative disorder causing deterioration of memory, thinking, reasoning, judgement, and learned skills, associated with severe cerebral atrophy.\n\nPathophysiology — two hallmark changes (3 marks): (1) Neurofibrillary tangles (intracellular) — tau protein becomes hyperphosphorylated, causing microtubules to collapse into insoluble aggregates; the neuron's cytoskeleton is destroyed. (2) Beta-amyloid plaques (extracellular) — APP is cleaved by secretases into beta-amyloid fragments that accumulate as senile plaques, triggering inflammation, NMDA receptor excitotoxicity, oxidative stress, cholinergic dysfunction, and progressive neuronal loss → cortical atrophy.\n\nRisk factors (2 marks): Age (risk rises sharply after 65); genetic mutations (APP, PSEN1, PSEN2 for familial early-onset; ApoE gene variants increase risk 4x); cerebrovascular disease, diabetes, obesity; smoking and excessive alcohol.\n\nClinical manifestations by stage (2 marks): Early (2–4 years) — forgetfulness, reduced recall, some communication difficulty. Moderate (2–10 years) — confusion, disorientation, personality changes, irritability, paranoia, wandering, unable to manage daily tasks. Severe (1–3 years) — loss of long-term memory, cannot recognise family, dyspraxia, total dependence, vegetative state. Death typically 5–15 years post-diagnosis.\n\nManagement (2 marks): Acetylcholinesterase inhibitors (e.g. rivastigmine) — slow acetylcholine breakdown; may slow decline. NMDA antagonists (e.g. memantine) — reduce glutamate excitotoxicity. SSRIs for depression. Non-pharmacological: memory aids, frequent reorientation, secure environments, continence aids, carer support. End stage requires total care."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the process of demyelination in multiple sclerosis (MS), including its pathophysiology, clinical manifestations, diagnostic approach, and pharmacological management. (8 marks)",
   opts:null, ans:null,
   explain:"Pathophysiology (3 marks): MS is a chronic degenerative autoimmune disease primarily affecting white matter of the brain and spinal cord. Autoimmune processes — triggered by viruses, toxins, or UV radiation — destroy oligodendrocytes (cells that produce myelin). Loss of the myelin sheath means nerve fibres can no longer conduct electrical impulses efficiently via saltatory conduction (jumping between nodes of Ranvier). Nerve conduction slows or fails, causing loss of function in affected pathways. Zones of inflammation form hardened plaques distributed throughout the CNS. Further relapses cause wider neuronal and glial loss. MS typically follows a relapsing-remitting course before progressing to secondary progressive disease. Autoimmune processes can be triggered by viruses, toxins, or UV radiation.\n\nClinical manifestations (2 marks): Muscular weakness or heaviness in legs; visual defects (optic neuritis); numbness and paraesthesias; bladder and bowel dysfunction; fatigue (very common); speech difficulties; short-term memory loss; sexual dysfunction; depression.\n\nDiagnosis (1 mark): Neurological history and examination; persistently elevated CSF IgG; VEP nerve conduction testing; MRI brain and spinal cord (shows plaques).\n\nPharmacological management (MS is incurable — treatment slows progression) (2 marks): Baclofen or diazepam — muscle spasticity; oxybutynin — bladder dysfunction; fluoxetine/amitriptyline/imipramine — depression; stool softeners/laxatives — constipation. Multi-disciplinary approach essential due to complexity and unpredictability of progression."},
  {topic:"CNS", type:"LAQ",
   q:"Describe the classification of epileptic seizures (partial and generalised), define status epilepticus, and outline both pharmacological and non-pharmacological management of epilepsy. (8 marks)",
   opts:null, ans:null,
   explain:"Definition (1 mark): Epilepsy describes recurrent seizures caused by abnormal electrical discharge in the brain. Status epilepticus is a prolonged seizure that does not spontaneously stop, or repeated seizures without full recovery between them — a life-threatening emergency.\n\nPartial seizures (2 marks): Affect only a portion of the brain; the most common type. Simple partial — short-lived, no loss of consciousness, patient is aware. Complex partial — reduced consciousness; confused, may display automatic (fidgeting) behaviours.\n\nGeneralised seizures (3 marks): Widespread epileptic activity across both hemispheres; usually cause unconsciousness. Absence (petit mal) — brief staring with facial expression change. Myoclonic — brief muscle jerks. Tonic — increased muscle tone, stiff body. Atonic (drop attacks) — sudden loss of muscle tone, no loss of consciousness. Tonic-clonic (grand mal) — loss of consciousness, tonic phase (stiff body) then clonic phase (rhythmic limb jerking). Unclassified — atypical; does not fit partial or generalised pattern.\n\nPharmacological management (1 mark): Carbamazepine, sodium valproate, phenytoin — long-term anticonvulsant therapy. Status epilepticus: maintain airway, give oxygen, protect from injury, administer diazepam until seizures cease. Treatment is usually long-term or lifelong.\n\nNon-pharmacological management (1 mark): Temporal lobectomy (surgical) for drug-resistant focal epilepsy; patient and family education; lifestyle modifications (sleep, alcohol, stress management)."},

  // LAQ
  {topic:"CVS", type:"LAQ",
   q:"Describe the pathophysiology, clinical evaluation, and management of STEMI.",
   opts:null, ans:null,
   explain:"Pathophysiology: atherosclerotic plaque rupture → platelet aggregation and thrombus formation → complete coronary artery occlusion → full-thickness myocardial ischaemia → necrosis. STEMI (ST-Elevation MI) involves transmural infarction distinguishable from NSTEMI (partial thickness, no persistent ST elevation). Evaluation: (1) ECG – ST elevation, Q waves; (2) Troponin I/T – gold standard biomarker; (3) CK-MB – less specific; (4) Echocardiography – assess wall motion; (5) Coronary angiography – definitive anatomy. Management: Reperfusion – primary PCI (preferred, within 90 min) or thrombolytics (if PCI unavailable). Pharmacological: dual antiplatelet therapy (aspirin + clopidogrel/ticagrelor), anticoagulants (heparin), beta-blockers, ACE inhibitors, statins, nitrates. Complications to monitor: arrhythmia, cardiogenic shock, heart failure, pericarditis."},

  {topic:"CVS", type:"SAQ",

   explain:"Pathophysiology: progressive nephron loss → ↓GFR → (1) sodium/water retention: hypertension, oedema, heart failure; (2) hyperkalemia: cardiac risk; (3) nitrogenous waste accumulation: uraemia, coagulopathies, bleeding; (4) ↓erythropoietin: anaemia; (5) acid–base imbalance: acidosis; (6) ↓vitamin D activation: hypocalcaemia → hyperparathyroidism → osteodystrophies; (7) phosphate retention: hypocalcaemia. Signs/symptoms: fatigue, oedema, hypertension, anaemia, pruritus (skin disorders), GI manifestations (nausea), neurological manifestations, sexual dysfunction, pericarditis. Investigations: GFR calculation, serum creatinine/urea/electrolytes, full blood count (anaemia), urinalysis, renal ultrasound, renal biopsy. Management: control hypertension (ACE inhibitors/ARBs), glycaemic control, dietary protein and potassium restriction, treat anaemia (erythropoiesis-stimulating agents), phosphate binders, sodium bicarbonate for acidosis, dialysis (haemodialysis or peritoneal) for end-stage, renal transplantation."},

   q:"Describe the pathophysiological mechanism of acute renal injury (ARI), including its three categories, common manifestations, and management.",
   opts:null, ans:null,
   explain:"Definition: ARI is a sudden decline in kidney function over hours to days, causing fluid and electrolyte imbalance. It is abrupt but reversible with treatment.\n\nThree categories: (1) Prerenal — upstream causes; reduced renal blood flow from trauma, surgery, dehydration, burns, heart failure, or sepsis → decreased glomerular pressure and GFR. (2) Intrarenal — direct kidney damage; most common is acute tubular necrosis (ATN), post-ischaemic or nephrotoxic. Inflammation causes afferent arteriole vasoconstriction, further reducing GFR. (3) Postrenal — obstruction below the kidney (ureter, bladder, prostate) raises tubular pressure → reduced glomerular pressure and GFR. Causes include calculi and prostatic hypertrophy.\n\nManifestations: raised urea and creatinine (azotaemia), uraemia, oliguria or anuria, elevated BP, oedema, hyperkalaemia, malaise, anorexia, weight loss, pruritus.\n\nManagement: identify and treat underlying cause; strict fluid intake/output monitoring. Prerenal: IV fluids, positive inotropes, IDC. Intrarenal: IDC, dialysis, renal vasodilators. Postrenal: urinary catheterisation, analgesia, dialysis. Medications: antibiotics (Gentamicin), antihypertensives (ACE inhibitors). Recovery can take over a year."},
  {topic:"Renal", type:"LAQ",
   q:"Describe the pathological mechanism and treatment strategies for chronic kidney disease (CKD), including its GFR classification system.",
   opts:null, ans:null,
   explain:"Definition: CKD is progressive, irreversible reduction in renal function over months to years. Damage is not apparent until GFR falls below 25% of normal; recovery impossible once >80% of nephrons lost. Requires dialysis or transplant.\n\nPathophysiology: Renal injury → nephron loss → increased Angiotensin II → glomerular capillary hypertension → increased glomerular permeability → proteinuria → increased tubular protein reabsorption → tubulointerstitial inflammation and fibrosis → renal scarring → further nephron loss (self-perpetuating cycle). Systemic hypertension develops, driving further injury. In diabetic nephropathy, glomerular damage causes protein leakage → hypo-albuminaemia.\n\nGFR Classification: G1 ≥90 (normal), G2 60–89 (mildly decreased), G3a 45–59, G3b 30–44, G4 15–29 (severely decreased), G5 <15 (kidney failure). Cross-referenced with albuminuria A1–A3.\n\nManagement: dialysis (haemodialysis via arteriovenous fistula) or transplant for ESRD; antihypertensives; erythropoietin for anaemia; low protein/potassium diet; phosphate binders; sodium bicarbonate for acidosis; antiemetics; dialysis for uraemia."},
  {topic:"Renal", type:"LAQ",
   q:"Describe the pathological mechanism of pyelonephritis, distinguishing between acute and chronic forms, including signs, symptoms, and management.",
   opts:null, ans:null,
   explain:"Definition: Infection and inflammation of the renal pelvis and nephrons. Caused by E. coli, Proteus mirabilis, or Pseudomonas.\n\nMechanism (ascending infection): Bowel flora bacteria enter urethra → ascend to bladder → ascend to renal pelvis → spread to calyces and medullary tissues → may extend to cortex and glomeruli. Phagocytes and inflammatory exudate move into affected tissue, impeding tubule function. Suppuration (pus) and bleeding may occur. In DM, papillae of medullary pyramids may become necrotic.\n\nAcute pyelonephritis — S&S: sudden fever, chills, nausea, vomiting, groin/flank pain, haematuria, dysuria. Management: analgesics, antibiotics, anti-emetics, antipyretics.\n\nChronic pyelonephritis: repeated infection → gradual scarring and loss of functional tissue. Often asymptomatic until considerable irreversible tissue loss; progresses to chronic renal failure. Risk factors: kidney stones, congenital vesicoureteral valve malformations, prostatic enlargement. Management: antibiotics, analgesics, fluid intake, inotropic support if sepsis, continuous haemodynamic monitoring."},
  {topic:"Renal", type:"LAQ",
   q:"What is glomerulonephritis? Describe its pathophysiology, clinical manifestations (renal and systemic), and management.",
   opts:null, ans:null,
   explain:"Definition: Inflammation of the glomerulus triggered by immune complex deposition (e.g. from Streptococcus spp.), leading to a fall in GFR and leaky glomerular membranes. Causes oedema, infection susceptibility, and type III hypersensitivity reactions.\n\nPathophysiology: Immune complexes deposited in glomerulus → cellular proliferation + glomerular damage + basement membrane changes → renal and systemic effects.\n\nRenal effects: haematuria (leaky membranes), proteinuria (protein loss), oliguria (reduced GFR).\n\nSystemic effects: oedema (fluid retention/protein loss), dyspnoea (fluid overload), hypertension, rash (immune complex deposition in skin), flank pain.\n\nManagement: Haematuria → antibiotics; proteinuria → reduced protein diet; oliguria → loop diuretics; oedema → reduced sodium/fluids; hypertension → vasodilators; rash → antipruritics; flank pain → analgesics; immune cause → corticosteroids."},
  {topic:"Renal", type:"LAQ",
   q:"Describe the pathophysiology, types, signs and symptoms, and management of renal calculi, including ESWL and surgical options.",
   opts:null, ans:null,
   explain:"Definition: Renal calculi form when ions precipitate from urine, usually in the renal pelvis. Major component is calcium (Ca2+). Hypercalciuria significantly increases risk.\n\nAetiology: dehydration, immobility, bone carcinoma, UTI, excessive dietary calcium/vitamin D/protein, gout, hyperparathyroidism, family history.\n\nTypes: (1) Calcium oxalate — hypercalciuria and low urinary citrate. (2) Calcium phosphate — renal tubular acidification defects. (3) Uric acid — high protein diet, uric acid supersaturation. (4) Struvite — ammonia in urine from P. mirabilis infection. (5) Cystine — raised cysteine levels in cystinuria patients.\n\nSigns and symptoms: colicky pain, haematuria, nausea, vomiting. Small stones asymptomatic; obstructing stones cause severe colicky pain. Complications: hydronephrosis, staghorn calculi. 1 in 5 stones require surgery.\n\nManagement: dietary modification; encourage fluids; exercise. Thiazide diuretics (with sodium restriction) for calcium stones. Potassium citrate to raise urine pH. Calcium channel blockers and prednisolone to facilitate passage. Penicillamine/tiopronin for cystine stones. ESWL: shock waves fragment stones into small pieces flushed in urine. Surgery (nephrolithotomy or laparoscopic pyelolithotomy) for significant renal compromise, intractable pain, or single functioning kidney."},
  {topic:"Renal", type:"LAQ",
   q:"Describe the pathophysiology of a urinary tract infection (UTI), including ascending infection, manifestations of lower vs upper UTI, and management.",
   opts:null, ans:null,
   explain:"Normal defences: kidneys, ureters, bladder, and proximal urethra are sterile, maintained by urine flushing and secretory IgA.\n\nAscending infection: most UTIs arise from the patient's own bowel flora (E. coli). Bacteria enter the urethra → urethritis → ascend to bladder → cystitis → ascend to ureters (ureteritis) → ascend to kidneys → pyelonephritis. Haematogenous spread (via bloodstream from a distant infection site) is less common.\n\nLower UTI manifestations (urethra + bladder): urethral discharge, dysuria, urinary frequency and urgency, suprapubic tenderness, haematuria.\n\nUpper UTI manifestations (ureters + kidneys): fever, diaphoresis, flank pain, nausea, haematuria, dysuria, tachycardia.\n\nManagement: Lower UTI — antibiotics, urinary alkalisers, analgesia, encourage fluids. Upper UTI — antibiotics, antipyretics, antiemetics, analgesia, encourage fluids. Remove/replace catheter if catheter-associated. Cranberry supplements reduce bacterial adhesion to urothelium. Diagnosis: midstream urine (MSU) culture, urinary dipstick (nitrite/blood), urine appearance."},
  {topic:"Renal", type:"LAQ",
   q:"Compare and contrast cystitis and acute pyelonephritis in terms of classification, symptoms, host risk factors, and treatment.",
   opts:null, ans:null,
   explain:"Cystitis — Classification: Uncomplicated UTI (low risk). Site: Bladder (lower UTI). Symptoms: dysuria, frequency, urgency, suprapubic pain, haematuria — no systemic features. Organisms: E. coli, P. mirabilis. Risk factors: prior UTI, sexual activity, new partner, postmenopausal age, vaginal dysbiosis, recent antibiotic use. Treatment (low MDR risk): nitrofurantoin or fosfomycin. Treatment (high MDR risk): oral beta-lactams and fluoroquinolones until culture sensitivity available.\n\nPyelonephritis — Classification: Complicated UTI (high risk). Site: Renal pelvis and nephrons (upper UTI). Symptoms: fever, chills, flank/groin pain, nausea, vomiting, haematuria, dysuria, tachycardia. Organisms: E. coli, Proteus mirabilis, Pseudomonas. Additional risk factors: anatomic abnormalities, vesicoureteral reflux, diabetes mellitus, pregnancy, catheterisation, urolithiasis, immunosuppression, history of pyelonephritis. Treatment (low MDR risk): ciprofloxacin or levofloxacin. Treatment (high MDR risk): ceftriaxone or ertapenem; trimethoprim-sulfamethoxazole or 3rd-generation cephalosporin."},
  {topic:"Renal", type:"LAQ",
   q:"Describe the two main types of nephritis — tubulo-interstitial nephritis (TIN) and glomerulonephritis (GN) — including their causes, mechanisms, and clinical consequences.",
   opts:null, ans:null,
   explain:"Tubulo-interstitial Nephritis (TIN): Associated with hypersensitivity reactions within the kidney tubules. Inflammatory responses occur in the tubules and associated medullary structures. Acute TIN: eosinophils play a key role; caused by toxins or medications; impedes tubule function; may cause medullary necrosis → acute renal failure. Chronic TIN: repeated acute episodes → gradual replacement of functional tubular structures with fibrous tissue.\n\nGlomerulonephritis (GN): Inflammation of the glomerulus from immune complex deposition (e.g. Streptococcus). GFR falls as membranes become leaky. Causes oedema, infection susceptibility, and type III hypersensitivity reactions. Renal effects: haematuria, proteinuria, oliguria. Systemic effects: oedema, hypertension, dyspnoea, rash, flank pain.\n\nKey distinction: TIN affects tubules and medullary interstitium (impaired tubular secretion/reabsorption); GN affects glomerular filtration (reduced GFR, leaky membranes). Both can progress to acute or chronic renal failure if untreated."},

  // SAQ

  {topic:"Respiratory", type:"SAQ",
   q:"List the trigger factors for asthma and outline the pathophysiology.",
   opts:null, ans:null,
   explain:"Triggers: allergens (pollen, dust mites, pet dander), cold air, exercise, smoke/pollutants, respiratory infections, stress, NSAIDs. Pathophysiology: allergen exposure → IgE-mediated mast cell degranulation → histamine, leukotrienes, prostaglandins release → bronchoconstriction, mucosal oedema, increased mucus secretion → airway narrowing → wheeze, dyspnoea, cough. Chronic inflammation leads to airway remodelling."},
  // LAQ
  {topic:"Respiratory", type:"LAQ",
   q:"Describe the causes, pathophysiology, evaluation, and treatment of community-acquired pneumonia.",
   opts:null, ans:null,
   explain:"Causes: bacterial (Streptococcus pneumoniae most common, Haemophilus influenzae, Mycoplasma), viral (influenza, SARS-CoV-2), fungal (Pneumocystis jirovecii in immunocompromised). Classification by anatomy: lobar (whole lobe consolidation) vs bronchopneumonia (patchy, multifocal). Pathophysiology: pathogen reaches alveoli → inflammatory response → exudate fills alveoli → impaired gas exchange → hypoxia. Evaluation: chest X-ray (consolidation), sputum culture (colour indicates pathogen — green/yellow = bacterial, rust-coloured = pneumococcal), full blood count (↑WCC), CRP, oxygen saturation, blood cultures. Treatment: antibiotics (amoxicillin for mild CAP, co-amoxiclav/clarithromycin for moderate, IV antibiotics for severe), supportive (oxygen, fluids, analgesia), antivirals for viral pneumonia."},

  {topic:"Gastrointestinal", type:"SAQ",
   q:"Describe the causes, complications, and management of GERD.",
   opts:null, ans:null,
   explain:"Causes: incompetent lower oesophageal sphincter (LOS), obesity, hiatus hernia, pregnancy, fatty/spicy foods, alcohol, smoking, lying flat after eating. Complications: oesophagitis, oesophageal stricture, Barrett's oesophagus (precancerous metaplasia), oesophageal adenocarcinoma. Management: lifestyle (weight loss, elevate head of bed, avoid triggers), antacids, H2 blockers (ranitidine), proton pump inhibitors (omeprazole — first line), surgical fundoplication for refractory cases."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Describe the pathogenesis, diagnosis, and management of H. pylori-associated peptic ulcer disease.",
   opts:null, ans:null,
   explain:"Pathogenesis: H. pylori produces urease → ammonia → mucosal damage; triggers local inflammation; disrupts mucus layer and stimulates acid secretion → ulceration. Diagnosis: urea breath test (non-invasive, gold standard), stool antigen test, serology (IgG), endoscopy with CLO test/biopsy. Management: triple therapy — PPI + clarithromycin + amoxicillin (or metronidazole) for 7–14 days. Test for eradication 4–6 weeks after treatment."},
  // LAQ
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of cirrhosis.",
   opts:null, ans:null,
   explain:"Causes: chronic viral hepatitis (HBV, HCV), alcohol abuse, NAFLD, autoimmune hepatitis. Pathophysiology: repeated hepatocyte injury → inflammation → stellate cell activation → fibrosis → disruption of normal liver architecture with regenerative nodules → portal hypertension. Histology: progressive stages — steatosis → hepatitis → fibrosis → cirrhosis → hepatocellular carcinoma. Signs/symptoms: fatigue, jaundice, ascites, oedema, spider naevi, palmar erythema, gynaecomastia, hepatic encephalopathy, coagulopathy. Investigations: LFTs (↑AST/ALT/bilirubin, ↓albumin), coagulation studies (↑PT), FBC, liver ultrasound, fibroscan (elastography), liver biopsy. Management: treat underlying cause (antivirals, alcohol cessation), low-sodium diet, diuretics (spironolactone + furosemide) for ascites, beta-blockers for portal hypertension, lactulose for encephalopathy, liver transplantation for end-stage disease."},
  // SAQ
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Name three factors that cause GORD.",
   explain:"(1) Reduced lower oesophageal sphincter (LOS) tone — due to altered neuromuscular control. (2) Increased intra-abdominal pressure — from obesity, pregnancy, or straining. (3) Delayed gastric emptying — allows prolonged gastric distension and acid production."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Define cirrhosis and list four complications.",
   explain:"Cirrhosis is extensive hepatic scarring with replacement of normal hepatocyte organisation by regenerative nodules. Complications: (1) Portal hypertension → oesophageal varices. (2) Hepatic encephalopathy — toxin accumulation causing confusion/coma. (3) Bacterial peritonitis — ascitic fluid infection. (4) Hepatocellular carcinoma — oncogene activation in dividing hepatocytes."},

  {topic:"Endocrine", type:"MCQ",

  {topic:"Endocrine", type:"MCQ",

  {topic:"Endocrine", type:"MCQ",

  // SAQ
  {topic:"Endocrine", type:"SAQ",
   q:"Differentiate between Type 1 and Type 2 diabetes mellitus.",

   explain:"Type 1 DM: autoimmune destruction of pancreatic β-cells → absolute insulin deficiency; onset typically in childhood/young adults; requires insulin; prone to diabetic ketoacidosis (DKA). Type 2 DM: insulin resistance with relative insulin deficiency; associated with obesity, sedentary lifestyle, older age; managed with lifestyle modification, oral hypoglycaemics (metformin first line), and eventually insulin; prone to hyperosmolar hyperglycaemic state (HHS)."},

  {topic:"Endocrine", type:"SAQ",

  {topic:"MSK", type:"MCQ",

  // LAQ
  {topic:"MSK", type:"LAQ",
   q:"Describe the pathophysiology, signs and symptoms, investigations, and management of rheumatoid arthritis.",
   opts:null, ans:null,
   explain:"Pathophysiology: autoimmune activation (CD4+ T cells, B cells) → synovial membrane inflammation → pannus (vascular granulation tissue) formation → invasion and destruction of cartilage and bone. Pro-inflammatory cytokines (TNF-α, IL-1, IL-6) sustain the inflammatory cycle. Signs/symptoms: symmetrical joint pain and swelling (MCP, PIP, wrists, knees), morning stiffness >1 hour, systemic features (fatigue, fever, weight loss), extra-articular features (rheumatoid nodules, pulmonary fibrosis, vasculitis, Sjögren's overlap). Investigations: ESR and CRP ↑, rheumatoid factor (positive in ~70%), anti-CCP antibody (most specific), X-ray (periarticular osteoporosis, joint space narrowing, erosions), ultrasound/MRI for early synovitis. Management: DMARDs (methotrexate — first line), biological agents (anti-TNF: etanercept, adalimumab; anti-IL-6: tocilizumab), NSAIDs and corticosteroids (short-term), physiotherapy, occupational therapy, surgical joint replacement if severe."},
  // SAQ
  {topic:"MSK", type:"SAQ",
   q:"Describe the pathophysiology and clinical presentation of gout, and outline acute and long-term management.",
   opts:null, ans:null,
   explain:"Pathophysiology: hyperuricaemia (reduced renal excretion in >90%) → monosodium urate crystal deposition in joints and soft tissues → neutrophil-mediated inflammatory response (crystals activate NLRP3 inflammasome → IL-1β release) → intense acute arthritis. Crystals cannot be dissolved once formed. Clinical presentation: acute monoarthritis (podagra — 1st MTP joint in >50%), sudden onset of severe pain, erythema, warmth, swelling; self-limiting in 5–14 days. Chronic gout: tophi (crystal deposits in soft tissue), joint damage, renal stones. Management — Acute: NSAIDs (first-line), colchicine (inhibits neutrophil microtubule function), corticosteroids (if contraindications to NSAIDs). Long-term: allopurinol (xanthine oxidase inhibitor — reduces uric acid production), probenecid (uricosuric — increases renal excretion), dietary modification (avoid organ meats, shellfish, alcohol, fructose), adequate hydration."},

   q:"Describe the pathophysiology, signs and symptoms, and management of Duchenne Muscular Dystrophy (DMD).",
   opts:null, ans:null,
   explain:"Pathophysiology: X-linked mutation in the dystrophin gene (Xp21) → absent dystrophin protein → sarcolemmal membrane instability → uncontrolled calcium influx → proteolysis → muscle fibre necrosis → replacement by fibrous and fatty tissue. DMD has null mutations (no dystrophin); Becker MD has partial dystrophin (milder). Signs and symptoms: delayed motor milestones (late walking), frequent falls, Gowers' sign (using arms to stand from floor), pseudohypertrophy of calves (fat replaces muscle), waddling gait, progressive proximal weakness, cardiomyopathy, and respiratory failure (leading causes of death). Management: corticosteroids (prednisolone/deflazacort — slow muscle deterioration), physiotherapy, spinal bracing (scoliosis), non-invasive ventilation (respiratory failure), cardiac monitoring and ACE inhibitors (cardiomyopathy), gene therapy approaches (exon skipping — ataluren for nonsense mutations), multidisciplinary team care."},
  // LAQ
  {topic:"MSK", type:"LAQ",
   q:"Compare and contrast osteoarthritis, rheumatoid arthritis, and gout — including pathophysiology, joint distribution, morning stiffness, key investigations, and management principles.",
   opts:null, ans:null,
   explain:"Osteoarthritis — Pathophysiology: degenerative/mechanical; IL-1 and TNF-α activate MMPs → cartilage breakdown; cartilage fibrillation → clefts → eburnation; subchondral bone hypertrophies. Joint distribution: asymmetric; weight-bearing joints (knees, hips), DIP hands, spine. Morning stiffness: <15 minutes. Key investigations: X-ray (joint space narrowing, osteophytes, subchondral sclerosis); synovial fluid is non-inflammatory. Management: NSAIDs, weight loss, exercise, intra-articular corticosteroids, joint replacement. Rheumatoid Arthritis — Pathophysiology: autoimmune; CD4+ T cells attack synovium → macrophage activation → TNF-α, IL-1, RANK ligand → pannus formation → cartilage and bone erosion. Joint distribution: symmetric; small joints (MCP, PIP, wrists, feet). Morning stiffness: >1 hour. Key investigations: anti-CCP (~90% specific), rheumatoid factor, elevated ESR/CRP, X-ray (erosions, periarticular osteoporosis), ACR/EULAR score ≥6. Management: methotrexate (DMARD first-line), anti-TNF biologics (infliximab, adalimumab), corticosteroids, physiotherapy. Gout — Pathophysiology: metabolic; reduced renal uric acid excretion → hyperuricaemia → monosodium urate crystal deposition → neutrophil-mediated NLRP3 activation → acute inflammation. Joint distribution: monoarticular; 1st MTP (podagra) in >50%, then ankles, knees. Morning stiffness: not prominent. Key investigations: serum uric acid, arthrocentesis (needle-shaped, negatively birefringent crystals under polarising microscopy). Management: acute — NSAIDs, colchicine, corticosteroids; long-term — allopurinol, probenecid, dietary modification."},
  // SAQ
  {topic:"MSK", type:"SAQ",
   q:"Compare osteoarthritis, rheumatoid arthritis, and gout across four features.",
   explain:"(1) Type: OA = degenerative; RA = autoimmune; Gout = metabolic crystal deposition. (2) Joints: OA = weight-bearing (knees/hips) asymmetrically; RA = small joints (hands/wrists) symmetrically; Gout = 1st MTP joint. (3) Morning stiffness: OA = <15 min; RA = >1 hour; Gout = not a key feature. (4) Key marker: OA = X-ray joint space narrowing; RA = anti-CCP antibody; Gout = serum uric acid + crystal arthrocentesis."},
  {topic:"MSK", type:"SAQ",
   q:"List three risk factors for developing gout.",
   explain:"(1) Diet high in purines — organ meats, seafood, red wine, legumes. (2) Reduced renal excretion of uric acid — in >90% of gout patients; worsened by diuretics and chronic renal failure. (3) Male sex and older age — 5:1 male:female ratio; postmenopausal women lose oestrogen-mediated uricosuria."},

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  {topic:"Reproductive", type:"MCQ",

  // SAQ
  {topic:"Reproductive", type:"SAQ",
   q:"Differentiate between primary and secondary dysmenorrhoea.",
   opts:null, ans:null,
   explain:"Primary dysmenorrhoea: painful menstruation without underlying pathology; caused by excess prostaglandin production → uterine contractions and ischaemia; treated with NSAIDs and OCP. Secondary dysmenorrhoea: painful menstruation due to an underlying pelvic condition (e.g. endometriosis, fibroids, adenomyosis, PID); usually worsens with age; treatment targets the underlying cause."},
  {topic:"Reproductive", type:"SAQ",
   q:"Describe the pathological mechanism and clinical manifestations of endometriosis.",
   opts:null, ans:null,
   explain:"Pathological mechanism: retrograde menstruation deposits endometrial cells outside the uterus (ovaries, fallopian tubes, peritoneum, bowel) → ectopic implants respond to hormonal cycles → inflammation, scarring, adhesions, and cysts (endometriomas). Clinical manifestations: cyclical pelvic pain worsening around menstruation, dyspareunia (painful intercourse), dysmenorrhoea, subfertility/infertility, heavy menstrual bleeding, bowel/bladder symptoms (depending on location of implants)."},
  {topic:"Reproductive", type:"SAQ",
   q:"Differentiate between varicocele, hydrocele, and spermatocele.",

  {topic:"Reproductive", type:"SAQ",
   q:"List two treatments for primary dysmenorrhoea.",

  {topic:"Reproductive", type:"SAQ",

  {topic:"Inflammation", type:"MCQ",
   q:"What is the Latin term for redness in acute inflammation?",
   opts:["Rubor","Calor","Tumor","Dolor"], ans:0,
   explain:"The five cardinal signs of acute inflammation are: rubor (redness), calor (heat), tumor (swelling), dolor (pain), and loss of function. Rubor results from vasodilation and increased blood flow to the affected tissue."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which phase of acute inflammation involves white cell migration to the injury site?",
   opts:["Cellular phase","Vascular phase","Resolution phase","Fibrotic phase"], ans:0,
   explain:"The cellular phase follows the initial vascular phase. It involves leukocyte margination, rolling, adhesion to endothelium, diapedesis (squeezing through vessel walls), and chemotaxis toward the site of injury."},
  {topic:"Inflammation", type:"MCQ",
   q:"What type of exudate contains pus with cell debris and microbes?",
   opts:["Purulent","Serous","Fibrinous","Haemorrhagic"], ans:0,
   explain:"Purulent (suppurative) exudate contains pus — a mixture of dead neutrophils, cell debris, and microorganisms. It is characteristic of bacterial infections causing pyogenic (pus-forming) inflammation."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which exudate type is watery with low protein content?",
   opts:["Serous","Fibrinous","Purulent","Haemorrhagic"], ans:0,
   explain:"Serous exudate is watery, pale, and has a low protein content. It resembles serum and is typical of mild inflammation (e.g. early blister fluid). It indicates increased capillary permeability without significant cellular component."},
  {topic:"Inflammation", type:"MCQ",
   q:"What process allows white cells to squeeze through capillary walls?",
   opts:["Diapedesis","Chemotaxis","Opsonisation","Phagocytosis"], ans:0,
   explain:"Diapedesis (also called transmigration or extravasation) is the process by which leukocytes squeeze between endothelial cells to exit blood vessels and migrate into inflamed tissue. It follows rolling and firm adhesion mediated by selectins and integrins."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which inflammatory mediator is released by mast cells and causes vasodilation?",
   opts:["Histamine","Fibrin","Erythropoietin","Collagen"], ans:0,
   explain:"Histamine is stored in mast cell granules and released immediately upon injury or immune activation. It causes vasodilation and increased vascular permeability, contributing to the early vascular phase of inflammation (heat and redness)."},
  {topic:"Inflammation", type:"MCQ",
   q:"How long must inflammation persist to be classified as chronic?",
   opts:["Over two weeks","Over 48 hours","Over one week","Over one month"], ans:0,
   explain:"Chronic inflammation is generally defined as inflammation persisting beyond two weeks. It is characterised by macrophage and lymphocyte infiltration, tissue destruction, and attempts at repair (fibrosis), in contrast to the neutrophil-dominant acute phase."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which healing type involves significant tissue loss and prolonged healing time?",
   opts:["Second intention","First intention","Direct closure","Fibrinous healing"], ans:0,
   explain:"Healing by second intention occurs when wound edges cannot be approximated — there is significant tissue loss, resulting in prolonged granulation tissue formation, contraction, and scar formation. First intention (primary closure) applies to clean wounds with apposed edges."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which drug class broadly suppresses inflammatory mediator production?",
   opts:["Corticosteroids","Antihistamines","Anticoagulants","Analgesics"], ans:0,
   explain:"Corticosteroids (e.g. prednisolone, dexamethasone) broadly suppress inflammation by inhibiting phospholipase A2 → reducing arachidonic acid production → fewer prostaglandins, leukotrienes, and thromboxanes. They also reduce cytokine production and leukocyte migration."},
  {topic:"Inflammation", type:"MCQ",
   q:"Which cells predominate in acute inflammation?",
   opts:["Macrophages", "Lymphocytes", "Neutrophils", "Plasma cells"], ans:2,
   explain:"Neutrophils are the first responders and predominant cells in acute inflammation."},
  {topic:"Inflammation", type:"MCQ",
   q:"The cardinal sign of inflammation 'calor' refers to:",
   opts:["Redness", "Heat", "Swelling", "Pain"], ans:1,
   explain:"Calor = heat (from increased blood flow). Rubor = redness. Tumor = swelling. Dolor = pain."},
  // SAQ
  {topic:"Inflammation", type:"SAQ",
   q:"Describe the two phases of the acute inflammatory response.",
   opts:null, ans:null,
   explain:"Phase 1 – Vascular phase: vasodilation and increased capillary permeability cause heat, redness, and swelling. Histamine and serotonin are key early mediators. Phase 2 – Cellular phase: leukocyte migration (margination → rolling → adhesion → chemotaxis) from vessels into tissues, causing pain and facilitating phagocytosis."},
  {topic:"Inflammation", type:"SAQ",
   q:"Distinguish between acute and chronic inflammation in terms of duration, predominant cell type, and outcomes.",
   opts:null, ans:null,
   explain:"Acute: immediate/early response (minutes–days), neutrophil-dominant, vascular phase prominent, may resolve or progress. Chronic: weeks–years, macrophage and lymphocyte infiltration, fibrosis, associated with autoimmune disease and metabolic disorders. Chronic may arise from recurrent acute episodes or from persistent stimuli."},
  {topic:"Inflammation", type:"SAQ",
   q:"Differentiate between a keloid scar and a hypertrophic scar.",
   opts:null, ans:null,
   explain:"Hypertrophic scar: raised scar that stays within the wound boundaries, may regress over time, occurs due to excessive collagen deposition during healing. Keloid: scar that extends beyond original wound margins into normal tissue, does not regress, contains thick irregular collagen bundles, more common in darker skin types."},
  // LAQ
  {topic:"Inflammation", type:"LAQ",
   q:"Explain the full pathway of inflammation from trigger to resolution or chronic disease, including key cellular events and mediators.",
   opts:null, ans:null,
   explain:"Trigger (immunological, humoral, biomechanical, physical) → Cell response: calcium entry, receptor activation, upregulation of pro-inflammatory genes, downregulation of anti-inflammatory genes, release of mediators (histamine, serotonin, bradykinin, C3a/C5a, PGE-2, LTB-4, PAF, IL-1, IL-6), expression of adhesion molecules → Microvascular consequences: enhanced endothelial permeability, leukocyte entrapment/rolling/adhesion/migration (chemotaxis), monocyte/T-lymphocyte infiltration, thrombosis, apoptosis, organ dysfunction → Either: Resolution (growth factor synthesis, angiogenesis, scar/tissue remodelling) OR Non-resolved chronic inflammation → disease (autoimmune disorders, metabolic disease)."},
  // SAQ
  {topic:"Inflammation", type:"SAQ",
   q:"Define acute inflammation and list the five cardinal signs with their causes.",
   explain:"Acute inflammation is the immediate vascular and cellular response to tissue injury or infection. (1) Redness (rubor) — local vasodilation → increased blood flow. (2) Heat (calor) — increased blood flow and metabolic activity. (3) Swelling (tumor) — increased vascular permeability → fluid exudation. (4) Pain (dolor) — bradykinin and prostaglandins stimulate nociceptors. (5) Loss of function (functio laesa) — combined result of the above signs and tissue damage."},

  {topic:"Cancer & Blood", type:"MCQ",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What type of protein in cancer cells confers resistance to programmed cell death?",
   opts:["Anti-apoptotic proteins","Fibrinogen","Histamine","Prostaglandins"], ans:0,
   explain:"Cancer cells overexpress anti-apoptotic proteins (e.g. Bcl-2) and inactivate pro-apoptotic pathways (e.g. p53 mutations). This resistance to apoptosis allows tumour cells to survive despite DNA damage signals that would normally trigger cell death."},
  {topic:"Cancer & Blood", type:"MCQ",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which anaemia is classified as macrocytic and normochromic?",
   opts:["Pernicious anaemia","Iron-deficiency anaemia","Sickle cell anaemia","Thalassaemia"], ans:0,
   explain:"Pernicious anaemia (B12 deficiency) causes macrocytic (large), normochromic red blood cells due to impaired DNA synthesis — megaloblastic changes. It results from autoimmune destruction of gastric parietal cells → loss of intrinsic factor → B12 malabsorption."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What globin chain is mutated in sickle cell anaemia?",
   opts:["β-globin chain","α-globin chain","γ-globin chain","δ-globin chain"], ans:0,
   explain:"Sickle cell anaemia is caused by a point mutation in the HBB gene encoding the β-globin chain — glutamate is replaced by valine. Under low oxygen, HbS polymerises → red cells adopt a rigid sickle shape → haemolysis and vaso-occlusion."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which haemophilia type is also known as Christmas disease?",
   opts:["Haemophilia B","Haemophilia A","Haemophilia C","Von Willebrand disease"], ans:0,
   explain:"Haemophilia B (Christmas disease) is an X-linked bleeding disorder caused by deficiency of clotting factor IX. Haemophilia A involves factor VIII deficiency. Both present with joint bleeds and prolonged bleeding after injury."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What cells are the histological hallmark of Hodgkin lymphoma?",
   opts:["Reed-Sternberg cells","Plasma cells","Mast cells","Neutrophils"], ans:0,
   explain:"Reed-Sternberg cells are large, binucleated or multinucleated cells (owl-eye appearance) that are pathognomonic for Hodgkin lymphoma. They are derived from germinal centre B cells and are required for the histological diagnosis."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What abnormal product do multiple myeloma cells produce in excess?",
   opts:["Abnormal immunoglobulins (M proteins)","Excess erythrocytes","Deficient platelets","Excess fibrin"], ans:0,
   explain:"Multiple myeloma is a malignant proliferation of plasma cells that produces monoclonal immunoglobulins (M proteins / paraproteins). These accumulate in blood and urine (Bence Jones proteins), causing bone marrow failure, renal damage, and immunodeficiency."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"What is polycythaemia?",
   opts:["Overproduction of erythrocytes","Deficiency of platelets","Excess white cells","Reduced haemoglobin"], ans:0,
   explain:"Polycythaemia (polycythaemia vera) is a myeloproliferative disorder characterised by overproduction of erythrocytes → increased blood viscosity → risk of thrombosis, stroke, and organ damage. It is associated with a JAK2 V617F mutation."},
  {topic:"Cancer & Blood", type:"MCQ",
   q:"In sickle cell anaemia, haemolysis occurs because:",

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Haemophilia B is caused by a deficiency of which clotting factor?",

  // SAQ
  {topic:"Cancer & Blood", type:"SAQ",
   q:"Differentiate between iron deficiency anaemia and pernicious (megaloblastic) anaemia.",
