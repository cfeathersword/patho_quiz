<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathophysiology Practice Exam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #5a5a56; --text3: #999994;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb; --blue-text: #185fa5; --blue-border: #b5d4f4;
    --green-bg: #eaf3de; --green-text: #3b6d11; --green-border: #c0dd97;
    --amber-bg: #faeeda; --amber-text: #854f0b; --amber-border: #fac775;
    --correct-bg: #eaf3de; --correct-border: #639922; --correct-text: #27500a;
    --wrong-bg: #fcebeb; --wrong-border: #a32d2d; --wrong-text: #501313;
    --accent: #1D9E75;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2e2e2b;
      --text: #f0ede6; --text2: #aaa89f; --text3: #6b6965;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-bg: #042c53; --blue-text: #85b7eb; --blue-border: #185fa5;
      --green-bg: #173404; --green-text: #97c459; --green-border: #3b6d11;
      --amber-bg: #412402; --amber-text: #fac775; --amber-border: #854f0b;
      --correct-bg: #173404; --correct-border: #639922; --correct-text: #c0dd97;
      --wrong-bg: #501313; --wrong-border: #a32d2d; --wrong-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; padding: 2rem 0 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .topic-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .topic-btn { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .topic-btn:hover { background: var(--bg2); }
  .topic-btn.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .score-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; min-height: 24px; }
  .score-pill { font-size: 13px; color: var(--text2); }
  .score-pill span { font-weight: 600; color: var(--text); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-num { font-size: 12px; color: var(--text3); }
  .q-type { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em; }
  .type-MCQ { background: var(--blue-bg); color: var(--blue-text); }
  .type-SAQ { background: var(--green-bg); color: var(--green-text); }
  .type-LAQ { background: var(--amber-bg); color: var(--amber-text); }
  .question { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.65; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .opt { padding: 11px 14px; border: 0.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text); background: var(--bg); transition: all 0.15s; text-align: left; font-family: inherit; line-height: 1.5; }
  .opt:hover:not(:disabled) { background: var(--bg2); border-color: var(--border2); }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); font-weight: 500; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }
  .opt:disabled { cursor: default; }
  .answer-box { background: var(--bg2); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; font-size: 14px; color: var(--text); line-height: 1.75; margin-bottom: 1.25rem; display: none; }
  .answer-box.show { display: block; }
  .answer-box strong { color: var(--accent); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 9px 20px; border: 0.5px solid var(--border2); border-radius: 10px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 10px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--bg2); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 600; color: var(--text); }
  .topic-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg3); color: var(--text3); display: inline-block; margin-bottom: 8px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-divider { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }
  .type-btn { font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 20px; cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: 0.02em; border: 1.5px solid transparent; }
  .type-btn-all  { background: var(--bg); color: var(--text2); border-color: var(--border2); }
  .type-btn-all.active  { background: var(--text); color: var(--bg); border-color: var(--text); }
  .type-btn-MCQ  { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); opacity: 0.55; }
  .type-btn-MCQ.active  { opacity: 1; box-shadow: 0 0 0 2px var(--blue-border); }
  .type-btn-SAQ  { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); opacity: 0.55; }
  .type-btn-SAQ.active  { opacity: 1; box-shadow: 0 0 0 2px var(--green-border); }
  .type-btn-LAQ  { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); opacity: 0.55; }
  .type-btn-LAQ.active  { opacity: 1; box-shadow: 0 0 0 2px var(--amber-border); }
  footer { text-align: center; padding: 2rem 0 1rem; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Pathophysiology Practice Exam</h1>
    <p>MCQ · Short Answer · Long Answer — all topics</p>
  </header>

  <div class="card">
    <div class="section-label">Filter by topic</div>
    <div class="topic-nav" id="topicNav"></div>

    <div class="filter-row">
      <div class="section-label" style="margin-bottom:0;white-space:nowrap">Question type</div>
      <div class="filter-divider"></div>
      <button class="type-btn type-btn-all active" id="typeAll" onclick="setType('All')">All</button>
      <button class="type-btn type-btn-MCQ" id="typeMCQ" onclick="setType('MCQ')">MCQ · 151</button>
      <button class="type-btn type-btn-SAQ" id="typeSAQ" onclick="setType('SAQ')">SAQ · 42</button>
      <button class="type-btn type-btn-LAQ" id="typeLAQ" onclick="setType('LAQ')">LAQ · 13</button>
    </div>

    <div class="stats-grid" id="statsGrid" style="display:none"></div>
    <div class="score-bar" id="scoreBar"></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

    <div class="q-meta">
      <span class="q-num" id="qNum"></span>
      <span class="q-type" id="qType"></span>
    </div>
    <div class="topic-tag" id="qTopic"></div>
    <div class="question" id="qText"></div>
    <div class="options" id="opts"></div>
    <div class="answer-box" id="answerBox"></div>
    <div class="btn-row">
      <button class="btn" id="revealBtn" onclick="reveal()">Show answer</button>
      <button class="btn btn-primary" onclick="next()">Next question →</button>
      <button class="btn" onclick="shuffle()">Shuffle</button>
      <button class="btn" onclick="resetStats()">Reset score</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <footer>Offline quiz — all content from your Pathophysiology lecture slides.</footer>
</div>

<script>
const QUESTIONS = [
  // ── INFLAMMATION & HEALING ──
  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which of the following is NOT a cardinal sign of inflammation?",
   opts:["Heat (calor)","Redness (rubor)","Cyanosis","Pain (dolor)"], ans:2,
   explain:"The four cardinal signs of inflammation are heat (calor), redness (rubor), swelling (tumour), and pain (dolor). A fifth is loss of function. Cyanosis is a sign of tissue hypoxia, not inflammation."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which inflammatory mediator is an anaphylatoxin?",
   opts:["Bradykinin","IL-6","C5a","Serotonin"], ans:2,
   explain:"C3a and C5a are complement-derived anaphylatoxins that trigger mast cell degranulation, vasodilation, and increased vascular permeability."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"IL-6 induces synthesis of all of the following EXCEPT:",
   opts:["CRP","Fibrinogen","Albumin","Hepcidin"], ans:2,
   explain:"IL-6 induces CRP, serum amyloid A, fibrinogen, and hepcidin (acute phase proteins) but INHIBITS production of albumin."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which cells are predominant in chronic inflammation?",
   opts:["Neutrophils and mast cells","Macrophages and lymphocytes","Eosinophils and basophils","Platelets and erythrocytes"], ans:1,
   explain:"Chronic inflammation is characterised by infiltration of macrophages and lymphocytes, fibrosis, and granuloma formation, in contrast to the neutrophil-dominated acute phase."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Describe the two phases of the acute inflammatory response.",
   opts:null, ans:null,
   explain:"Phase 1 – Vascular phase: vasodilation and increased capillary permeability cause heat, redness, and swelling. Histamine and serotonin are key early mediators. Phase 2 – Cellular phase: leukocyte migration (margination → rolling → adhesion → chemotaxis) from vessels into tissues, causing pain and facilitating phagocytosis."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Distinguish between acute and chronic inflammation in terms of duration, predominant cell type, and outcomes.",
   opts:null, ans:null,
   explain:"Acute: immediate/early response (minutes–days), neutrophil-dominant, vascular phase prominent, may resolve or progress. Chronic: weeks–years, macrophage and lymphocyte infiltration, fibrosis, associated with autoimmune disease and metabolic disorders. Chronic may arise from recurrent acute episodes or from persistent stimuli."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Differentiate between a keloid scar and a hypertrophic scar.",
   opts:null, ans:null,
   explain:"Hypertrophic scar: raised scar that stays within the wound boundaries, may regress over time, occurs due to excessive collagen deposition during healing. Keloid: scar that extends beyond original wound margins into normal tissue, does not regress, contains thick irregular collagen bundles, more common in darker skin types."},

  {topic:"Inflammation & Healing", type:"LAQ",
   q:"Explain the full pathway of inflammation from trigger to resolution or chronic disease, including key cellular events and mediators.",
   opts:null, ans:null,
   explain:"Trigger (immunological, humoral, biomechanical, physical) → Cell response: calcium entry, receptor activation, upregulation of pro-inflammatory genes, downregulation of anti-inflammatory genes, release of mediators (histamine, serotonin, bradykinin, C3a/C5a, PGE-2, LTB-4, PAF, IL-1, IL-6), expression of adhesion molecules → Microvascular consequences: enhanced endothelial permeability, leukocyte entrapment/rolling/adhesion/migration (chemotaxis), monocyte/T-lymphocyte infiltration, thrombosis, apoptosis, organ dysfunction → Either: Resolution (growth factor synthesis, angiogenesis, scar/tissue remodelling) OR Non-resolved chronic inflammation → disease (autoimmune disorders, metabolic disease)."},

  // ── CNS ──
  {topic:"CNS Disorders", type:"MCQ",
   q:"Which pathological hallmarks are characteristic of Alzheimer's disease?",
   opts:["Lewy bodies and dopamine loss","Neurofibrillary tangles and β-amyloid plaques","Demyelination and gliosis","Prion aggregates and cortical thinning"], ans:1,
   explain:"Alzheimer's is defined by intracellular neurofibrillary tangles (from altered tau protein) and extracellular β-amyloid (senile) plaques, leading to neuronal loss and cortical atrophy."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"In Parkinson's disease, which pathway degenerates to produce motor deficits?",
   opts:["Corticospinal tract","Nigrostriatal pathway","Spinocerebellar tract","Limbic pathway"], ans:1,
   explain:"Loss of dopamine-producing neurons in the substantia nigra leads to degeneration of the nigrostriatal pathway, causing the cardinal features: tremor, rigidity, bradykinesia, and postural instability."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"An absence seizure typically lasts:",
   opts:["30–60 seconds","1–5 minutes","5–10 seconds","10–15 seconds"], ans:2,
   explain:"Absence seizures last approximately 5–10 seconds, characterised by cessation of activity and loss of awareness without falling."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"Which type of dementia is associated with prion particles and is rapidly fatal after symptoms appear?",
   opts:["Vascular dementia","Alcohol-related dementia","Creutzfeldt-Jakob dementia","Fronto-temporal lobar degeneration"], ans:2,
   explain:"Creutzfeldt-Jakob disease is caused by prion particles. It presents with dementia, behavioural and motor changes, and death occurs soon after symptoms become apparent."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"List four cardinal signs of Parkinson's disease and name two neurotransmitters impaired.",
   opts:null, ans:null,
   explain:"Cardinal signs: (1) Resting tremor, (2) Rigidity (lead-pipe/cogwheel), (3) Bradykinesia (slowness of movement), (4) Postural instability. Impaired neurotransmitters: Dopamine (reduced — primary deficit) and Acetylcholine (imbalanced relative to dopamine loss)."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"Differentiate between ischaemic and haemorrhagic stroke, and define a transient ischaemic attack (TIA).",
   opts:null, ans:null,
   explain:"Ischaemic stroke: occlusion of a cerebral artery (thrombus or embolus) causing infarction; treated with thrombolytics (if within window) and antiplatelets. Haemorrhagic stroke: rupture of a cerebral vessel causing bleeding into brain tissue; thrombolytics are contraindicated; managed surgically and supportively. TIA: transient episode of neurological dysfunction from focal brain ischaemia, resolving within 24 hours (usually minutes), with no permanent infarction — a major warning sign of impending stroke."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"List five risk factors for Alzheimer's disease.",
   opts:null, ans:null,
   explain:"(1) Advanced age, (2) Family history/genetic factors (e.g. APOE-ε4), (3) Female sex, (4) History of head trauma, (5) Cardiovascular risk factors (hypertension, diabetes, obesity), (6) Low educational attainment, (7) Depression."},

  {topic:"CNS Disorders", type:"LAQ",
   q:"Describe the pathophysiology of Alzheimer's disease including intracellular and extracellular changes, stages of clinical progression, and management.",
   opts:null, ans:null,
   explain:"Intracellular: altered tau protein → microtubule collapse → neurofibrillary tangles. Extracellular: secretases cleave amyloid precursor protein (APP) → β-amyloid fragments aggregate → senile (β-amyloid) plaques. Both pathways → oxidative stress, overstimulation of NMDA receptors (excitotoxicity), cholinergic dysfunction, neuronal loss, cortical atrophy, and neuroinflammation. Clinical stages: Mild — confusion, memory loss, depression, personality changes (managed with SSRIs, memory aids, NMDA antagonists, cholinesterase inhibitors). Moderate — ↓attention span, dyspraxia, incontinence, behavioural issues (managed with assisted care, continence aids, psychotropic agents). Severe — total dependence, vegetative state (total care). Alzheimer's represents 50–70% of all dementias."},

  // ── CARDIOVASCULAR ──
  {topic:"Cardiovascular System", type:"MCQ",
   q:"Ischaemic heart disease is primarily defined as:",
   opts:["Infection of the myocardium","Inadequate oxygen supply to the heart","Valve regurgitation","Arrhythmia reducing cardiac output"], ans:1,
   explain:"IHD is caused by inadequate oxygen supply to the myocardium, most commonly due to atherosclerotic narrowing of coronary arteries."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Which stage of plaque development involves foam cell formation and smooth muscle migration?",
   opts:["Endothelial cell injury","Migration of inflammatory cells","Lipid accumulation and smooth muscle proliferation","Fibrous cap formation"], ans:2,
   explain:"Stage 3 involves lipid (LDL) accumulation, foam cell formation (macrophages engulfing LDL), release of toxic oxygen species, and smooth muscle migration — the core of atherogenesis."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Left heart failure primarily causes:",
   opts:["Dependent oedema and liver congestion","Pulmonary oedema and decreased cardiac output","GI distress and ascites","Anorexia and weight loss"], ans:1,
   explain:"Left ventricular failure → pulmonary congestion → pulmonary oedema, orthopnoea, paroxysmal nocturnal dyspnoea, impaired gas exchange, and cyanosis."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Which of the following is a modifiable risk factor for hypertension?",
   opts:["Age","Family history","Obesity","Sex"], ans:2,
   explain:"Obesity is a modifiable risk factor. Age, family history, and sex (male) are non-modifiable risk factors for hypertension."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Define atherosclerosis. List five major risk factors.",
   opts:null, ans:null,
   explain:"Atherosclerosis is progressive thickening and hardening of arterial walls due to lipid-laden plaque (atheroma) formation within the intima. Risk factors: (1) Hypercholesterolaemia/elevated LDL, (2) Hypertension, (3) Smoking, (4) Diabetes/metabolic disorders, (5) Ageing, (6) Family history, (7) Obesity, (8) Inflammation, (9) Oxidative stress."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"List the differences between right and left heart failure.",
   opts:null, ans:null,
   explain:"Right heart failure: congestion of peripheral tissues → dependent oedema and ascites, liver congestion (signs of impaired liver function), GI tract congestion (anorexia, GI distress, weight loss). Left heart failure: decreased cardiac output (activity intolerance, signs of decreased tissue perfusion) and pulmonary congestion → impaired gas exchange (cyanosis, hypoxia), pulmonary oedema (cough with frothy sputum, orthopnoea, paroxysmal nocturnal dyspnoea)."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Name three types of angina and list five precipitating factors.",
   opts:null, ans:null,
   explain:"Types: (1) Stable angina – predictable, brought on by exertion, relieved by rest. (2) Unstable angina – unpredictable, occurs at rest, sign of impending MI. (3) Variant (Prinzmetal's) angina – caused by coronary artery spasm. Precipitating factors: physical exertion, emotional stress, cold weather, heavy meals, smoking, anaemia, tachycardia."},

  {topic:"Cardiovascular System", type:"LAQ",
   q:"Describe the pathophysiology, clinical evaluation, and management of STEMI.",
   opts:null, ans:null,
   explain:"Pathophysiology: atherosclerotic plaque rupture → platelet aggregation and thrombus formation → complete coronary artery occlusion → full-thickness myocardial ischaemia → necrosis. STEMI (ST-Elevation MI) involves transmural infarction distinguishable from NSTEMI (partial thickness, no persistent ST elevation). Evaluation: (1) ECG – ST elevation, Q waves; (2) Troponin I/T – gold standard biomarker; (3) CK-MB – less specific; (4) Echocardiography – assess wall motion; (5) Coronary angiography – definitive anatomy. Management: Reperfusion – primary PCI (preferred, within 90 min) or thrombolytics (if PCI unavailable). Pharmacological: dual antiplatelet therapy (aspirin + clopidogrel/ticagrelor), anticoagulants (heparin), beta-blockers, ACE inhibitors, statins, nitrates. Complications to monitor: arrhythmia, cardiogenic shock, heart failure, pericarditis."},

  // ── RENAL ──
  {topic:"Renal System", type:"MCQ",
   q:"Which measure is considered the best indicator of kidney function?",
   opts:["Serum creatinine","Blood urea nitrogen","Glomerular filtration rate (GFR)","Urine protein levels"], ans:2,
   explain:"GFR is considered the best single measure of kidney function. It reflects the rate of filtration by all nephrons and is used to stage CKD."},

  {topic:"Renal System", type:"MCQ",
   q:"Why are females more susceptible to urinary tract infections than males?",
   opts:["Higher urinary pH in females","Shorter female urethra anatomically closer to perianal flora","Females produce less IgA","Female kidneys have fewer nephrons"], ans:1,
   explain:"The female urethra is significantly shorter (~4 cm vs ~20 cm in males) and is anatomically close to the anus, facilitating bacterial ascent to the bladder."},

  {topic:"Renal System", type:"MCQ",
   q:"Struvite renal stones are most commonly caused by infection with:",
   opts:["E. coli","Staphylococcus aureus","Proteus mirabilis","Klebsiella pneumoniae"], ans:2,
   explain:"Proteus mirabilis produces urease, which splits urea into ammonia → raises urinary pH → promotes struvite (magnesium ammonium phosphate) crystal formation."},

  {topic:"Renal System", type:"SAQ",
   q:"Distinguish between acute kidney injury (AKI) and chronic kidney disease (CKD).",
   opts:null, ans:null,
   explain:"AKI: sudden onset, potentially reversible, caused by reduced blood flow (pre-renal), structural disruption (intrinsic), or urinary obstruction (post-renal). CKD: slow progressive decline, irreversible permanent nephron loss caused by long-standing conditions (diabetes, hypertension, glomerulonephritis). Both show ↓GFR and waste accumulation, but AKI may recover while CKD progresses to end-stage renal disease."},

  {topic:"Renal System", type:"SAQ",
   q:"Name five types of renal calculi and their associated cause.",
   opts:null, ans:null,
   explain:"(1) Calcium oxalate – hypercalciuria and low urinary citrate. (2) Calcium phosphate – renal tubular acidification defects. (3) Uric acid – high-protein diet, uric acid supersaturation. (4) Struvite – bacterial infection (P. mirabilis, urease-producing). (5) Cystine – elevated urinary cystine (cystinuria, genetic disorder)."},

  {topic:"Renal System", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of chronic kidney disease.",
   opts:null, ans:null,
   explain:"Pathophysiology: progressive nephron loss → ↓GFR → (1) sodium/water retention: hypertension, oedema, heart failure; (2) hyperkalemia: cardiac risk; (3) nitrogenous waste accumulation: uraemia, coagulopathies, bleeding; (4) ↓erythropoietin: anaemia; (5) acid–base imbalance: acidosis; (6) ↓vitamin D activation: hypocalcaemia → hyperparathyroidism → osteodystrophies; (7) phosphate retention: hypocalcaemia. Signs/symptoms: fatigue, oedema, hypertension, anaemia, pruritus (skin disorders), GI manifestations (nausea), neurological manifestations, sexual dysfunction, pericarditis. Investigations: GFR calculation, serum creatinine/urea/electrolytes, full blood count (anaemia), urinalysis, renal ultrasound, renal biopsy. Management: control hypertension (ACE inhibitors/ARBs), glycaemic control, dietary protein and potassium restriction, treat anaemia (erythropoiesis-stimulating agents), phosphate binders, sodium bicarbonate for acidosis, dialysis (haemodialysis or peritoneal) for end-stage, renal transplantation."},

  // ── NEOPLASIA / BLOOD ──
  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which feature best distinguishes a malignant from a benign neoplasm?",
   opts:["Rapid growth rate","Encapsulation","Ability to metastasise","Well-differentiated cells"], ans:2,
   explain:"Metastasis — the ability to invade surrounding tissues and spread via blood/lymph to distant sites — is the defining feature of malignancy. Benign tumours do not metastasise."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"In carcinogenesis, what immediately follows failure of DNA repair?",
   opts:["Immediate cell death","Activation of oncogenes and inactivation of tumour suppressor genes","Conversion to benign neoplasm","Immune clearance"], ans:1,
   explain:"Failed DNA repair → activation of growth-promoting oncogenes + inactivation of tumour suppressor genes + alterations in apoptosis-controlling genes → unregulated cell differentiation → malignant neoplasm."},

  {topic:"Cancer & Blood", type:"SAQ",
   q:"Differentiate between iron deficiency anaemia and pernicious (megaloblastic) anaemia.",
   opts:null, ans:null,
   explain:"Iron deficiency anaemia: microcytic, hypochromic RBCs; ↓serum iron, ↓ferritin, ↑TIBC; caused by poor dietary intake, chronic blood loss, or malabsorption; treated with oral/IV iron. Pernicious anaemia: macrocytic (megaloblastic) RBCs; caused by B12 deficiency from autoimmune destruction of gastric parietal cells (loss of intrinsic factor); neurological symptoms (subacute combined degeneration of spinal cord); treated with B12 injections/supplementation."},

  {topic:"Cancer & Blood", type:"SAQ",
   q:"Describe eight factors that can cause cancer.",
   opts:null, ans:null,

  {topic:"Respiratory System", type:"MCQ",
   q:"What is the primary gene affected in cystic fibrosis?",
   opts:["CFTR (cystic fibrosis transmembrane conductance regulator)","BRCA1","PTEN","TP53"], ans:0,
   explain:"Cystic fibrosis is caused by mutations in the CFTR gene, leading to defective chloride channel function, thick mucus secretions, and progressive lung damage."},

  {topic:"Respiratory System", type:"SAQ",
   q:"Differentiate between obstructive lung disease (OLD) and restrictive lung disease (RLD).",
   opts:null, ans:null,
   explain:"Obstructive lung disease: airflow obstruction due to airway narrowing or collapse (e.g. asthma, COPD, cystic fibrosis); ↓FEV1/FVC ratio; air trapping → hyperinflation. Restrictive lung disease: reduced lung volume due to stiff lungs or chest wall restriction (e.g. ARDS, fibrosis, sarcoidosis); ↓FVC with normal or increased FEV1/FVC ratio; ↓total lung capacity."},

  {topic:"Respiratory System", type:"SAQ",
   q:"List the trigger factors for asthma and outline the pathophysiology.",
   opts:null, ans:null,
   explain:"Triggers: allergens (pollen, dust mites, pet dander), cold air, exercise, smoke/pollutants, respiratory infections, stress, NSAIDs. Pathophysiology: allergen exposure → IgE-mediated mast cell degranulation → histamine, leukotrienes, prostaglandins release → bronchoconstriction, mucosal oedema, increased mucus secretion → airway narrowing → wheeze, dyspnoea, cough. Chronic inflammation leads to airway remodelling."},

  {topic:"Respiratory System", type:"LAQ",
   q:"Describe the causes, pathophysiology, evaluation, and treatment of community-acquired pneumonia.",
   opts:null, ans:null,
   explain:"Causes: bacterial (Streptococcus pneumoniae most common, Haemophilus influenzae, Mycoplasma), viral (influenza, SARS-CoV-2), fungal (Pneumocystis jirovecii in immunocompromised). Classification by anatomy: lobar (whole lobe consolidation) vs bronchopneumonia (patchy, multifocal). Pathophysiology: pathogen reaches alveoli → inflammatory response → exudate fills alveoli → impaired gas exchange → hypoxia. Evaluation: chest X-ray (consolidation), sputum culture (colour indicates pathogen — green/yellow = bacterial, rust-coloured = pneumococcal), full blood count (↑WCC), CRP, oxygen saturation, blood cultures. Treatment: antibiotics (amoxicillin for mild CAP, co-amoxiclav/clarithromycin for moderate, IV antibiotics for severe), supportive (oxygen, fluids, analgesia), antivirals for viral pneumonia."},

  // ── GASTROINTESTINAL ──
  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Which pathogen is most commonly associated with peptic ulcer disease (PUD)?",
   opts:["Clostridium difficile","Helicobacter pylori","Campylobacter jejuni","Salmonella typhi"], ans:1,
   explain:"H. pylori colonises the gastric mucosa, produces urease (raising local pH), damages the mucous barrier, and triggers inflammation leading to peptic ulceration."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Which protein triggers the immune response in coeliac disease?",
   opts:["Casein","Lactulose","Gluten (gliadin)","Fructose"], ans:2,
   explain:"Coeliac disease is an autoimmune condition triggered by gluten (specifically its gliadin component) in genetically susceptible individuals, causing villous atrophy of the small intestine."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Acute pancreatitis is characterised histologically by:",
   opts:["Fibrosis and calcification","Haemorrhage, oedema, and necrosis","Granuloma formation","Lymphocytic infiltration only"], ans:1,
   explain:"Acute pancreatitis shows haemorrhage, oedema, and fat/acinar cell necrosis. Chronic pancreatitis (commonly from alcohol abuse) shows fibrosis and calcification."},

  {topic:"Gastrointestinal System", type:"SAQ",
   q:"Describe the causes, complications, and management of GERD.",
   opts:null, ans:null,
   explain:"Causes: incompetent lower oesophageal sphincter (LOS), obesity, hiatus hernia, pregnancy, fatty/spicy foods, alcohol, smoking, lying flat after eating. Complications: oesophagitis, oesophageal stricture, Barrett's oesophagus (precancerous metaplasia), oesophageal adenocarcinoma. Management: lifestyle (weight loss, elevate head of bed, avoid triggers), antacids, H2 blockers (ranitidine), proton pump inhibitors (omeprazole — first line), surgical fundoplication for refractory cases."},

  {topic:"Gastrointestinal System", type:"SAQ",
   q:"Describe the pathogenesis, diagnosis, and management of H. pylori-associated peptic ulcer disease.",
   opts:null, ans:null,
   explain:"Pathogenesis: H. pylori produces urease → ammonia → mucosal damage; triggers local inflammation; disrupts mucus layer and stimulates acid secretion → ulceration. Diagnosis: urea breath test (non-invasive, gold standard), stool antigen test, serology (IgG), endoscopy with CLO test/biopsy. Management: triple therapy — PPI + clarithromycin + amoxicillin (or metronidazole) for 7–14 days. Test for eradication 4–6 weeks after treatment."},

  {topic:"Gastrointestinal System", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of cirrhosis.",
   opts:null, ans:null,
   explain:"Causes: chronic viral hepatitis (HBV, HCV), alcohol abuse, NAFLD, autoimmune hepatitis. Pathophysiology: repeated hepatocyte injury → inflammation → stellate cell activation → fibrosis → disruption of normal liver architecture with regenerative nodules → portal hypertension. Histology: progressive stages — steatosis → hepatitis → fibrosis → cirrhosis → hepatocellular carcinoma. Signs/symptoms: fatigue, jaundice, ascites, oedema, spider naevi, palmar erythema, gynaecomastia, hepatic encephalopathy, coagulopathy. Investigations: LFTs (↑AST/ALT/bilirubin, ↓albumin), coagulation studies (↑PT), FBC, liver ultrasound, fibroscan (elastography), liver biopsy. Management: treat underlying cause (antivirals, alcohol cessation), low-sodium diet, diuretics (spironolactone + furosemide) for ascites, beta-blockers for portal hypertension, lactulose for encephalopathy, liver transplantation for end-stage disease."},

  // ── ENDOCRINE ──
  {topic:"Endocrine System", type:"MCQ",
   q:"In hyperthyroidism (thyrotoxicosis), what happens to TSH levels?",
   opts:["TSH increases","TSH decreases","TSH remains unchanged","TSH fluctuates"], ans:1,
   explain:"In hyperthyroidism, excess thyroid hormone causes negative feedback → suppressed TSH from the pituitary. Low TSH + elevated T3/T4 is the diagnostic hallmark."},

  {topic:"Endocrine System", type:"MCQ",
   q:"Cushing's syndrome is characterised by excess of which hormone?",
   opts:["Aldosterone","Cortisol","ACTH only","Insulin"], ans:1,
   explain:"Cushing's syndrome results from prolonged excess cortisol — from endogenous causes (pituitary adenoma secreting ACTH, adrenal tumour) or exogenous corticosteroid therapy."},

  {topic:"Endocrine System", type:"MCQ",
   q:"The 5Hs associated with pheochromocytoma include all EXCEPT:",
   opts:["Hypertension","Headache","Hypoglycaemia","Hyperhidrosis"], ans:2,
   explain:"The 5Hs of phaeochromocytoma are Hypertension, Headache, Hyperhidrosis (sweating), Heart palpitations, and Hypermetabolism. Hypoglycaemia is not a feature (rather, hyperglycaemia may occur)."},

  {topic:"Endocrine System", type:"SAQ",
   q:"Differentiate between Type 1 and Type 2 diabetes mellitus.",
   opts:null, ans:null,
   explain:"Type 1 DM: autoimmune destruction of pancreatic β-cells → absolute insulin deficiency; onset typically in childhood/young adults; requires insulin; prone to diabetic ketoacidosis (DKA). Type 2 DM: insulin resistance with relative insulin deficiency; associated with obesity, sedentary lifestyle, older age; managed with lifestyle modification, oral hypoglycaemics (metformin first line), and eventually insulin; prone to hyperosmolar hyperglycaemic state (HHS)."},

  {topic:"Endocrine System", type:"SAQ",
   q:"Describe the causes, clinical features, and diagnosis of Cushing's syndrome.",
   opts:null, ans:null,
   explain:"Causes: pituitary ACTH-secreting adenoma (Cushing's disease), adrenal cortisol-secreting tumour, ectopic ACTH production (lung cancer), or long-term exogenous corticosteroid therapy. Features: central obesity, moon face, buffalo hump, purple striae, thin skin, proximal muscle weakness, hypertension, hyperglycaemia, osteoporosis, immunosuppression. Diagnosis: 24-hour urinary free cortisol, overnight dexamethasone suppression test, late-night salivary cortisol; MRI pituitary/adrenal imaging; ACTH level to determine source."},

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Reproductive System", type:"SAQ",
   q:"Differentiate between primary and secondary dysmenorrhoea.",
   opts:null, ans:null,
   explain:"Primary dysmenorrhoea: painful menstruation without underlying pathology; caused by excess prostaglandin production → uterine contractions and ischaemia; treated with NSAIDs and OCP. Secondary dysmenorrhoea: painful menstruation due to an underlying pelvic condition (e.g. endometriosis, fibroids, adenomyosis, PID); usually worsens with age; treatment targets the underlying cause."},

  {topic:"Reproductive System", type:"SAQ",
   q:"Describe the pathological mechanism and clinical manifestations of endometriosis.",
   opts:null, ans:null,
   explain:"Pathological mechanism: retrograde menstruation deposits endometrial cells outside the uterus (ovaries, fallopian tubes, peritoneum, bowel) → ectopic implants respond to hormonal cycles → inflammation, scarring, adhesions, and cysts (endometriomas). Clinical manifestations: cyclical pelvic pain worsening around menstruation, dyspareunia (painful intercourse), dysmenorrhoea, subfertility/infertility, heavy menstrual bleeding, bowel/bladder symptoms (depending on location of implants)."},

  {topic:"Male Reproductive System", type:"MCQ",

  {topic:"Male Reproductive System", type:"SAQ",
   q:"Differentiate between varicocele, hydrocele, and spermatocele.",
   opts:null, ans:null,
   explain:"Varicocele: abnormal dilation of the pampiniform venous plexus within the scrotum (like varicose veins); associated with male subfertility; more common on the left side. Hydrocele: accumulation of serous fluid within the tunica vaginalis surrounding the testis; causes scrotal swelling; transilluminates on examination. Spermatocele: benign cystic mass in the epididymis containing spermatozoa; typically small, painless, and transilluminates; usually requires no treatment."},

  {topic:"Cardiovascular System", type:"MCQ",

  {topic:"Cardiovascular System", type:"MCQ",

  {topic:"Renal System", type:"MCQ",

  // ── INFLAMMATION (from study app) ──
  {topic:"Inflammation & Healing", type:"MCQ",
   q:"What is the Latin term for redness in acute inflammation?",
   opts:["Rubor","Calor","Tumor","Dolor"], ans:0,
   explain:"The five cardinal signs of acute inflammation are: rubor (redness), calor (heat), tumor (swelling), dolor (pain), and loss of function. Rubor results from vasodilation and increased blood flow to the affected tissue."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which phase of acute inflammation involves white cell migration to the injury site?",
   opts:["Cellular phase","Vascular phase","Resolution phase","Fibrotic phase"], ans:0,
   explain:"The cellular phase follows the initial vascular phase. It involves leukocyte margination, rolling, adhesion to endothelium, diapedesis (squeezing through vessel walls), and chemotaxis toward the site of injury."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"What type of exudate contains pus with cell debris and microbes?",
   opts:["Purulent","Serous","Fibrinous","Haemorrhagic"], ans:0,
   explain:"Purulent (suppurative) exudate contains pus — a mixture of dead neutrophils, cell debris, and microorganisms. It is characteristic of bacterial infections causing pyogenic (pus-forming) inflammation."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which exudate type is watery with low protein content?",
   opts:["Serous","Fibrinous","Purulent","Haemorrhagic"], ans:0,
   explain:"Serous exudate is watery, pale, and has a low protein content. It resembles serum and is typical of mild inflammation (e.g. early blister fluid). It indicates increased capillary permeability without significant cellular component."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"What process allows white cells to squeeze through capillary walls?",
   opts:["Diapedesis","Chemotaxis","Opsonisation","Phagocytosis"], ans:0,
   explain:"Diapedesis (also called transmigration or extravasation) is the process by which leukocytes squeeze between endothelial cells to exit blood vessels and migrate into inflamed tissue. It follows rolling and firm adhesion mediated by selectins and integrins."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which inflammatory mediator is released by mast cells and causes vasodilation?",
   opts:["Histamine","Fibrin","Erythropoietin","Collagen"], ans:0,
   explain:"Histamine is stored in mast cell granules and released immediately upon injury or immune activation. It causes vasodilation and increased vascular permeability, contributing to the early vascular phase of inflammation (heat and redness)."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"How long must inflammation persist to be classified as chronic?",
   opts:["Over two weeks","Over 48 hours","Over one week","Over one month"], ans:0,
   explain:"Chronic inflammation is generally defined as inflammation persisting beyond two weeks. It is characterised by macrophage and lymphocyte infiltration, tissue destruction, and attempts at repair (fibrosis), in contrast to the neutrophil-dominant acute phase."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which healing type involves significant tissue loss and prolonged healing time?",
   opts:["Second intention","First intention","Direct closure","Fibrinous healing"], ans:0,
   explain:"Healing by second intention occurs when wound edges cannot be approximated — there is significant tissue loss, resulting in prolonged granulation tissue formation, contraction, and scar formation. First intention (primary closure) applies to clean wounds with apposed edges."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which drug class broadly suppresses inflammatory mediator production?",
   opts:["Corticosteroids","Antihistamines","Anticoagulants","Analgesics"], ans:0,
   explain:"Corticosteroids (e.g. prednisolone, dexamethasone) broadly suppress inflammation by inhibiting phospholipase A2 → reducing arachidonic acid production → fewer prostaglandins, leukotrienes, and thromboxanes. They also reduce cytokine production and leukocyte migration."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What type of protein in cancer cells confers resistance to programmed cell death?",
   opts:["Anti-apoptotic proteins","Fibrinogen","Histamine","Prostaglandins"], ans:0,
   explain:"Cancer cells overexpress anti-apoptotic proteins (e.g. Bcl-2) and inactivate pro-apoptotic pathways (e.g. p53 mutations). This resistance to apoptosis allows tumour cells to survive despite DNA damage signals that would normally trigger cell death."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which anaemia is classified as microcytic and hypochromic?",
   opts:["Iron-deficiency anaemia","Pernicious anaemia","Haemolytic anaemia","Aplastic anaemia"], ans:0,
   explain:"Iron-deficiency anaemia produces small (microcytic) and pale (hypochromic) red blood cells due to insufficient haem synthesis. It is the most common anaemia worldwide, caused by poor dietary intake, chronic blood loss, or malabsorption."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which anaemia is classified as macrocytic and normochromic?",
   opts:["Pernicious anaemia","Iron-deficiency anaemia","Sickle cell anaemia","Thalassaemia"], ans:0,
   explain:"Pernicious anaemia (B12 deficiency) causes macrocytic (large), normochromic red blood cells due to impaired DNA synthesis — megaloblastic changes. It results from autoimmune destruction of gastric parietal cells → loss of intrinsic factor → B12 malabsorption."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What globin chain is mutated in sickle cell anaemia?",
   opts:["β-globin chain","α-globin chain","γ-globin chain","δ-globin chain"], ans:0,
   explain:"Sickle cell anaemia is caused by a point mutation in the HBB gene encoding the β-globin chain — glutamate is replaced by valine. Under low oxygen, HbS polymerises → red cells adopt a rigid sickle shape → haemolysis and vaso-occlusion."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which haemophilia type is also known as Christmas disease?",
   opts:["Haemophilia B","Haemophilia A","Haemophilia C","Von Willebrand disease"], ans:0,
   explain:"Haemophilia B (Christmas disease) is an X-linked bleeding disorder caused by deficiency of clotting factor IX. Haemophilia A involves factor VIII deficiency. Both present with joint bleeds and prolonged bleeding after injury."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What cells are the histological hallmark of Hodgkin lymphoma?",
   opts:["Reed-Sternberg cells","Plasma cells","Mast cells","Neutrophils"], ans:0,
   explain:"Reed-Sternberg cells are large, binucleated or multinucleated cells (owl-eye appearance) that are pathognomonic for Hodgkin lymphoma. They are derived from germinal centre B cells and are required for the histological diagnosis."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What abnormal product do multiple myeloma cells produce in excess?",
   opts:["Abnormal immunoglobulins (M proteins)","Excess erythrocytes","Deficient platelets","Excess fibrin"], ans:0,
   explain:"Multiple myeloma is a malignant proliferation of plasma cells that produces monoclonal immunoglobulins (M proteins / paraproteins). These accumulate in blood and urine (Bence Jones proteins), causing bone marrow failure, renal damage, and immunodeficiency."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"What is polycythaemia?",
   opts:["Overproduction of erythrocytes","Deficiency of platelets","Excess white cells","Reduced haemoglobin"], ans:0,
   explain:"Polycythaemia (polycythaemia vera) is a myeloproliferative disorder characterised by overproduction of erythrocytes → increased blood viscosity → risk of thrombosis, stroke, and organ damage. It is associated with a JAK2 V617F mutation."},

  // ── RESPIRATORY (from study app) ──
  {topic:"Respiratory System", type:"MCQ",

  {topic:"Respiratory System", type:"MCQ",

  {topic:"Respiratory System", type:"MCQ",
   q:"Which spirometry ratio defines airflow obstruction in COPD?",

  {topic:"Respiratory System", type:"MCQ",
   q:"What is the classic clinical description of a COPD patient with chronic bronchitis?",
   opts:["Blue bloater","Pink puffer","Barrel chest only","Silent chest"], ans:0,

  {topic:"Respiratory System", type:"MCQ",
   q:"What are the three sequential stages of ARDS?",
   opts:["Exudative, proliferative, fibrotic","Acute, subacute, chronic","Vascular, cellular, resolution","Inflammatory, regenerative, scarring"], ans:0,
   explain:"ARDS (acute respiratory distress syndrome) progresses through: (1) Exudative phase — protein-rich fluid floods alveoli; (2) Proliferative phase — type II pneumocyte proliferation and repair; (3) Fibrotic phase — irreversible scarring and reduced lung compliance if unresolved."},

  {topic:"Respiratory System", type:"MCQ",

  // ── GASTROINTESTINAL (from study app) ──
  {topic:"Gastrointestinal System", type:"MCQ",

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"What is Barrett's oesophagus?",
   opts:["Pre-cancerous metaplasia — columnar cells replace squamous epithelium","Oesophageal adenocarcinoma","Oesophageal perforation","Benign oesophageal polyp"], ans:0,

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Which HLA antigens strongly predispose to coeliac disease?",
   opts:["HLA-DQ2 or HLA-DQ8","HLA-DR4 or HLA-DR3","HLA-B27","HLA-A1"], ans:0,
   explain:"Coeliac disease is strongly associated with HLA-DQ2 (in ~90% of patients) and HLA-DQ8 (in most remaining cases). These MHC class II molecules present deamidated gliadin peptides to CD4+ T cells, triggering the autoimmune mucosal response."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Which fragment of gluten drives the immune pathology in coeliac disease?",
   opts:["Gliadin","Gluten-binding protein","Amylase","Pepsin"], ans:0,
   explain:"Gliadin (the alcohol-soluble component of gluten) is the immunogenic fragment in coeliac disease. Tissue transglutaminase deamidates gliadin → enhanced binding to HLA-DQ2/DQ8 → T cell activation → villous atrophy and malabsorption."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"Which inflammatory bowel disease affects all four layers of the intestinal wall (transmural)?",
   opts:["Crohn's disease","Ulcerative colitis","Coeliac disease","Irritable bowel syndrome"], ans:0,
   explain:"Crohn's disease causes transmural (full-thickness) inflammation that can affect any part of the GI tract (mouth to anus), with skip lesions, granuloma formation, fistulae, and strictures. Ulcerative colitis is limited to the mucosa and submucosa, affecting only the colon."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"What type of virus is hepatitis B?",

   explain:"Acute pancreatitis is diagnosed by elevated serum amylase (>3× normal) and/or lipase (more specific, elevated longer). These pancreatic enzymes leak into the bloodstream from damaged acinar cells due to inappropriate intrapancreatic enzyme activation."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"What is the main digestive function of bile from the gallbladder?",
   opts:["Emulsify fats for digestion","Digest proteins","Neutralise stomach acid","Absorb carbohydrates"], ans:0,
   explain:"Bile contains bile salts (derived from cholesterol) that emulsify dietary fats → form micelles → increase the surface area for lipase action → fat digestion and absorption of fat-soluble vitamins (A, D, E, K) in the small intestine."},

  {topic:"Gastrointestinal System", type:"MCQ",
   q:"What type of diarrhoea is caused by Vibrio cholerae toxin stimulating massive water and electrolyte secretion?",
   opts:["Secretory","Osmotic","Exudative","Motility-related"], ans:0,
   explain:"Secretory diarrhoea results from toxin-driven active secretion of water and electrolytes into the intestinal lumen despite fasting (persists even when not eating). Cholera toxin activates adenylyl cyclase → raised cAMP → massive Cl⁻ and water secretion → 'rice-water' stools."},

  // ── ENDOCRINE (from study app) ──
  {topic:"Endocrine System", type:"MCQ",
   q:"What is the most common cause of acromegaly?",
   opts:["Benign pituitary macroadenoma","Ectopic GH secretion","Hypothalamic tumour","GH injections"], ans:0,
   explain:"Acromegaly results from excess growth hormone (GH) in adults after epiphyseal plate fusion. >95% of cases are caused by a benign GH-secreting pituitary macroadenoma → IGF-1 elevation → disproportionate bony and soft tissue overgrowth."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What distinguishes gigantism from acromegaly in GH excess?",
   opts:["Gigantism: proportionate growth; acromegaly: disproportionate growth","Gigantism only affects the face","Acromegaly occurs in children only","Gigantism is caused by TSH excess"], ans:0,
   explain:"GH excess before epiphyseal plate fusion (in childhood) causes gigantism — proportionate excessive height. After fusion (in adults), acromegaly develops — disproportionate enlargement of the hands, feet, jaw, and skull with soft tissue changes."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What autoimmune mechanism causes Graves' disease?",
   opts:["Autoantibodies activate TSH receptors → continuous T3/T4 overproduction","T cells destroy thyroid follicles","Anti-TPO antibodies block iodine uptake","TSH overstimulates thyroid via pituitary tumour"], ans:0,
   explain:"Graves' disease is caused by thyroid-stimulating immunoglobulins (TSI/TSAB) — autoantibodies that bind and activate TSH receptors → continuous stimulation of thyroid hormone production → hyperthyroidism. It is the most common cause of hyperthyroidism."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What thyroid function test pattern distinguishes primary from secondary hypothyroidism?",
   opts:["Primary: HIGH TSH; Secondary: LOW TSH","Primary: LOW TSH; Secondary: HIGH TSH","Both have identical TSH levels","TSH is always undetectable in hypothyroidism"], ans:0,
   explain:"In primary hypothyroidism (thyroid gland failure), low T3/T4 removes negative feedback → pituitary compensates → HIGH TSH. In secondary hypothyroidism (pituitary failure), insufficient TSH production → LOW T3/T4 AND LOW TSH."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What type of oedema occurs in myxoedema (severe hypothyroidism)?",
   opts:["Non-pitting oedema from mucopolysaccharide accumulation","Pitting oedema from cardiac failure","Lymphoedema from blocked lymphatics","Vasogenic oedema from inflammation"], ans:0,
   explain:"Myxoedema is non-pitting oedema characteristic of severe hypothyroidism. Low metabolic rate → accumulation of mucopolysaccharides (glycosaminoglycans) in connective tissue → water binding → tissue swelling that does not pit on pressure."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What are the autoimmune targets in Hashimoto's thyroiditis?",
   opts:["Thyroid peroxidase, thyroglobulin, and TSH receptors","TSH receptor only (activating)","Thyroid follicular cells via NK cells","Thyroxine-binding globulin"], ans:0,
   explain:"Hashimoto's thyroiditis involves autoantibodies against thyroid peroxidase (TPO — most sensitive marker), thyroglobulin, and TSH receptors (blocking type). CD4+ T cells also directly attack thyroid follicular cells → progressive destruction → hypothyroidism."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What is the most common iatrogenic cause of hypoparathyroidism?",
   opts:["Accidental removal of parathyroid glands during thyroidectomy","Radioactive iodine therapy","Radiation to the neck","Prolonged calcium deficiency"], ans:0,
   explain:"The four parathyroid glands sit on the posterior surface of the thyroid. Accidental removal during thyroidectomy (or devascularisation) is the most common cause of iatrogenic hypoparathyroidism → hypocalcaemia → neuromuscular excitability → tetany."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What is the difference between Cushing's disease and Cushing's syndrome?",
   opts:["Disease = pituitary/adrenal tumour; Syndrome = prolonged corticosteroid drug therapy","Disease is milder; Syndrome is severe","Syndrome affects only children; Disease affects adults","There is no clinical difference"], ans:0,
   explain:"Cushing's syndrome is the broader term for any cause of cortisol excess — including exogenous corticosteroid therapy (most common). Cushing's disease specifically refers to a pituitary ACTH-secreting adenoma causing bilateral adrenal hyperplasia and cortisol excess."},

  {topic:"Endocrine System", type:"MCQ",
   q:"Why do patients with Addison's disease develop hyperpigmentation?",
   opts:["Compensatory ACTH excess acts on skin like melanocyte-stimulating hormone","Low cortisol directly stimulates melanocytes","Aldosterone deficiency causes pigment deposits","Iron accumulation causes bronzing"], ans:0,
   explain:"In Addison's disease, low cortisol removes negative feedback → pituitary releases excess ACTH (and pro-opiomelanocortin). ACTH shares structural homology with MSH (melanocyte-stimulating hormone) → stimulates melanin production → characteristic bronzed hyperpigmentation."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What electrolyte pattern is expected in Addison's disease (primary adrenal insufficiency)?",
   opts:["Hyponatraemia and hyperkalaemia","Hypernatraemia and hypokalaemia","Hypernatraemia and hyperkalaemia","Hyponatraemia and hypokalaemia"], ans:0,
   explain:"Aldosterone deficiency in Addison's disease → impaired Na+ retention and K+ excretion by the kidney → hyponatraemia (low sodium) and hyperkalaemia (high potassium). Cortisol deficiency adds hypoglycaemia. This triad is the biochemical hallmark."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What are the 5H clinical features of phaeochromocytoma?",
   opts:["Hypertension, Headache, Hyperglycaemia, Hypermetabolism, Hyperhidrosis","Hypertension, Haemorrhage, Hypoxia, Hypokalaemia, Haematuria","Headache, Hepatomegaly, Haematuria, Hypocalcaemia, Hyperthermia","Hypertension, Hyponatraemia, Hypoglycaemia, Hirsutism, Haemolysis"], ans:0,
   explain:"Phaeochromocytoma (adrenal medullary tumour secreting catecholamines) classically presents with 5Hs: Hypertension (episodic or persistent), Headache (severe), Hyperhidrosis (sweating), Heart palpitations, and Hyperglycaemia/Hypermetabolism. Episodes are paroxysmal."},

  {topic:"Endocrine System", type:"MCQ",
   q:"Why does pituitary dwarfism cause hypoglycaemia rather than hyperglycaemia?",
   opts:["GH deficiency removes its anti-insulin effect, lowering blood glucose","Beta cells are destroyed","Excess cortisol drives glucose down","TSH suppresses gluconeogenesis"], ans:0,
   explain:"Growth hormone (GH) is counter-regulatory — it opposes insulin and raises blood glucose. In GH deficiency, this anti-insulin effect is lost → insulin acts unopposed → hypoglycaemia. This is why GH deficiency in children requires careful glucose monitoring."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What is the defining feature of all forms of diabetes mellitus?",
   opts:["Hyperglycaemia","Hypoglycaemia","Glycosuria","Ketonuria"], ans:0,
   explain:"All forms of diabetes mellitus — Type 1, Type 2, gestational, and others — share hyperglycaemia as their defining feature. The mechanism differs (absolute insulin deficiency in T1D vs insulin resistance in T2D), but elevated blood glucose is universal."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What is the primary mechanism of Type 1 diabetes mellitus?",
   opts:["Autoimmune T-cell mediated destruction of pancreatic beta cells","Peripheral insulin receptor downregulation","Excess glucagon secretion from alpha cells","Pancreatic duct obstruction"], ans:0,
   explain:"T1D results from autoimmune destruction of insulin-producing beta cells in the islets of Langerhans, mediated primarily by autoreactive CD8+ and CD4+ T cells. Loss of beta cell mass → absolute insulin deficiency → hyperglycaemia and DKA susceptibility."},

  {topic:"Endocrine System", type:"MCQ",
   q:"What distinguishes T2D from T1D on initial laboratory diagnosis?",
   opts:["T2D: no autoantibodies; T1D: autoantibodies present","T2D requires insulin immediately; T1D does not","T2D affects only the elderly; T1D affects only children","T2D always presents with DKA"], ans:0,
   explain:"T1D is characterised by the presence of autoantibodies (anti-GAD, anti-islet cell, anti-insulin) reflecting the autoimmune process. T2D has no autoantibodies and is associated with insulin resistance, obesity, and metabolic syndrome."},

  {topic:"Endocrine System", type:"MCQ",
   q:"Why does DKA develop in T1D but rarely in T2D?",
   opts:["In T1D, absolute insulin deficiency allows unchecked lipolysis → ketone body formation","T2D patients produce more glucagon","T1D patients eat more carbohydrates","T2D is always treated before DKA can develop"], ans:0,
   explain:"Insulin normally suppresses lipolysis. In T1D, absolute insulin deficiency → unrestrained lipolysis → free fatty acids → hepatic ketogenesis → ketone body accumulation → metabolic acidosis (DKA). In T2D, residual insulin production suppresses ketogenesis even when glucose is high."},

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Reproductive System", type:"MCQ",

  {topic:"Male Reproductive System", type:"MCQ",

  {topic:"Male Reproductive System", type:"MCQ",
   q:"What is 5-alpha-dihydrotestosterone (5-DHT) and why is it important in BPH?",
   opts:["Active testosterone metabolite that drives prostatic epithelial proliferation","A tumour marker for prostate cancer","A gonadotrophin released by the pituitary","The enzyme that converts oestrogen to androgen"], ans:0,

  {topic:"Male Reproductive System", type:"MCQ",

  {topic:"Male Reproductive System", type:"MCQ",
   q:"What drug class is first-line for BPH to relax the bladder outlet?",
   opts:["Alpha-adrenergic receptor blocker","5-alpha reductase inhibitor","Phosphodiesterase-5 inhibitor","Muscarinic antagonist"], ans:0,

  {topic:"Male Reproductive System", type:"MCQ",

  {topic:"Musculoskeletal System", type:"MCQ",

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"Gout is caused by deposition of which substance in joints?",
   opts:["Calcium pyrophosphate","Uric acid (monosodium urate crystals)","Calcium oxalate","Cholesterol crystals"], ans:1,

   q:"Muscular dystrophy is caused by a genetic defect in which protein?",
   opts:["Myosin","Actin","Dystrophin","Troponin"], ans:2,

  {topic:"Musculoskeletal System", type:"SAQ",
   q:"Compare osteoarthritis and rheumatoid arthritis in terms of pathophysiology, joint distribution, and key diagnostic features.",
   opts:null, ans:null,
   explain:"Osteoarthritis: non-inflammatory (initially), degenerative; cartilage erosion and subchondral bone changes; affects weight-bearing joints (knees, hips), DIP joints; Heberden's nodes; diagnosis: X-ray (joint space narrowing, osteophytes); normal ESR/CRP. Rheumatoid arthritis: autoimmune, chronic synovial inflammation; pannus formation erodes cartilage and bone; symmetrical, affects MCP and PIP joints (spares DIP); morning stiffness >1 hour; elevated ESR, CRP, RF, anti-CCP; X-ray shows erosions and osteoporosis."},

  {topic:"Musculoskeletal System", type:"SAQ",
   q:"List five modifiable and three non-modifiable risk factors for osteoarthritis.",
   opts:null, ans:null,
   explain:"Modifiable: obesity (excess joint load), joint injury/overuse, occupational physical demands, muscle weakness (↓joint stability), sedentary lifestyle. Non-modifiable: age (commonest risk factor), female sex (post-menopausal), genetics/family history."},

  {topic:"Musculoskeletal System", type:"LAQ",
   q:"Describe the pathophysiology, signs and symptoms, investigations, and management of rheumatoid arthritis.",
   opts:null, ans:null,
   explain:"Pathophysiology: autoimmune activation (CD4+ T cells, B cells) → synovial membrane inflammation → pannus (vascular granulation tissue) formation → invasion and destruction of cartilage and bone. Pro-inflammatory cytokines (TNF-α, IL-1, IL-6) sustain the inflammatory cycle. Signs/symptoms: symmetrical joint pain and swelling (MCP, PIP, wrists, knees), morning stiffness >1 hour, systemic features (fatigue, fever, weight loss), extra-articular features (rheumatoid nodules, pulmonary fibrosis, vasculitis, Sjögren's overlap). Investigations: ESR and CRP ↑, rheumatoid factor (positive in ~70%), anti-CCP antibody (most specific), X-ray (periarticular osteoporosis, joint space narrowing, erosions), ultrasound/MRI for early synovitis. Management: DMARDs (methotrexate — first line), biological agents (anti-TNF: etanercept, adalimumab; anti-IL-6: tocilizumab), NSAIDs and corticosteroids (short-term), physiotherapy, occupational therapy, surgical joint replacement if severe."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"Which pro-inflammatory cytokines drive cartilage destruction in OA via MMP activation?",
   opts:["IL-1 and TNF-α","IL-6 and IL-17","TNF-β and IL-10","IFN-γ and IL-4"], ans:0,
   explain:"In osteoarthritis, IL-1 and TNF-α stimulate chondrocytes and synoviocytes to produce matrix metalloproteinases (MMPs), which degrade type II collagen and aggrecan — the key structural components of articular cartilage. This drives the progressive cartilage destruction characteristic of OA."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What is eburnation and in which arthritis does it occur?",
   opts:["Ivory-like densification of exposed subchondral bone in OA","Synovial pannus eroding cartilage in RA","Crystal deposition in periarticular tissue in gout","Fibrous replacement of bone in Paget disease"], ans:0,
   explain:"Eburnation is the ivory-like, polished densification of exposed subchondral bone that occurs in advanced osteoarthritis after complete cartilage loss. Bone-on-bone contact causes the exposed surfaces to become sclerotic and smooth, visible on X-ray as subchondral sclerosis."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What is the primary cause of hyperuricaemia in >90% of gout cases?",
   opts:["Reduced renal excretion of uric acid (genetically determined)","Excess dietary purine intake","Overproduction of uric acid by the liver","Increased xanthine oxidase activity"], ans:0,
   explain:"In over 90% of gout cases, the cause is reduced renal excretion of uric acid — a genetically determined trait (underexcretion). Less commonly, gout results from uric acid overproduction (e.g. myeloproliferative disorders, enzyme defects). Dietary purines contribute but rarely cause gout alone."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What are the three phases of bone healing in order?",
   opts:["Inflammation → Consolidation → Remodelling","Necrosis → Calcification → Ossification","Haematoma → Granulation → Scar formation","Resorption → Matrix deposition → Mineralisation"], ans:0,
   explain:"Bone healing proceeds through: (1) Inflammation — haematoma forms, cytokines recruit repair cells, granulation tissue develops; (2) Consolidation — MSCs form fibrocartilage callus which mineralises into bone callus — immobilisation is critical; (3) Remodelling — mature lamellar bone forms over months to years via osteoblast/osteoclast activity."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"Which tumour suppressor gene mutations are linked to osteosarcoma?",
   opts:["TP53 and RB1","BRCA1 and BRCA2","APC and MLH1","KRAS and EGFR"], ans:0,
   explain:"Osteosarcoma is strongly associated with mutations in TP53 (Li-Fraumeni syndrome) and RB1 (retinoblastoma gene). Loss of these tumour suppressors removes critical cell cycle checkpoints → uncontrolled osteoblastic proliferation → malignant bone matrix production."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What is the life-threatening renal complication of rhabdomyolysis?",
   opts:["Acute renal failure from myoglobin blocking renal tubules","Renal artery thrombosis","Glomerulonephritis from immune complex deposition","Hypernatraemia from sodium wasting"], ans:0,
   explain:"Rhabdomyolysis releases myoglobin from destroyed muscle fibres into the circulation. Myoglobin is filtered by the glomerulus → precipitates in and blocks renal tubules (especially in acidic urine) → tubular necrosis → acute renal failure. Treatment is aggressive IV hydration and urine alkalinisation."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What neuroendocrine changes underlie fibromyalgia?",
   opts:["Reduced serotonin + elevated substance P + HPA axis dysregulation","Excess dopamine and reduced GABA","Reduced acetylcholine at neuromuscular junctions","Elevated noradrenaline and reduced melatonin"], ans:0,
   explain:"Fibromyalgia involves central sensitisation driven by: reduced serotonin (normally inhibits pain transmission), elevated substance P (amplifies pain signals), and HPA axis dysregulation (abnormal stress-cortisol response). These changes lower the pain threshold — explaining allodynia and widespread pain without structural pathology."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"What early urine finding is characteristic of rhabdomyolysis?",
   opts:["Brown/dark urine (myoglobinuria)","Frothy urine (proteinuria)","Haematuria","Oliguria only"], ans:0,
   explain:"Brown or dark (cola-coloured) urine is the classic early sign of rhabdomyolysis, reflecting myoglobinuria — myoglobin excreted in the urine from destroyed muscle cells. It must be distinguished from haematuria (blood in urine). Elevated serum CK confirms muscle breakdown."},

  {topic:"Musculoskeletal System", type:"MCQ",
   q:"Which diagnostic tool shows joint space narrowing and osteophytes in OA but cannot visualise cartilage?",
   opts:["X-ray","MRI","Arthroscopy","Ultrasound"], ans:0,
   explain:"Plain X-ray (radiograph) is the standard initial imaging for OA. It shows indirect signs of cartilage loss (joint space narrowing), osteophytes (bony spurs), subchondral sclerosis, and cysts. However, cartilage is radiolucent and cannot be directly visualised — MRI or arthroscopy are needed for that."},

  {topic:"Musculoskeletal System", type:"SAQ",
   q:"Describe the pathophysiology and clinical presentation of gout, and outline acute and long-term management.",
   opts:null, ans:null,
   explain:"Pathophysiology: hyperuricaemia (reduced renal excretion in >90%) → monosodium urate crystal deposition in joints and soft tissues → neutrophil-mediated inflammatory response (crystals activate NLRP3 inflammasome → IL-1β release) → intense acute arthritis. Crystals cannot be dissolved once formed. Clinical presentation: acute monoarthritis (podagra — 1st MTP joint in >50%), sudden onset of severe pain, erythema, warmth, swelling; self-limiting in 5–14 days. Chronic gout: tophi (crystal deposits in soft tissue), joint damage, renal stones. Management — Acute: NSAIDs (first-line), colchicine (inhibits neutrophil microtubule function), corticosteroids (if contraindications to NSAIDs). Long-term: allopurinol (xanthine oxidase inhibitor — reduces uric acid production), probenecid (uricosuric — increases renal excretion), dietary modification (avoid organ meats, shellfish, alcohol, fructose), adequate hydration."},

  {topic:"Musculoskeletal System", type:"SAQ",
   q:"Describe the pathophysiology, signs and symptoms, and management of Duchenne Muscular Dystrophy (DMD).",
   opts:null, ans:null,
   explain:"Pathophysiology: X-linked mutation in the dystrophin gene (Xp21) → absent dystrophin protein → sarcolemmal membrane instability → uncontrolled calcium influx → proteolysis → muscle fibre necrosis → replacement by fibrous and fatty tissue. DMD has null mutations (no dystrophin); Becker MD has partial dystrophin (milder). Signs and symptoms: delayed motor milestones (late walking), frequent falls, Gowers' sign (using arms to stand from floor), pseudohypertrophy of calves (fat replaces muscle), waddling gait, progressive proximal weakness, cardiomyopathy, and respiratory failure (leading causes of death). Management: corticosteroids (prednisolone/deflazacort — slow muscle deterioration), physiotherapy, spinal bracing (scoliosis), non-invasive ventilation (respiratory failure), cardiac monitoring and ACE inhibitors (cardiomyopathy), gene therapy approaches (exon skipping — ataluren for nonsense mutations), multidisciplinary team care."},

  {topic:"Musculoskeletal System", type:"LAQ",
   q:"Compare and contrast osteoarthritis, rheumatoid arthritis, and gout — including pathophysiology, joint distribution, morning stiffness, key investigations, and management principles.",
   opts:null, ans:null,
   explain:"Osteoarthritis — Pathophysiology: degenerative/mechanical; IL-1 and TNF-α activate MMPs → cartilage breakdown; cartilage fibrillation → clefts → eburnation; subchondral bone hypertrophies. Joint distribution: asymmetric; weight-bearing joints (knees, hips), DIP hands, spine. Morning stiffness: <15 minutes. Key investigations: X-ray (joint space narrowing, osteophytes, subchondral sclerosis); synovial fluid is non-inflammatory. Management: NSAIDs, weight loss, exercise, intra-articular corticosteroids, joint replacement. Rheumatoid Arthritis — Pathophysiology: autoimmune; CD4+ T cells attack synovium → macrophage activation → TNF-α, IL-1, RANK ligand → pannus formation → cartilage and bone erosion. Joint distribution: symmetric; small joints (MCP, PIP, wrists, feet). Morning stiffness: >1 hour. Key investigations: anti-CCP (~90% specific), rheumatoid factor, elevated ESR/CRP, X-ray (erosions, periarticular osteoporosis), ACR/EULAR score ≥6. Management: methotrexate (DMARD first-line), anti-TNF biologics (infliximab, adalimumab), corticosteroids, physiotherapy. Gout — Pathophysiology: metabolic; reduced renal uric acid excretion → hyperuricaemia → monosodium urate crystal deposition → neutrophil-mediated NLRP3 activation → acute inflammation. Joint distribution: monoarticular; 1st MTP (podagra) in >50%, then ankles, knees. Morning stiffness: not prominent. Key investigations: serum uric acid, arthrocentesis (needle-shaped, negatively birefringent crystals under polarising microscopy). Management: acute — NSAIDs, colchicine, corticosteroids; long-term — allopurinol, probenecid, dietary modification."}
