  {topic:"CNS Disorders", type:"SAQ",
   q:"Describe the pathophysiological mechanism of Parkinson's disease, including the role of dopamine and the TRAP mnemonic.",
   opts:null, ans:null,
   explain:"Pathophysiology: Progressive degeneration of dopaminergic neurons in the nigrostriatal pathway (substantia nigra pars compacta). Loss of dopamine disrupts basal ganglia circuits that normally facilitate smooth voluntary movement. The dopamine-acetylcholine imbalance (↓DA, relatively excess ACh) drives motor symptoms. Lewy bodies (aggregates of alpha-synuclein + ubiquitin) are found in surviving neurons. TRAP: Tremor at rest (pill-rolling, unilateral initially), Rigidity (cogwheel), Akinesia/bradykinesia (slow, reduced movements, masked facies, shuffling gait), Postural instability (falls, late feature). Non-motor features: anosmia, constipation, depression, sleep disorders, autonomic dysfunction."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"Explain the process of demyelination in multiple sclerosis and list four clinical manifestations.",
   opts:null, ans:null,
   explain:"Demyelination: An unknown trigger (possibly viral/toxin/UV) activates autoreactive T lymphocytes that cross the blood-brain barrier → attack oligodendrocytes → myelin destruction in CNS white matter → disruption of saltatory conduction (action potential propagation from node to node) → slowed or blocked neural transmission. Inflammatory plaques form at lesion sites. Early demyelination may be partially reversed (relapse-remission), but repeated damage leads to axonal injury and permanent deficit. Clinical manifestations: (1) Muscle weakness and spasticity, (2) Visual disturbances (optic neuritis — painful vision loss), (3) Bladder/bowel dysfunction (urinary urgency, incontinence), (4) Fatigue, numbness, and sensory changes. Also: speech difficulty, depression, cognitive changes."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Define cardiogenic shock. List four clinical manifestations and name two drug classes used in management.",
   opts:null, ans:null,
   explain:"Definition: Cardiogenic shock is a life-threatening condition where the heart cannot pump sufficient blood to meet the body's metabolic needs, resulting in end-organ hypoperfusion. It occurs when ~40% of myocardium is irreversibly damaged (most commonly from MI). Clinical manifestations: (1) Severe hypotension (systolic <90 mmHg), (2) Oliguria/anuria (↓renal perfusion), (3) Pale, cold, clammy skin (peripheral vasoconstriction), (4) Pulmonary oedema and frothy sputum (elevated pulmonary venous pressure), (5) Confusion/agitation (↓cerebral perfusion). Drug classes: (1) Inotropes — dobutamine (beta-1/2 agonist → ↑contractility and CO); milrinone (↑contractility, ↓filling pressure). (2) Diuretics — furosemide (reduce pulmonary/peripheral oedema). Analgesics for pain; vasopressors if profound hypotension."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Explain the pathophysiology of atherosclerosis step by step, and name four risk factors.",
   opts:null, ans:null,
   explain:"Step 1: Endothelial injury (from hypertension, smoking, hyperglycaemia) → increased permeability. Step 2: LDL penetrates the subendothelial intima → oxidised by free radicals. Step 3: Monocytes migrate into the intima → differentiate into macrophages → engulf ox-LDL → foam cells accumulate → fatty streaks (earliest visible lesion). Step 4: Foam cells die → necrotic core forms; smooth muscle cells migrate from media → proliferate under PDGF. Step 5: Fibrous cap forms over the necrotic core. Step 6: Plaque calcification; unstable plaques rupture → platelet aggregation → acute thrombus → MI or stroke. Risk factors: (1) Hypercholesterolaemia (high LDL, low HDL), (2) Hypertension — directly damages endothelium, (3) Smoking — promotes oxidative stress and endothelial dysfunction, (4) Diabetes mellitus — advanced glycation damages vessels. Others: obesity, family history, sedentary lifestyle, high CRP."},

  {topic:"Renal System", type:"SAQ",
   q:"Compare cystitis and pyelonephritis across location, symptoms, typical organisms, and treatment.",
   opts:null, ans:null,
   explain:"Cystitis (lower UTI): Bladder inflammation. Symptoms: dysuria, urinary frequency/urgency, suprapubic pain, cloudy foul urine, possible haematuria — usually no systemic features. Organisms: E. coli (most common), Proteus mirabilis. Treatment: Nitrofurantoin or fosfomycin (empiric, low MDR risk); analgesics, urinary alkalizers, high fluid intake. Pyelonephritis (upper UTI): Infection of renal pelvis and nephrons. Symptoms: all of cystitis PLUS systemic features — high fever, chills, flank/groin pain, costovertebral angle tenderness, nausea, vomiting, haematuria. Organisms: E. coli, Proteus mirabilis, Pseudomonas. Treatment: ciprofloxacin/levofloxacin (low MDR risk); IV ceftriaxone or ertapenem (high risk/septic); analgesics, antipyretics, antiemetics, IV fluids."},

  {topic:"Renal System", type:"SAQ",
   q:"Describe the pathological mechanism of chronic pyelonephritis and its potential end-stage complication.",
   opts:null, ans:null,
   explain:"Chronic pyelonephritis results from persistent or repeated bacterial infection of the renal pelvis and nephrons — often in the context of structural abnormalities (vesicoureteral reflux, obstruction, kidney stones, or BPH). Each episode triggers an inflammatory response, causing: neutrophil and macrophage infiltration → tissue oedema and abscess formation → papillary necrosis → progressive fibrosis and scarring. Over time, scarring replaces functional nephrons irreversibly. Remaining nephrons undergo compensatory hyperfiltration → further injury. The condition is often asymptomatic until significant nephron loss has occurred. End-stage complication: Chronic renal failure (end-stage renal disease) requiring dialysis or transplantation. Other complications: hypertension (from RAAS activation in scarred kidneys), sepsis if acutely infected."},

  {topic:"Respiratory System", type:"SAQ",
   q:"Explain the four pathophysiological mechanisms of diarrhoea with examples.",
   opts:null, ans:null,
   explain:"(1) Osmotic diarrhoea: osmotically active substances draw water into the intestinal lumen → watery stool. Resolves with fasting. Causes: rotavirus, norovirus, lactose intolerance, osmotic laxatives. (2) Secretory diarrhoea: ↓water and salt absorption, ↑chloride secretion → large volume watery stool. Does NOT resolve with fasting. Causes: E. coli enterotoxin, Vibrio cholerae (cholera toxin), rotavirus. (3) Exudative/Inflammatory diarrhoea: disruption of intestinal epithelial integrity → bloody/mucous stool (dysentery). Causes: E. coli, Shigella, Salmonella, Giardia, IBD. (4) Motility disturbance: altered GI transit — too fast (decreased absorption) or too slow (bacterial overgrowth). Causes: IBS, post-surgical, thyrotoxicosis, medications."},

  {topic:"Respiratory System", type:"SAQ",
   q:"List five clinical features of pneumonia and name two severity assessment tools used in Australia.",
   opts:null, ans:null,
   explain:"Clinical features of pneumonia: (1) Productive cough (sputum colour varies by pathogen — rusty = S. pneumoniae), (2) Pyrexia (fever) and chills, (3) Dyspnoea and tachypnoea (hypoxaemia), (4) Pleuritic chest pain (worse on inspiration), (5) Reduced lung expansion and dullness to percussion on the affected side. Also: tachycardia, fatigue, dehydration, hypoxaemia. Severity assessment tools (Australia/NZ): (1) CORB score: Confusion, Oxygenation, Respiratory rate, Blood pressure — predicts 30-day mortality. (2) PSI (Pneumonia Severity Index): comprehensive scoring; assigns patients to risk classes I–V. (3) SMART-COP: identifies need for ICU-level care. The exam notes specifically mention CORB and PSI."},

  {topic:"Gastrointestinal System", type:"SAQ",
   q:"Describe the mechanism by which H. pylori causes peptic ulcer disease.",
   opts:null, ans:null,
   explain:"H. pylori survives gastric acid by secreting urease → converts urea to ammonium → creates an alkaline microenvironment around the bacterium. Pathogenic mechanisms: (1) Reduces mucous layer thickness → exposes mucosa to acid/pepsin, (2) Induces gastrin release from G cells → ↑HCl secretion, (3) Inhibits somatostatin (which normally suppresses acid) → unopposed acid production, (4) Promotes pro-inflammatory cytokines (IL-1β, TNF-α, IL-8) → mucosal inflammation and damage, (5) CagA and VacA virulence factors directly disrupt epithelial cell integrity and immune responses. Result: mucosal erosion >5mm deep exposing smooth muscle and blood vessels → peptic ulcer. H. pylori present in ~80% of gastric ulcers, ~95% of duodenal ulcers."},

  {topic:"Gastrointestinal System", type:"SAQ",
   q:"Describe the immunological mechanism of coeliac disease and list four symptoms.",
   opts:null, ans:null,
   explain:"Mechanism: Gluten (found in wheat, rye, barley) is incompletely digested → forms immunoreactive fragment gliadin → gliadin crosses intestinal mucosa and cross-links with tissue transglutaminase (tTG) → the gliadin-tTG complex is presented by HLA-DQ2/DQ8 molecules to CD4+ T cells → T-cell activation → production of anti-tTG IgA antibodies → inflammatory response in lamina propria → villous atrophy and crypt hyperplasia → malabsorption. Symptoms: (1) Chronic diarrhoea and steatorrhoea (fat malabsorption), (2) Weight loss and failure to thrive, (3) Abdominal pain and distension, (4) Anaemia (iron and folate malabsorption), (5) Electrolyte imbalances, mouth ulcers, dermatitis herpetiformis."},

  {topic:"Endocrine System", type:"SAQ",
   q:"Compare Graves' disease and Hashimoto's disease in terms of mechanism, thyroid hormone levels, and treatment.",
   opts:null, ans:null,
   explain:"Graves' disease (hyperthyroidism): Autoantibodies (TSI) bind and activate TSH receptors → follicular cells overproduce T3/T4 → ↑T3/T4, ↓TSH. Specific features: exophthalmos (autoantibody-mediated orbital inflammation), goitre. Treatment: antithyroid drugs (propylthiouracil, carbimazole), radioactive iodine (I-131), surgery. Hashimoto's disease (hypothyroidism): Autoantibodies against thyroid peroxidase and thyroglobulin → T-cell infiltration and fibrosis → gland destruction → ↓T3/T4, ↑TSH. Features: goitre, non-pitting oedema (myxoedema if severe), cold intolerance, weight gain, bradycardia, constipation. Treatment: levothyroxine replacement (start low, titrate). Both are autoimmune; Hashimoto's is the most common cause of hypothyroidism; Graves' is the most common cause of hyperthyroidism."},

  {topic:"Endocrine System", type:"SAQ",
   q:"Explain the pathophysiology of diabetic ketoacidosis (DKA) in Type 1 diabetes.",
   opts:null, ans:null,
   explain:"DKA occurs due to absolute insulin deficiency in T1D. Without insulin: (1) Glucose cannot enter cells → hyperglycaemia → osmotic diuresis → dehydration and electrolyte loss. (2) Cells perceive starvation → counter-regulatory hormones ↑ (glucagon, adrenaline, cortisol) → ↑gluconeogenesis → worsens hyperglycaemia. (3) Unrestrained lipolysis → free fatty acids (FFAs) released from adipose → liver converts FFAs to ketone bodies (acetoacetate, beta-hydroxybutyrate, acetone) → metabolic acidosis (ketonaemia). (4) Acetone exhaled as fruity/acetone breath. Clinical features: polydipsia, polyuria, nausea, vomiting, abdominal pain, Kussmaul breathing (deep, rapid — compensatory for acidosis), confusion, coma. Management: IV fluid resuscitation, IV insulin infusion (not subcut — too slow), potassium replacement (insulin drives K+ into cells), sodium bicarbonate (only for severe acidosis), treat precipitant."},

  {topic:"Musculoskeletal System", type:"SAQ",
   q:"Describe the pathophysiology of osteoarthritis step by step, from chondrocyte dysfunction to bone exposure.",
   opts:null, ans:null,
   explain:"Step 1: Chondrocyte dysfunction — normally terminally differentiated, but in OA, chondrocytes begin dividing abnormally, forming metabolically active clusters. Step 2: Matrix degradation — pro-inflammatory cytokines (IL-1, TNF-α) induce matrix metalloproteinases (MMPs) → degrade type II collagen and aggrecan (structural proteins of cartilage). Step 3: Cartilage vulnerability — ↓aggrecan reduces cartilage's ability to withstand compressive forces. Step 4: Fibrillation — fissures develop in cartilage surface → vertical clefts → chondrocyte death → ↓cartilage thickness. Step 5: Bone exposure — progressive cartilage loss exposes subchondral bone → eburnation (dense, ivory-like bone surface). Step 6: Crystal deposition — calcium pyrophosphate and basic calcium phosphate crystals deposit in abnormal cartilage → further inflammation. Osteophyte formation at joint margins; subchondral cysts form from synovial fluid forced into the bone."},

  {topic:"Reproductive System", type:"SAQ",
   q:"Describe the pathophysiology of PCOS and list four clinical features.",
   opts:null, ans:null,
   explain:"Pathophysiology: The central mechanism is insulin resistance → compensatory hyperinsulinaemia. Elevated insulin: (1) Reduces hepatic SHBG (sex hormone-binding globulin) production → ↑free androgens. (2) Directly stimulates ovarian androgen production. Elevated androgens suppress the normal LH:FSH ratio → follicles fail to mature and ovulate → accumulate as cysts in the ovary. HPO axis dysregulation: ↑LH, relatively ↓FSH → tonic anovulation. Environmental toxins (pesticides, plastics) also implicated via endocrine disruption. Clinical features: (1) Hirsutism — male-pattern facial/body hair from androgen excess, (2) Amenorrhoea or oligomenorrhoea — irregular/absent periods from anovulation, (3) Acne and oily skin — androgen-driven sebaceous gland overactivity, (4) Obesity — worsens insulin resistance in a vicious cycle. Also: infertility, mood disorders, polycystic ovaries on ultrasound."},

  {topic:"Reproductive System", type:"SAQ",
   q:"Compare prostate cancer and BPH in terms of pathophysiology, location, and management.",
   opts:null, ans:null,
   explain:"BPH (Benign Prostatic Hyperplasia): Mechanism: Testosterone → 5α-DHT (via 5α-reductase, ↑with age) → drives nodular hyperplasia of periurethral zone → compresses urethra → obstructive urinary symptoms. Not malignant. Symptoms: reduced flow, nocturia, urgency, retention. Management: Alpha-blockers (terazosin — relax smooth muscle rapidly), 5α-reductase inhibitors (finasteride — shrink prostate long-term), PDE5 inhibitors, TURP surgery. Prostate Cancer (Adenocarcinoma): Mechanism: Androgen-dependent malignancy from glandular epithelium; 5α-DHT drives cancerous proliferation. Over time becomes hormone-refractory (androgen receptor mutations allow activation without androgen). Usually arises in peripheral zone (vs BPH in periurethral zone). Often asymptomatic until advanced — metastasises to bone (~90%). Diagnosis: DRE, PSA, TRUS biopsy. Management: Radical prostatectomy, radiotherapy, androgen deprivation therapy (LHRH agonists, anti-androgens), chemotherapy for advanced disease."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Describe leukaemia: pathophysiology, clinical features, and treatment strategies.",
   opts:null, ans:null,
   explain:"Pathophysiology: Clonal malignant proliferation of abnormal white blood cells (immature blasts in acute; mature cells in chronic) in bone marrow → crowd out normal haematopoiesis → anaemia (↓RBCs), neutropenia (↓normal WBCs → infection), thrombocytopenia (↓platelets → bleeding). Abnormal cells may infiltrate liver, spleen, lymph nodes, CNS. Types: Acute lymphoblastic (ALL), Acute myeloid (AML), Chronic myeloid (CML), Chronic lymphocytic (CLL). Clinical features: Fatigue and pallor (anaemia), frequent infections (neutropenia), bruising/petechiae/bleeding (thrombocytopenia), bone pain (marrow expansion), lymphadenopathy, hepatosplenomegaly, weight loss. Treatment: (1) Combination chemotherapy — induction → consolidation → maintenance. (2) Targeted therapy — tyrosine kinase inhibitors (imatinib for CML), monoclonal antibodies (rituximab for CLL). (3) Stem cell transplantation — curative for eligible patients. (4) Supportive care — transfusions, antibiotics, antifungals, tumour lysis monitoring."},

  {topic:"Cardiovascular System", type:"LAQ",
   q:"Describe the pathophysiology of heart failure including neurohormonal compensation, left vs right-sided differences, classification by ejection fraction, and guideline-directed medical therapy (GDMT).",
   opts:null, ans:null,
   explain:"Pathophysiology: Heart failure (HF) is a syndrome where the heart cannot meet metabolic demands or handle venous return without elevated filling pressures. Core mechanisms: (A) Systolic dysfunction (HFrEF ≤40%): ↓contractility → ↓stroke volume → ↓CO. (B) Diastolic dysfunction (HFpEF ≥50%): stiff ventricle → impaired filling → ↑filling pressures. Neurohormonal compensation: ↓CO activates SNS (↑HR, vasoconstriction) and RAAS (Na/H2O retention, aldosterone, ADH). Initially adaptive but chronically maladaptive → ↑afterload/preload → pathological remodelling (eccentric hypertrophy/dilation in HFrEF; concentric in HFpEF) → apoptosis, fibrosis, progressive dysfunction. Left HF: LV fails → blood backs into pulmonary veins → pulmonary oedema → dyspnoea, orthopnoea, PND, frothy pink sputum, crackles, fatigue. Right HF: RV fails → systemic venous congestion → peripheral oedema, hepatomegaly, JVD, ascites, GI congestion (nausea, anorexia). Progression: Left HF → pulmonary HTN → right HF (biventricular common long-term). Classification: HFrEF (≤40%), HFmrEF (41–49%), HFpEF (≥50%); NYHA Class I–IV by symptom severity. GDMT for HFrEF (quadruple therapy): (1) ACEi/ARB/ARNI (sacubitril/valsartan) — ↓preload/afterload, ↓remodelling; (2) Beta-blockers (carvedilol, bisoprolol) — ↓HR, ↓oxygen demand, ↑EF; (3) MRA (spironolactone) — ↓fibrosis, ↓aldosterone; (4) SGLT2i (dapagliflozin) — ↓HF hospitalisations. Diuretics (furosemide) for symptom relief. Devices: ICD (sudden death prevention), CRT (dyssynchrony)."},

  {topic:"Renal System", type:"LAQ",
   q:"Explain the pathophysiology of chronic kidney disease (CKD) including the maladaptive hyperfiltration cycle, systemic consequences, and comprehensive treatment strategies.",
   opts:null, ans:null,
   explain:"Pathophysiology of CKD: CKD is progressive, irreversible nephron loss from ongoing injury. Common causes: diabetic nephropathy (leading cause), hypertensive nephrosclerosis, glomerulonephritis, chronic pyelonephritis. Maladaptive hyperfiltration cycle: Initial nephron loss → surviving nephrons undergo compensatory hypertrophy and hyperfiltration → intraglomerular hypertension and proteinuria → podocyte injury → TGF-β-driven interstitial fibrosis and tubular atrophy (hallmark histological finding) → further nephron loss → vicious cycle of progression. Systemic consequences as GFR declines: (1) Uraemia (GFR <30): accumulation of nitrogenous wastes → nausea, fatigue, encephalopathy. (2) Fluid overload → hypertension, pulmonary oedema. (3) Metabolic acidosis: ↓H+ excretion. (4) Hyperkalaemia: ↓K+ excretion → arrhythmia risk. (5) Renal anaemia: ↓erythropoietin → normocytic anaemia. (6) Renal osteodystrophy: ↓Vit D activation → ↓Ca2+ → ↑PTH (secondary hyperparathyroidism) → bone resorption → fracture risk. Stages: G1 (GFR ≥90, kidney damage) → G5 (GFR <15, ESRD). Treatment: (A) Slow progression: RAAS inhibition (ACEi/ARB) — reduce intraglomerular HTN and proteinuria; glycaemic control; BP targets; SGLT2 inhibitors (shown to reduce CKD progression). (B) Manage consequences: Diuretics (fluid overload); sodium bicarbonate (acidosis); dietary K+ restriction + potassium binders (hyperkalaemia); ESA + IV iron (anaemia); phosphate binders + Vit D analogue (bone disease); statins (CVD risk). (C) Renal replacement therapy (ESRD): haemodialysis (3×/week), peritoneal dialysis (home-based), or renal transplantation (curative)."},

  {topic:"Respiratory System", type:"LAQ",
   q:"Describe the pathophysiology, clinical features, diagnosis, and management of COPD — including the differences between chronic bronchitis and emphysema.",
   opts:null, ans:null,
   explain:"COPD overview: Chronic Obstructive Pulmonary Disease is a progressive, largely irreversible condition caused primarily by cigarette smoking (or air pollutants), encompassing two overlapping conditions: chronic bronchitis and emphysema. Both cause obstructive physiology (FEV1/FVC <70%). Pathophysiology of Chronic Bronchitis: Tobacco smoke → chronic airway inflammation → hypertrophy and hyperplasia of mucus glands and goblet cells → mucus hypersecretion → damaged cilia cannot clear mucus → mucus plugging → airway obstruction and recurrent infection. Pathophysiology of Emphysema: Tobacco smoke → neutrophil/macrophage recruitment → release of proteases (elastase, MMPs) → destruction of alveolar walls and elastic fibres → permanent alveolar enlargement (air trapping) → ↓elastic recoil → expiratory airflow limitation → hyperinflation (barrel chest) → ↓gas exchange surface area → hypoxaemia and hypercapnia. Shared pathway: inflammation → cytokine release → either mucus hypersecretion (bronchitis) or elastic tissue destruction (emphysema) → cor pulmonale (right heart failure from chronic hypoxia → pulmonary vasoconstriction → pulmonary HTN → RV hypertrophy). Clinical features: Progressive dyspnoea (worse on exertion), chronic productive cough (especially in chronic bronchitis), barrel chest, pursed-lip breathing, use of accessory muscles, digital clubbing, cyanosis, weight loss. Diagnosis: History of significant smoking exposure; spirometry (FEV1/FVC <70%); post-bronchodilator spirometry for severity staging (GOLD grades 1–4); chest X-ray (hyperinflation, flattened diaphragm); ABG (hypoxaemia, hypercapnia). Management: (1) Smoking cessation (most important — only intervention proven to slow decline). (2) Bronchodilators: SABA/SAMA (symptom relief), LABA/LAMA (maintenance). (3) Inhaled corticosteroids (reduce exacerbations in selected patients). (4) Pulmonary rehabilitation — improves exercise tolerance, quality of life. (5) Long-term oxygen therapy (LTOT) for PaO2 <55 mmHg — reduces cor pulmonale mortality. (6) Influenza and pneumococcal vaccination. (7) Nutritional support (weight loss worsens prognosis)."},

  {topic:"CNS Disorders", type:"LAQ",
   q:"Describe the pathophysiology of ischaemic stroke and haemorrhagic stroke — including risk factors, clinical manifestations by hemisphere, diagnostic evaluation, and acute management of each.",
   opts:null, ans:null,
   explain:"Ischaemic Stroke (~80%): Pathophysiology: Atherosclerotic plaque rupture in a cerebral artery → platelet aggregation → thrombus (thrombotic stroke); OR embolus from heart/carotid travels to a cerebral artery (embolic stroke) → arterial occlusion → loss of oxygen and glucose delivery → neuronal ATP depletion within minutes → cytotoxic oedema → infarction. An ischaemic penumbra (zone of reversible injury) surrounds the core — the therapeutic target. Haemorrhagic Stroke (~20%): Pathophysiology: Hypertension, aneurysm, or AVM causes cerebral vessel rupture → blood accumulates in brain tissue (intracerebral) or subarachnoid space → direct compression, mass effect, raised ICP → ischaemia and herniation risk. Thunderclap headache = classic subarachnoid sign. Risk Factors (modifiable): Hypertension (most important), smoking, atrial fibrillation (embolic), diabetes, dyslipidaemia, obesity, alcohol. Non-modifiable: Age, sex (males), family history, prior TIA. Clinical Manifestations by Hemisphere: Left hemisphere: right-sided hemiplegia/hemiparesis, expressive or receptive aphasia, right visual field deficit, frustration/depression. Right hemisphere: left-sided hemiplegia, left visual field neglect, poor judgement, impulsivity, apparent unconcern. General (both): FAST — Facial drooping, Arm weakness, Speech difficulty, Time to call. Diagnostic Evaluation: (1) CT head — immediate, essential to exclude haemorrhage before any thrombolysis. (2) NIH Stroke Scale — standardised severity assessment. (3) MRI/MRA — detailed tissue/vessel imaging, identifies penumbra. (4) Bloods — FBC, coags, glucose, lipids, troponin. (5) Carotid duplex — identifies stenosis as embolic source. (6) ECG — detects AF as embolic cause. Acute Management: Ischaemic: IV tPA (alteplase) within 4.5 hours (door-to-needle time is critical); mechanical thrombectomy (large vessel occlusion) up to 24 hours; aspirin 300mg; anticoagulation if AF-related. Haemorrhagic: Reverse any anticoagulation; surgical clot evacuation or aneurysm clipping; endovascular coiling; control BP and ICP (osmotic diuretics); avoid thrombolytics — absolutely contraindicated. Supportive care both: airway protection, glycaemic control (hyperglycaemia worsens outcome), fever management, DVT prophylaxis, early rehabilitation."},

  {topic:"Gastrointestinal System", type:"LAQ",
   q:"Describe the pathophysiology of liver cirrhosis — including the steps from injury to nodule formation, the major complications, and their mechanisms.",
   opts:null, ans:null,
   explain:"Definition: Cirrhosis is the end-stage of chronic liver disease, characterised by widespread hepatic fibrosis with replacement of normal architecture by regenerative nodules. Pathophysiology — Step-by-step: (1) Repeated hepatocyte injury (from alcohol, viral hepatitis B/C, NASH, autoimmune hepatitis, biliary disease, haemochromatosis, Wilson's disease). (2) Hepatocyte death → inflammatory response → Kupffer cell and stellate cell activation. (3) Hepatic stellate cells (normally quiescent) are activated by TGF-β, PDGF → transform into myofibroblasts → produce excess collagen (types I and III) → fibrosis of sinusoids. (4) Progressive fibrosis disrupts: hepatocyte organisation (function), sinusoidal blood flow (→ portal hypertension), and bile canaliculi (→ cholestasis). (5) Hepatocytes attempt regeneration but produce only disorganised regenerative nodules — which further distort architecture and increase portal resistance. Note: >75% of liver must be damaged before major symptoms appear. Major complications and mechanisms: Portal Hypertension: Fibrosis and nodules obstruct portal blood flow → elevated portal pressure → (a) Oesophageal and gastric varices — rupture → life-threatening haematemesis; (b) Splenomegaly and hypersplenism → thrombocytopenia; (c) Caput medusae (dilated superficial abdominal veins). Ascites: Portal HTN + ↓albumin (↓oncotic pressure) + RAAS activation → Na/H2O retention → fluid accumulates in peritoneum. Risk of spontaneous bacterial peritonitis. Hepatic Encephalopathy: ↓liver function → ammonia and other toxins not metabolised → accumulate in blood → cross blood-brain barrier → altered consciousness, asterixis, coma. Coagulopathy: Liver synthesises all clotting factors (except VIII) → ↓clotting factors → easy bruising, prolonged bleeding, GI haemorrhage risk. Hepatocellular Carcinoma: High mitotic rate in regenerating hepatocytes → risk of oncogene activation and DNA errors → HCC (AFP elevated). Renal failure (Hepatorenal syndrome): Profound renal vasoconstriction in cirrhosis → ↓GFR → oliguria → acute renal failure."}
];

const TOPICS_ALL = ["All", ...new Set(QUESTIONS.map(q => q.topic))];
let filtered = [...QUESTIONS];
let idx = 0;
let revealed = false;
let correct = 0, attempted = 0;
let activeTopic = "All";
let activeType  = "All";

function applyFilters() {
  filtered = QUESTIONS.filter(q =>
    (activeTopic === "All" || q.topic === activeTopic) &&
    (activeType  === "All" || q.type  === activeType)
  );
  if (!filtered.length) filtered = [...QUESTIONS];
  idx = 0; correct = 0; attempted = 0;
}

function init() {
  const nav = document.getElementById("topicNav");
  nav.innerHTML = TOPICS_ALL.map(t =>
    `<button class="topic-btn${t==="All"?" active":""}" onclick="setTopic('${t.replace(/'/g,"\'")}')">${t}</button>`
  ).join("");
  ["MCQ","SAQ","LAQ"].forEach(type => {
    const n = QUESTIONS.filter(q => q.type === type).length;
    const btn = document.getElementById("type" + type);
    if (btn) btn.textContent = type + " · " + n;
  });
  render();
}

function setTopic(t) {
  activeTopic = t;
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
  applyFilters();
  render();
}

function setType(t) {
  activeType = t;
  ["All","MCQ","SAQ","LAQ"].forEach(x => {
    const btn = document.getElementById("type" + x);
    if (btn) btn.classList.toggle("active", x === t);
  });
  applyFilters();
  render();
}

function render() {
  const q = filtered[idx];
  document.getElementById("qNum").textContent = `Question ${idx+1} of ${filtered.length}`;
  document.getElementById("qType").className = `q-type type-${q.type}`;
  document.getElementById("qType").textContent = q.type;
  document.getElementById("qTopic").textContent = q.topic;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("progFill").style.width = `${Math.round(((idx+1)/filtered.length)*100)}%`;

  const ab = document.getElementById("answerBox");
  ab.innerHTML = `<strong>Model answer</strong>${q.explain}`;
  ab.className = "answer-box";
  revealed = false;

  const optsDiv = document.getElementById("opts");
  if (q.opts) {
    optsDiv.innerHTML = q.opts.map((o,i) =>
      `<button class="opt" onclick="checkOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join("");
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("hint").textContent = "Select the best answer.";
  } else {
    optsDiv.innerHTML = "";
    document.getElementById("revealBtn").style.display = "inline-block";
    document.getElementById("hint").textContent = q.type === "LAQ" ? "Draft your full essay answer before revealing." : "Try to recall key points before revealing the model answer.";
  }
  updateScore();
}

function checkOpt(i) {
  if (revealed) return;
  revealed = true;
  attempted++;
  const q = filtered[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach((b, j) => {
    b.disabled = true;
    if (j === q.ans) b.classList.add("correct");
    else if (j === i) b.classList.add("wrong");
  });
  if (i === q.ans) correct++;
  document.getElementById("answerBox").classList.add("show");
  updateScore();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("answerBox").classList.add("show");
}

function next() {
  idx = (idx + 1) % filtered.length;
  render();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; correct = 0; attempted = 0;
  render();
}

function resetStats() {
  correct = 0; attempted = 0;
  updateScore();
}

function updateScore() {
  const sb = document.getElementById("scoreBar");
  if (attempted === 0) { sb.innerHTML = `<span class="score-pill">Attempt an MCQ to track your score</span>`; return; }
  const pct = Math.round((correct/attempted)*100);
  sb.innerHTML = `<span class="score-pill">MCQ score: <span>${correct}/${attempted}</span></span><span class="score-pill">Accuracy: <span>${pct}%</span></span>`;
}

init();
</script>
