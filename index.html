<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathophysiology Practice Exam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #5a5a56; --text3: #999994;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb; --blue-text: #185fa5; --blue-border: #b5d4f4;
    --green-bg: #eaf3de; --green-text: #3b6d11; --green-border: #c0dd97;
    --amber-bg: #faeeda; --amber-text: #854f0b; --amber-border: #fac775;
    --correct-bg: #eaf3de; --correct-border: #639922; --correct-text: #27500a;
    --wrong-bg: #fcebeb; --wrong-border: #a32d2d; --wrong-text: #501313;
    --accent: #1D9E75;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2e2e2b;
      --text: #f0ede6; --text2: #aaa89f; --text3: #6b6965;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-bg: #042c53; --blue-text: #85b7eb; --blue-border: #185fa5;
      --green-bg: #173404; --green-text: #97c459; --green-border: #3b6d11;
      --amber-bg: #412402; --amber-text: #fac775; --amber-border: #854f0b;
      --correct-bg: #173404; --correct-border: #639922; --correct-text: #c0dd97;
      --wrong-bg: #501313; --wrong-border: #a32d2d; --wrong-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; padding: 2rem 0 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .topic-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .topic-btn { font-size: 12px; padding: 6px 14px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .topic-btn:hover { background: var(--bg2); }
  .topic-btn.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .score-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; min-height: 24px; }
  .score-pill { font-size: 13px; color: var(--text2); }
  .score-pill span { font-weight: 600; color: var(--text); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-num { font-size: 12px; color: var(--text3); }
  .q-type { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em; }
  .type-MCQ { background: var(--blue-bg); color: var(--blue-text); }
  .type-SAQ { background: var(--green-bg); color: var(--green-text); }
  .type-LAQ { background: var(--amber-bg); color: var(--amber-text); }
  .question { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.65; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .opt { padding: 11px 14px; border: 0.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text); background: var(--bg); transition: all 0.15s; text-align: left; font-family: inherit; line-height: 1.5; }
  .opt:hover:not(:disabled) { background: var(--bg2); border-color: var(--border2); }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); font-weight: 500; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }
  .opt:disabled { cursor: default; }
  .answer-box { background: var(--bg2); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; font-size: 14px; color: var(--text); line-height: 1.75; margin-bottom: 1.25rem; display: none; }
  .answer-box.show { display: block; }
  .answer-box strong { color: var(--accent); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 9px 20px; border: 0.5px solid var(--border2); border-radius: 10px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); font-weight: 500; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 10px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--bg2); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 600; color: var(--text); }
  .topic-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg3); color: var(--text3); display: inline-block; margin-bottom: 8px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  footer { text-align: center; padding: 2rem 0 1rem; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Pathophysiology Practice Exam</h1>
    <p>MCQ · Short Answer · Long Answer — all topics</p>
  </header>

  <div class="card">
    <div class="section-label">Filter by topic</div>
    <div class="topic-nav" id="topicNav"></div>

    <div class="stats-grid" id="statsGrid" style="display:none"></div>
    <div class="score-bar" id="scoreBar"></div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

    <div class="q-meta">
      <span class="q-num" id="qNum"></span>
      <span class="q-type" id="qType"></span>
    </div>
    <div class="topic-tag" id="qTopic"></div>
    <div class="question" id="qText"></div>
    <div class="options" id="opts"></div>
    <div class="answer-box" id="answerBox"></div>
    <div class="btn-row">
      <button class="btn" id="revealBtn" onclick="reveal()">Show answer</button>
      <button class="btn btn-primary" onclick="next()">Next question →</button>
      <button class="btn" onclick="shuffle()">Shuffle</button>
      <button class="btn" onclick="resetStats()">Reset score</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <footer>Offline quiz — all content from your Pathophysiology lecture slides.</footer>
</div>

<script>
const QUESTIONS = [
  // ── INFLAMMATION & HEALING ──
  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which of the following is NOT a cardinal sign of inflammation?",
   opts:["Heat (calor)","Redness (rubor)","Cyanosis","Pain (dolor)"], ans:2,
   explain:"The four cardinal signs of inflammation are heat (calor), redness (rubor), swelling (tumour), and pain (dolor). A fifth is loss of function. Cyanosis is a sign of tissue hypoxia, not inflammation."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which inflammatory mediator is an anaphylatoxin?",
   opts:["Bradykinin","IL-6","C5a","Serotonin"], ans:2,
   explain:"C3a and C5a are complement-derived anaphylatoxins that trigger mast cell degranulation, vasodilation, and increased vascular permeability."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"IL-6 induces synthesis of all of the following EXCEPT:",
   opts:["CRP","Fibrinogen","Albumin","Hepcidin"], ans:2,
   explain:"IL-6 induces CRP, serum amyloid A, fibrinogen, and hepcidin (acute phase proteins) but INHIBITS production of albumin."},

  {topic:"Inflammation & Healing", type:"MCQ",
   q:"Which cells are predominant in chronic inflammation?",
   opts:["Neutrophils and mast cells","Macrophages and lymphocytes","Eosinophils and basophils","Platelets and erythrocytes"], ans:1,
   explain:"Chronic inflammation is characterised by infiltration of macrophages and lymphocytes, fibrosis, and granuloma formation, in contrast to the neutrophil-dominated acute phase."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Describe the two phases of the acute inflammatory response.",
   opts:null, ans:null,
   explain:"Phase 1 – Vascular phase: vasodilation and increased capillary permeability cause heat, redness, and swelling. Histamine and serotonin are key early mediators. Phase 2 – Cellular phase: leukocyte migration (margination → rolling → adhesion → chemotaxis) from vessels into tissues, causing pain and facilitating phagocytosis."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Distinguish between acute and chronic inflammation in terms of duration, predominant cell type, and outcomes.",
   opts:null, ans:null,
   explain:"Acute: immediate/early response (minutes–days), neutrophil-dominant, vascular phase prominent, may resolve or progress. Chronic: weeks–years, macrophage and lymphocyte infiltration, fibrosis, associated with autoimmune disease and metabolic disorders. Chronic may arise from recurrent acute episodes or from persistent stimuli."},

  {topic:"Inflammation & Healing", type:"SAQ",
   q:"Differentiate between a keloid scar and a hypertrophic scar.",
   opts:null, ans:null,
   explain:"Hypertrophic scar: raised scar that stays within the wound boundaries, may regress over time, occurs due to excessive collagen deposition during healing. Keloid: scar that extends beyond original wound margins into normal tissue, does not regress, contains thick irregular collagen bundles, more common in darker skin types."},

  {topic:"Inflammation & Healing", type:"LAQ",
   q:"Explain the full pathway of inflammation from trigger to resolution or chronic disease, including key cellular events and mediators.",
   opts:null, ans:null,
   explain:"Trigger (immunological, humoral, biomechanical, physical) → Cell response: calcium entry, receptor activation, upregulation of pro-inflammatory genes, downregulation of anti-inflammatory genes, release of mediators (histamine, serotonin, bradykinin, C3a/C5a, PGE-2, LTB-4, PAF, IL-1, IL-6), expression of adhesion molecules → Microvascular consequences: enhanced endothelial permeability, leukocyte entrapment/rolling/adhesion/migration (chemotaxis), monocyte/T-lymphocyte infiltration, thrombosis, apoptosis, organ dysfunction → Either: Resolution (growth factor synthesis, angiogenesis, scar/tissue remodelling) OR Non-resolved chronic inflammation → disease (autoimmune disorders, metabolic disease)."},

  // ── CNS ──
  {topic:"CNS Disorders", type:"MCQ",
   q:"Which pathological hallmarks are characteristic of Alzheimer's disease?",
   opts:["Lewy bodies and dopamine loss","Neurofibrillary tangles and β-amyloid plaques","Demyelination and gliosis","Prion aggregates and cortical thinning"], ans:1,
   explain:"Alzheimer's is defined by intracellular neurofibrillary tangles (from altered tau protein) and extracellular β-amyloid (senile) plaques, leading to neuronal loss and cortical atrophy."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"In Parkinson's disease, which pathway degenerates to produce motor deficits?",
   opts:["Corticospinal tract","Nigrostriatal pathway","Spinocerebellar tract","Limbic pathway"], ans:1,
   explain:"Loss of dopamine-producing neurons in the substantia nigra leads to degeneration of the nigrostriatal pathway, causing the cardinal features: tremor, rigidity, bradykinesia, and postural instability."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"An absence seizure typically lasts:",
   opts:["30–60 seconds","1–5 minutes","5–10 seconds","10–15 seconds"], ans:2,
   explain:"Absence seizures last approximately 5–10 seconds, characterised by cessation of activity and loss of awareness without falling."},

  {topic:"CNS Disorders", type:"MCQ",
   q:"Which type of dementia is associated with prion particles and is rapidly fatal after symptoms appear?",
   opts:["Vascular dementia","Alcohol-related dementia","Creutzfeldt-Jakob dementia","Fronto-temporal lobar degeneration"], ans:2,
   explain:"Creutzfeldt-Jakob disease is caused by prion particles. It presents with dementia, behavioural and motor changes, and death occurs soon after symptoms become apparent."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"List four cardinal signs of Parkinson's disease and name two neurotransmitters impaired.",
   opts:null, ans:null,
   explain:"Cardinal signs: (1) Resting tremor, (2) Rigidity (lead-pipe/cogwheel), (3) Bradykinesia (slowness of movement), (4) Postural instability. Impaired neurotransmitters: Dopamine (reduced — primary deficit) and Acetylcholine (imbalanced relative to dopamine loss)."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"Differentiate between ischaemic and haemorrhagic stroke, and define a transient ischaemic attack (TIA).",
   opts:null, ans:null,
   explain:"Ischaemic stroke: occlusion of a cerebral artery (thrombus or embolus) causing infarction; treated with thrombolytics (if within window) and antiplatelets. Haemorrhagic stroke: rupture of a cerebral vessel causing bleeding into brain tissue; thrombolytics are contraindicated; managed surgically and supportively. TIA: transient episode of neurological dysfunction from focal brain ischaemia, resolving within 24 hours (usually minutes), with no permanent infarction — a major warning sign of impending stroke."},

  {topic:"CNS Disorders", type:"SAQ",
   q:"List five risk factors for Alzheimer's disease.",
   opts:null, ans:null,
   explain:"(1) Advanced age, (2) Family history/genetic factors (e.g. APOE-ε4), (3) Female sex, (4) History of head trauma, (5) Cardiovascular risk factors (hypertension, diabetes, obesity), (6) Low educational attainment, (7) Depression."},

  {topic:"CNS Disorders", type:"LAQ",
   q:"Describe the pathophysiology of Alzheimer's disease including intracellular and extracellular changes, stages of clinical progression, and management.",
   opts:null, ans:null,
   explain:"Intracellular: altered tau protein → microtubule collapse → neurofibrillary tangles. Extracellular: secretases cleave amyloid precursor protein (APP) → β-amyloid fragments aggregate → senile (β-amyloid) plaques. Both pathways → oxidative stress, overstimulation of NMDA receptors (excitotoxicity), cholinergic dysfunction, neuronal loss, cortical atrophy, and neuroinflammation. Clinical stages: Mild — confusion, memory loss, depression, personality changes (managed with SSRIs, memory aids, NMDA antagonists, cholinesterase inhibitors). Moderate — ↓attention span, dyspraxia, incontinence, behavioural issues (managed with assisted care, continence aids, psychotropic agents). Severe — total dependence, vegetative state (total care). Alzheimer's represents 50–70% of all dementias."},

  // ── CARDIOVASCULAR ──
  {topic:"Cardiovascular System", type:"MCQ",
   q:"Ischaemic heart disease is primarily defined as:",
   opts:["Infection of the myocardium","Inadequate oxygen supply to the heart","Valve regurgitation","Arrhythmia reducing cardiac output"], ans:1,
   explain:"IHD is caused by inadequate oxygen supply to the myocardium, most commonly due to atherosclerotic narrowing of coronary arteries."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Which stage of plaque development involves foam cell formation and smooth muscle migration?",
   opts:["Endothelial cell injury","Migration of inflammatory cells","Lipid accumulation and smooth muscle proliferation","Fibrous cap formation"], ans:2,
   explain:"Stage 3 involves lipid (LDL) accumulation, foam cell formation (macrophages engulfing LDL), release of toxic oxygen species, and smooth muscle migration — the core of atherogenesis."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Left heart failure primarily causes:",
   opts:["Dependent oedema and liver congestion","Pulmonary oedema and decreased cardiac output","GI distress and ascites","Anorexia and weight loss"], ans:1,
   explain:"Left ventricular failure → pulmonary congestion → pulmonary oedema, orthopnoea, paroxysmal nocturnal dyspnoea, impaired gas exchange, and cyanosis."},

  {topic:"Cardiovascular System", type:"MCQ",
   q:"Which of the following is a modifiable risk factor for hypertension?",
   opts:["Age","Family history","Obesity","Sex"], ans:2,
   explain:"Obesity is a modifiable risk factor. Age, family history, and sex (male) are non-modifiable risk factors for hypertension."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Define atherosclerosis. List five major risk factors.",
   opts:null, ans:null,
   explain:"Atherosclerosis is progressive thickening and hardening of arterial walls due to lipid-laden plaque (atheroma) formation within the intima. Risk factors: (1) Hypercholesterolaemia/elevated LDL, (2) Hypertension, (3) Smoking, (4) Diabetes/metabolic disorders, (5) Ageing, (6) Family history, (7) Obesity, (8) Inflammation, (9) Oxidative stress."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"List the differences between right and left heart failure.",
   opts:null, ans:null,
   explain:"Right heart failure: congestion of peripheral tissues → dependent oedema and ascites, liver congestion (signs of impaired liver function), GI tract congestion (anorexia, GI distress, weight loss). Left heart failure: decreased cardiac output (activity intolerance, signs of decreased tissue perfusion) and pulmonary congestion → impaired gas exchange (cyanosis, hypoxia), pulmonary oedema (cough with frothy sputum, orthopnoea, paroxysmal nocturnal dyspnoea)."},

  {topic:"Cardiovascular System", type:"SAQ",
   q:"Name three types of angina and list five precipitating factors.",
   opts:null, ans:null,
   explain:"Types: (1) Stable angina – predictable, brought on by exertion, relieved by rest. (2) Unstable angina – unpredictable, occurs at rest, sign of impending MI. (3) Variant (Prinzmetal's) angina – caused by coronary artery spasm. Precipitating factors: physical exertion, emotional stress, cold weather, heavy meals, smoking, anaemia, tachycardia."},

  {topic:"Cardiovascular System", type:"LAQ",
   q:"Describe the pathophysiology, clinical evaluation, and management of STEMI.",
   opts:null, ans:null,
   explain:"Pathophysiology: atherosclerotic plaque rupture → platelet aggregation and thrombus formation → complete coronary artery occlusion → full-thickness myocardial ischaemia → necrosis. STEMI (ST-Elevation MI) involves transmural infarction distinguishable from NSTEMI (partial thickness, no persistent ST elevation). Evaluation: (1) ECG – ST elevation, Q waves; (2) Troponin I/T – gold standard biomarker; (3) CK-MB – less specific; (4) Echocardiography – assess wall motion; (5) Coronary angiography – definitive anatomy. Management: Reperfusion – primary PCI (preferred, within 90 min) or thrombolytics (if PCI unavailable). Pharmacological: dual antiplatelet therapy (aspirin + clopidogrel/ticagrelor), anticoagulants (heparin), beta-blockers, ACE inhibitors, statins, nitrates. Complications to monitor: arrhythmia, cardiogenic shock, heart failure, pericarditis."},

  // ── RENAL ──
  {topic:"Renal System", type:"MCQ",
   q:"Which measure is considered the best indicator of kidney function?",
   opts:["Serum creatinine","Blood urea nitrogen","Glomerular filtration rate (GFR)","Urine protein levels"], ans:2,
   explain:"GFR is considered the best single measure of kidney function. It reflects the rate of filtration by all nephrons and is used to stage CKD."},

  {topic:"Renal System", type:"MCQ",
   q:"Why are females more susceptible to urinary tract infections than males?",
   opts:["Higher urinary pH in females","Shorter female urethra anatomically closer to perianal flora","Females produce less IgA","Female kidneys have fewer nephrons"], ans:1,
   explain:"The female urethra is significantly shorter (~4 cm vs ~20 cm in males) and is anatomically close to the anus, facilitating bacterial ascent to the bladder."},

  {topic:"Renal System", type:"MCQ",
   q:"Struvite renal stones are most commonly caused by infection with:",
   opts:["E. coli","Staphylococcus aureus","Proteus mirabilis","Klebsiella pneumoniae"], ans:2,
   explain:"Proteus mirabilis produces urease, which splits urea into ammonia → raises urinary pH → promotes struvite (magnesium ammonium phosphate) crystal formation."},

  {topic:"Renal System", type:"SAQ",
   q:"Distinguish between acute kidney injury (AKI) and chronic kidney disease (CKD).",
   opts:null, ans:null,
   explain:"AKI: sudden onset, potentially reversible, caused by reduced blood flow (pre-renal), structural disruption (intrinsic), or urinary obstruction (post-renal). CKD: slow progressive decline, irreversible permanent nephron loss caused by long-standing conditions (diabetes, hypertension, glomerulonephritis). Both show ↓GFR and waste accumulation, but AKI may recover while CKD progresses to end-stage renal disease."},

  {topic:"Renal System", type:"SAQ",
   q:"Name five types of renal calculi and their associated cause.",
   opts:null, ans:null,
   explain:"(1) Calcium oxalate – hypercalciuria and low urinary citrate. (2) Calcium phosphate – renal tubular acidification defects. (3) Uric acid – high-protein diet, uric acid supersaturation. (4) Struvite – bacterial infection (P. mirabilis, urease-producing). (5) Cystine – elevated urinary cystine (cystinuria, genetic disorder)."},

  {topic:"Renal System", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of chronic kidney disease.",
   opts:null, ans:null,
   explain:"Pathophysiology: progressive nephron loss → ↓GFR → (1) sodium/water retention: hypertension, oedema, heart failure; (2) hyperkalemia: cardiac risk; (3) nitrogenous waste accumulation: uraemia, coagulopathies, bleeding; (4) ↓erythropoietin: anaemia; (5) acid–base imbalance: acidosis; (6) ↓vitamin D activation: hypocalcaemia → hyperparathyroidism → osteodystrophies; (7) phosphate retention: hypocalcaemia. Signs/symptoms: fatigue, oedema, hypertension, anaemia, pruritus (skin disorders), GI manifestations (nausea), neurological manifestations, sexual dysfunction, pericarditis. Investigations: GFR calculation, serum creatinine/urea/electrolytes, full blood count (anaemia), urinalysis, renal ultrasound, renal biopsy. Management: control hypertension (ACE inhibitors/ARBs), glycaemic control, dietary protein and potassium restriction, treat anaemia (erythropoiesis-stimulating agents), phosphate binders, sodium bicarbonate for acidosis, dialysis (haemodialysis or peritoneal) for end-stage, renal transplantation."},

  // ── NEOPLASIA / BLOOD ──
  {topic:"Cancer & Blood", type:"MCQ",
   q:"Which feature best distinguishes a malignant from a benign neoplasm?",
   opts:["Rapid growth rate","Encapsulation","Ability to metastasise","Well-differentiated cells"], ans:2,
   explain:"Metastasis — the ability to invade surrounding tissues and spread via blood/lymph to distant sites — is the defining feature of malignancy. Benign tumours do not metastasise."},

  {topic:"Cancer & Blood", type:"MCQ",
   q:"In carcinogenesis, what immediately follows failure of DNA repair?",
   opts:["Immediate cell death","Activation of oncogenes and inactivation of tumour suppressor genes","Conversion to benign neoplasm","Immune clearance"], ans:1,
   explain:"Failed DNA repair → activation of growth-promoting oncogenes + inactivation of tumour suppressor genes + alterations in apoptosis-controlling genes → unregulated cell differentiation → malignant neoplasm."},

  {topic:"Cancer & Blood", type:"SAQ",
   q:"Differentiate between iron deficiency anaemia and pernicious (megaloblastic) anaemia.",
   opts:null, ans:null,
   explain:"Iron deficiency anaemia: microcytic, hypochromic RBCs; ↓serum iron, ↓ferritin, ↑TIBC; caused by poor dietary intake, chronic blood loss, or malabsorption; treated with oral/IV iron. Pernicious anaemia: macrocytic (megaloblastic) RBCs; caused by B12 deficiency from autoimmune destruction of gastric parietal cells (loss of intrinsic factor); neurological symptoms (subacute combined degeneration of spinal cord); treated with B12 injections/supplementation."},

  {topic:"Cancer & Blood", type:"SAQ",
   q:"Describe eight factors that can cause cancer.",
   opts:null, ans:null,
   explain:"(1) Chemical carcinogens (e.g. tobacco smoke, asbestos). (2) Radiation (UV, ionising). (3) Viral infections (HPV, EBV, HBV, HCV). (4) Genetic mutations/inherited syndromes (BRCA1/2, Li-Fraumeni). (5) Chronic inflammation. (6) Hormonal factors (oestrogen exposure). (7) Immunosuppression. (8) Dietary factors (high-fat diet, processed meat, low fibre)."},

  // ── RESPIRATORY ──
  {topic:"Respiratory System", type:"MCQ",
   q:"COVID-19 (SARS-CoV-2) binds to which receptor to enter human cells?",
   opts:["CD4 receptor","ACE2 receptor","TLR-4","CXCR4"], ans:1,
   explain:"SARS-CoV-2 uses its spike protein to bind the ACE2 (angiotensin-converting enzyme 2) receptor, which is highly expressed in the lungs, heart, kidneys, and gut."},

  {topic:"Respiratory System", type:"MCQ",
   q:"Which classification of pneumonia describes infection acquired in a hospitalised patient after 48 hours of admission?",
   opts:["Community-acquired pneumonia","Ventilator-acquired pneumonia","Hospital-acquired pneumonia","Aspiration pneumonia"], ans:2,
   explain:"Hospital-acquired (nosocomial) pneumonia develops 48+ hours after hospital admission. Ventilator-acquired pneumonia is a subtype occurring in mechanically ventilated patients."},

  {topic:"Respiratory System", type:"MCQ",
   q:"What is the primary gene affected in cystic fibrosis?",
   opts:["CFTR (cystic fibrosis transmembrane conductance regulator)","BRCA1","PTEN","TP53"], ans:0,
   explain:"Cystic fibrosis is caused by mutations in the CFTR gene, leading to defective chloride channel function, thick mucus secretions, and progressive lung damage."},

  {topic:"Respiratory System", type:"SAQ",
   q:"Differentiate between obstructive lung disease (OLD) and restrictive lung disease (RLD).",
   opts:null, ans:null,
   explain:"Obstructive lung disease: airflow obstruction due to airway narrowing or collapse (e.g. asthma, COPD, cystic fibrosis); ↓FEV1/FVC ratio; air trapping → hyperinflation. Restrictive lung disease: reduced lung volume due to stiff lungs or chest wall restriction (e.g. ARDS, fibrosis, sarcoidosis); ↓FVC with normal or increased FEV1/FVC ratio; ↓total lung capacity."},

  {topic:"Respiratory System", type:"SAQ",
   q:"List the trigger factors for asthma and outline the pathophysiology.",
   opts:null, ans:null,

  {topic:"Respiratory System", type:"LAQ",

  {topic:"Gastrointestinal System", type:"LAQ",
   q:"Explain the pathophysiology, signs and symptoms, investigations, and management of cirrhosis.",

const TOPICS_ALL = ["All", ...new Set(QUESTIONS.map(q => q.topic))];
let filtered = [...QUESTIONS];
let idx = 0;
let revealed = false;
let correct = 0, attempted = 0;

function init() {
  const nav = document.getElementById("topicNav");
  nav.innerHTML = TOPICS_ALL.map(t =>
    `<button class="topic-btn${t==="All"?" active":""}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">${t}</button>`
  ).join("");
  render();
}

function setTopic(t) {
  filtered = t === "All" ? [...QUESTIONS] : QUESTIONS.filter(q => q.topic === t);
  idx = 0; correct = 0; attempted = 0;
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
  render();
}

function render() {
  const q = filtered[idx];
  document.getElementById("qNum").textContent = `Question ${idx+1} of ${filtered.length}`;
  document.getElementById("qType").className = `q-type type-${q.type}`;
  document.getElementById("qType").textContent = q.type;
  document.getElementById("qTopic").textContent = q.topic;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("progFill").style.width = `${Math.round(((idx+1)/filtered.length)*100)}%`;

  const ab = document.getElementById("answerBox");
  ab.innerHTML = `<strong>Model answer</strong>${q.explain}`;
  ab.className = "answer-box";
  revealed = false;

  const optsDiv = document.getElementById("opts");
  if (q.opts) {
    optsDiv.innerHTML = q.opts.map((o,i) =>
      `<button class="opt" onclick="checkOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join("");
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("hint").textContent = "Select the best answer.";
  } else {
    optsDiv.innerHTML = "";
    document.getElementById("revealBtn").style.display = "inline-block";
    document.getElementById("hint").textContent = q.type === "LAQ" ? "Draft your full essay answer before revealing." : "Try to recall key points before revealing the model answer.";
  }
  updateScore();
}

function checkOpt(i) {
  if (revealed) return;
  revealed = true;
  attempted++;
  const q = filtered[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach((b, j) => {
    b.disabled = true;
    if (j === q.ans) b.classList.add("correct");
    else if (j === i) b.classList.add("wrong");
  });
  if (i === q.ans) correct++;
  document.getElementById("answerBox").classList.add("show");
  updateScore();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("answerBox").classList.add("show");
}

function next() {
  idx = (idx + 1) % filtered.length;
  render();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; correct = 0; attempted = 0;
  render();
}

function resetStats() {
  correct = 0; attempted = 0;
  updateScore();
}

function updateScore() {
  const sb = document.getElementById("scoreBar");
  if (attempted === 0) { sb.innerHTML = `<span class="score-pill">Attempt an MCQ to track your score</span>`; return; }
  const pct = Math.round((correct/attempted)*100);
  sb.innerHTML = `<span class="score-pill">MCQ score: <span>${correct}/${attempted}</span></span><span class="score-pill">Accuracy: <span>${pct}%</span></span>`;
}

init();
</script>
