  // MCQ
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which pathophysiological event initiates acute pancreatitis?",
   opts:["Bile reflux into the stomach","Premature activation of pancreatic enzymes within the pancreas itself","Autoimmune destruction of islets of Langerhans","Bacterial infection of the pancreatic duct"],
   ans:1,
   explain:"In acute pancreatitis, obstruction (most commonly a gallstone blocking the pancreatic duct) causes digestive enzymes (lipase, protease, amylase) to back up and become prematurely activated within the pancreas. This causes autodigestion (proteolysis and lipolysis of the pancreatic tissue), leading to inflammation, haemorrhage, oedema, and necrosis."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Approximately what proportion of hepatocellular carcinoma (HCC) cases have cirrhosis as a predisposing factor?",
   opts:["20%","50%","80%","100%"],
   ans:2,
   explain:"Around 80% of hepatocellular carcinoma cases occur in patients with underlying cirrhosis. Repeated hepatocyte death triggers rapid regeneration; the high rate of mitosis increases the probability of spontaneous oncogenic mutations. The remaining ~20% are associated with chronic viral hepatitis without established cirrhosis."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which substance, normally only produced by the fetal liver, is used as a tumour marker for hepatocellular carcinoma?",
   opts:["Carcinoembryonic antigen (CEA)","Alpha-fetoprotein (AFP)","CA-125","PSA"],
   ans:1,
   explain:"Malignant hepatocytes in HCC re-express alpha-fetoprotein (AFP), a protein normally synthesised only by the fetal liver. Elevated serum AFP is a key diagnostic and monitoring marker for HCC. CEA is used for colorectal cancer; CA-125 for ovarian cancer; PSA for prostate cancer."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"What is the key pathophysiological factor in gastro-oesophageal reflux disease (GORD)?",
   opts:["Hypersecretion of gastrin","Lower oesophageal sphincter (LOS) dysfunction","Delayed gastric acid production","Increased oesophageal peristalsis"],
   ans:1,
   explain:"The fundamental defect in GORD is dysfunction of the lower oesophageal sphincter (LOS). When the LOS loses tone or relaxes inappropriately, acidic gastric contents reflux into the oesophagus, which lacks a protective mucus layer, causing mucosal irritation and damage."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"In coeliac disease, which immunoreactive fragment of gluten triggers the autoimmune response?",
   opts:["Glutenin","Prolamin","Gliadin","Albumin"],
   ans:2,
   explain:"Gluten is partially digested in the gut, forming an immunoreactive fragment called gliadin. In susceptible individuals (carrying HLA-DQ2 or HLA-DQ8), gliadin crosses the intestinal mucosa, cross-links with tissue transglutaminase, and the complex is detected as antigenic, activating CD4+ T cells and triggering the autoimmune inflammatory response."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which HLA antigens are associated with susceptibility to coeliac disease?",
   opts:["HLA-B27","HLA-DR3 and HLA-DR4","HLA-DQ2 and HLA-DQ8","HLA-A2 and HLA-B8"],
   ans:2,
   explain:"Coeliac disease is strongly associated with HLA-DQ2 (present in ~90% of patients) and HLA-DQ8. These MHC class II molecules present gliadin peptides to CD4+ T cells, initiating the autoimmune inflammatory response that damages intestinal villi."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Cirrhosis causes jaundice primarily because:",
   opts:["The liver cannot store glycogen","Impaired bilirubin processing leads to accumulation in the blood","Portal hypertension causes skin discolouration","Reduced clotting factor production causes skin bleeding"],
   ans:1,
   explain:"Healthy hepatocytes conjugate bilirubin (a breakdown product of haemoglobin) for excretion in bile. In cirrhosis, hepatocyte function is severely impaired → unconjugated bilirubin accumulates in blood → deposits in skin and sclera → jaundice. Reduced clotting factors cause bruising, not jaundice."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Gallstones (cholelithiasis) most commonly form when:",
   opts:["Bile becomes too dilute","Cholesterol in bile becomes over-concentrated and precipitates","The cystic duct is too wide","Bile acid synthesis is excessive"],
   ans:1,
   explain:"Gallstones form when the gallbladder concentrates bile to the point where cholesterol (or other components such as calcium) becomes supersaturated and crystallises. These crystals aggregate into stones (choleliths) that can obstruct the cystic or common bile duct, causing cholecystitis or acute pancreatitis."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which clinical feature of cirrhosis is caused by an inability to clear ammonia and other toxins from the blood?",
   opts:["Ascites","Spider angiomas","Hepatic encephalopathy","Palmar erythema"],
   ans:2,
   explain:"The liver normally detoxifies ammonia (produced by gut bacteria metabolising protein) by converting it to urea. In cirrhosis, this capacity is lost → ammonia and other toxins accumulate in the blood → cross the blood-brain barrier → cause hepatic encephalopathy: confusion, drowsiness, slurred speech, and in severe cases, coma."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"In Crohn's disease, inflammation is described as transmural. This means:",
   opts:["Inflammation is confined to the mucosa only","All four layers of the intestinal wall are affected","Only the submucosa and serosa are involved","Only the muscularis layer is inflamed"],
   ans:1,
   explain:"Transmural means through all layers — Crohn's disease affects all four layers of the intestinal wall (mucosa, submucosa, muscularis propria, serosa). This contrasts with ulcerative colitis, where inflammation is superficial (confined to the mucosa). Transmural inflammation in Crohn's leads to fissures, fistulae, and abscess formation."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Hepatitis B virus (HBV) is primarily transmitted via:",
   opts:["Faecal-oral route","Airborne droplets","Body fluids including blood, semen, and vaginal secretions","Contaminated water"],
   ans:2,
   explain:"HBV is a blood-borne pathogen transmitted via body fluids: blood, saliva, semen, and vaginal secretions. Routes include sexual contact, vertical transmission (birth), sharing needles, and contaminated medical/dental procedures. This contrasts with Hepatitis A, which spreads via the faecal-oral route."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which enzyme produced by Helicobacter pylori allows it to survive the acidic gastric environment?",
   opts:["Lipase","Urease","Amylase","Protease"],
   ans:1,
   explain:"H. pylori survives in the acidic stomach by secreting urease, which converts urea into ammonia and CO2, creating a local alkaline microenvironment around the bacterium. This allows colonisation of the gastric mucosa, initiating the inflammatory process that leads to peptic ulcer disease."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Which sign of cholecystitis refers to pain in the right upper quadrant upon inspiration during deep palpation?",
   opts:["Rovsing's sign","Murphy's sign","Cullen's sign","Grey Turner's sign"],
   ans:1,
   explain:"Murphy's sign: the examiner palpates the right upper quadrant and asks the patient to breathe in; pain and inspiratory arrest on contact with the inflamed gallbladder is positive. It is a classic clinical sign of acute cholecystitis."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"Chronic pancreatitis most commonly leads to which endocrine complication?",
   opts:["Cushing's syndrome","Type 1 diabetes mellitus","Hyperaldosteronism","Acromegaly"],
   ans:1,
   explain:"Chronic inflammation and fibrosis in chronic pancreatitis progressively destroys the islets of Langerhans (including insulin-producing beta cells). Loss of beta cell mass leads to insulin deficiency and type 1 diabetes mellitus. Steatorrhoea (fatty diarrhoea) is the exocrine consequence (lipase deficiency)."},
  {topic:"Gastrointestinal", type:"MCQ",
   q:"The 'cobblestone appearance' seen in Crohn's disease is caused by:",
   opts:["Fat deposition in the submucosa","Deep ulcers (fissures) interspersed with areas of normal mucosa","Calcification of the bowel wall","Villous atrophy from immune damage"],
   ans:1,
   explain:"In Crohn's disease, deep transmural fissures alternate with areas of relatively normal mucosa, creating a cobblestone appearance of the intestinal lumen surface. This pattern is characteristic and visible on colonoscopy and imaging."},

  // SAQ
  {topic:"Gastrointestinal", type:"SAQ",
   q:"List four clinical manifestations of cirrhosis of the liver and explain why each occurs.",
   explain:"(1) Jaundice — impaired bilirubin conjugation by damaged hepatocytes → bilirubin accumulates in blood → deposits in skin/sclera. (2) Ascites — reduced albumin production lowers oncotic pressure; portal hypertension pushes fluid into peritoneal cavity. (3) Easy bruising/bleeding — liver synthesises clotting factors; cirrhosis reduces production → coagulopathy. (4) Hepatic encephalopathy — liver cannot detoxify ammonia → accumulates → crosses blood-brain barrier → confusion, drowsiness, slurred speech. Other acceptable answers: oedema, fatigue, spider angiomas, gynecomastia, palmar erythema."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Distinguish between acute and chronic pancreatitis: causes, key symptoms, and main complications.",
   explain:"Acute pancreatitis — Causes: gallstones (most common) blocking the pancreatic duct, alcohol. Key symptoms: severe epigastric pain radiating to back, fever, nausea/vomiting, tachycardia, hypotension, hypoxaemia. Complication: pancreatic necrosis, beta-cell damage → glucose imbalance. Chronic pancreatitis — Causes: chronic alcohol abuse. Key symptoms: persistent pain, weight loss, steatorrhoea (fatty stools from lipase deficiency). Complications: irreversible fibrosis and calcification, destruction of islets of Langerhans → Type 1 diabetes mellitus."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Describe the mechanism by which H. pylori causes peptic ulcer disease.",
   explain:"H. pylori colonises the gastric mucosa by secreting urease, which converts urea to ammonia, creating a local alkaline environment for survival. Once established: (1) Produces proteases and vacuolating cytotoxins that reduce mucosal thickness and damage epithelial cells. (2) Promotes secretion of pro-inflammatory cytokines. (3) Induces gastrin release → increased HCl secretion. (4) Inhibits somatostatin (a natural inhibitor of acid secretion). The combined effect is breakdown of the protective mucosal barrier and excessive acid exposure, leading to erosion of the mucosa >5mm deep — a peptic ulcer."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"List three clinical features of coeliac disease and explain the mechanism of malabsorption.",
   explain:"Clinical features: (1) Chronic diarrhoea — impaired absorption. (2) Weight loss and failure to thrive — malnutrition from malabsorption. (3) Abdominal distension and pain — gas from fermentation of unabsorbed nutrients. Mechanism of malabsorption: autoimmune response to gliadin causes CD4+ T-cell activation → inflammatory destruction of intestinal villi (villous atrophy). Flattened villi dramatically reduce the mucosal surface area available for absorption of nutrients, fat-soluble vitamins, and electrolytes, producing widespread malabsorption syndrome."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"What is cholecystitis? Name three causes other than gallstones.",
   explain:"Cholecystitis is inflammation of the gallbladder, caused most commonly by gallstones blocking the cystic duct and trapping bile. Other causes: (1) Bacterial infection in the biliary system — retrograde spread of bacteria. (2) Tumours of the pancreas or liver — obstruct bile drainage into the GI tract. (3) Reduced blood supply to the gallbladder — e.g. diabetic vasculopathy causing ischaemia. (4) Gallbladder sludge — thick material accumulating in pregnant women or during rapid weight loss."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"List four differences between Crohn's disease and ulcerative colitis.",
   explain:"(1) Location: Crohn's affects any part of the GI tract (most commonly the terminal ileum); UC is confined to the colon. (2) Depth of inflammation: Crohn's is transmural (all four layers); UC is superficial (mucosa only). (3) Distribution: Crohn's shows skip lesions (discontinuous); UC is continuous from the rectum proximally. (4) Complications: Crohn's causes fistulae, abscesses, and perianal disease; UC causes bloody diarrhoea and higher colorectal cancer risk than Crohn's."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"Name three pancreatic enzymes and the consequence of deficiency of each.",
   explain:"(1) Lipase — works with bile to digest dietary fat; deficiency → reduced absorption of fat and fat-soluble vitamins (A, D, E, K) → steatorrhoea (fatty bowel movements) and diarrhoea. (2) Protease — breaks down proteins and protects against pathogens in the intestines; deficiency → undigested proteins may trigger allergic reactions. (3) Amylase — breaks down starches into sugars for energy; deficiency → diarrhoea from undigested carbohydrates in the intestinal lumen."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"List five symptoms of cirrhosis and explain the underlying pathophysiology for each.",
   explain:"(1) Oedema — ↓albumin → ↓oncotic pressure → fluid leaks into interstitium. (2) Ascites — as above plus portal hypertension pushes fluid into peritoneal cavity. (3) Gynecomastia/menstrual changes — liver fails to metabolise sex hormones → accumulate → hormonal effects. (4) Spider angiomas and palmar erythema — excess oestrogen causes peripheral vasodilation and vascular proliferation. (5) Coagulopathy (easy bruising) — liver produces clotting factors (I, II, V, VII, IX, X); damage reduces synthesis → bleeding tendency."},
  {topic:"Gastrointestinal", type:"SAQ",
   q:"What is GORD? List three factors that normally prevent reflux and three factors that cause it.",
   explain:"GORD (Gastro-oesophageal Reflux Disease): reflux of gastric contents into the oesophagus sufficient to impair quality of life or cause mucosal damage. The key defect is lower oesophageal sphincter (LOS) dysfunction. Factors preventing reflux: (1) Gravity. (2) LOS pressure. (3) Adequate gastric emptying. Factors causing GORD: (1) LOS relaxation or loss of tone. (2) Delayed gastric emptying. (3) Increased intra-abdominal pressure (obesity, pregnancy, poor posture, smoking)."},

  // LAQ
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Describe the pathophysiological mechanism, clinical manifestations, complications, and management of cirrhosis of the liver.",
   explain:"Definition: Cirrhosis is extensive hepatic scarring (fibrosis) from chronic liver injury, causing disruption of the normal organised framework of hepatocytes, sinusoids, and canaliculi. Pathophysiology: chronic liver injury (from alcohol, viral hepatitis B/C, NAFLD) → repeated hepatocyte death → activation of hepatic stellate cells → collagen and fibrous tissue deposition → architectural distortion → portal hypertension (obstructed sinusoidal blood flow) → failed regeneration producing non-functional hepatocyte nodules → progressive loss of liver function. Often asymptomatic until >75% of liver is damaged. Clinical manifestations (arising from loss of liver function): jaundice (↓bilirubin conjugation), ascites and oedema (↓albumin → ↓oncotic pressure + portal hypertension), easy bleeding/bruising (↓clotting factor synthesis), fatigue, weight loss (impaired metabolism), pruritus, spider angiomas and palmar erythema (↑oestrogen), gynecomastia/amenorrhoea (impaired sex hormone metabolism), hepatic encephalopathy — confusion/coma (↓ammonia clearance → neurotoxicity). Complications: portal hypertension → oesophageal/gastric varices → haematemesis; bacterial peritonitis (infected ascitic fluid); bone disease (osteoporosis from ↓vitamin D activation); hepatorenal syndrome; hepatocellular carcinoma (~80% of HCC cases arise in cirrhotic livers). Management: Address cause — cease alcohol; antiviral therapy for hepatitis B/C. Lifestyle — low-salt diet (reduce fluid retention), increase protein intake (combat muscle wasting), stop smoking. Medications — diuretics (remove excess fluid/oedema); lactulose (reduce ammonia); reassess all drugs metabolised by liver. Monitoring — 6-monthly ultrasound and LFTs; vaccinate against HAV, HBV, influenza, pneumococcus. Transplantation — only curative option in end-stage cirrhosis."},
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Describe the pathophysiology of GORD, its complications, and principles of management.",
   explain:"Definition: GORD occurs when gastric contents reflux into the oesophagus causing symptoms or mucosal damage. Common in Western society (4–30% adults). Pathophysiology: the key defect is lower oesophageal sphincter (LOS) dysfunction — LOS loses tone or relaxes inappropriately → gastric acid refluxes into oesophagus → oesophageal mucosa lacks protective gastric mucus → acid-induced mucosal injury. LOS normally maintained by gravity, sphincter pressure, gastric emptying, diaphragm contraction, and oesophagogastric junction anatomy. Factors impairing LOS: altered neuromuscular control, delayed gastric emptying, obesity (↑intra-abdominal pressure), pregnancy (↑progesterone → ↓LOS tone + ↑intra-abdominal pressure), smoking, poor posture, large/acidic meals. Clinical features: heartburn, regurgitation, nausea, epigastric/chest pain, chronic cough, hoarseness, haematemesis. Complications: oesophagitis → mucosal ulceration → stricture formation; Barrett's oesophagus (metaplasia — columnar epithelium replaces squamous mucosa; pre-cancerous state); oesophageal adenocarcinoma; aspiration pneumonia (in children). Diagnosis: symptomatology; gastroscopy/OGD; capsular endoscopy; oesophageal manometry. Management: Lifestyle — smaller meals, avoid acidic/fatty foods, weight loss, elevate head of bed, stop smoking. Mild — antacids + histamine H2 receptor antagonists. Moderate/severe — proton pump inhibitors + prokinetics. Severe (Barrett's/stricture) — fundoplication surgery to reinforce LOS."},
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Describe the pathophysiology of coeliac disease, its clinical manifestations, diagnosis, and management.",
   explain:"Definition: Coeliac disease is an autoimmune condition triggered by gluten (a storage protein in wheat, rye, barley), causing immune-mediated damage to the small intestinal mucosa and malabsorption. Prevalence: ~1.2% males, 1.9% females; predominantly Caucasians; also common in India; rare in Africans and Chinese. Pathophysiology: gluten ingested → partially digested → forms immunoreactive fragment gliadin → in susceptible individuals (HLA-DQ2 or HLA-DQ8), intestinal mucosa becomes permeable to gliadin → gliadin cross-links with tissue transglutaminase → complex recognised as antigenic by antigen-presenting cells → CD4+ T cells activated → Th1 response produces IL-1, IFN-γ, TNF-α → chronic mucosal inflammation → progressive destruction of intestinal villi (villous atrophy) → dramatically reduced absorptive surface area → malabsorption syndrome. Anti-transglutaminase IgG antibodies also formed. Clinical manifestations (from malabsorption): chronic diarrhoea, weight loss, failure to thrive (children), abdominal distension and pain, anorexia, vomiting, malnutrition, electrolyte imbalance, glossitis, anaemia (Fe/B12/folate malabsorption), osteoporosis (Ca/Vit D malabsorption). Diagnosis: Serology — elevated serum IgA; anti-tissue transglutaminase antibodies; anti-gliadin antibodies. Tissue biopsy — villous atrophy and crypt hyperplasia (gold standard). HLA typing — HLA-DQ2/DQ8. Management: Lifelong strict gluten-free diet (avoid wheat, rye, barley; safe alternatives: corn, rice, quinoa, millet). Micronutrient supplementation (iron, B12, folate, calcium, vitamin D). Assess and manage osteoporosis. Severe cases: total parenteral nutrition; corticosteroids for refractory disease."},
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Compare and contrast Crohn's disease and ulcerative colitis, including pathophysiology, distribution, histology, clinical features, and management.",
   explain:"Both are chronic inflammatory bowel diseases (IBD) but differ significantly. Pathophysiology: Ulcerative colitis (UC) — autoimmune; reduced tolerance to normal bowel flora → enhanced immune response → superficial mucosal inflammation confined to the colon. Crohn's disease — mechanism less understood; loss of immune tolerance to GI bacterial antigens; transmural (full-thickness) inflammation that can affect any part of the GI tract. Distribution: UC — colon only; begins at anorectal margin and extends proximally in a continuous pattern. Crohn's — any part of GIT; most commonly terminal ileum; discontinuous (skip lesions); perianal disease common. Histology: UC — inflammation limited to mucosa; crypt abscesses; crypt distortion; loss of goblet cells. Crohn's — transmural inflammation; deep fissuring ulcers creating cobblestone appearance; fistulae; abscesses; granulomas; fibrosis from tissue repair. Clinical features: UC — bloody diarrhoea (hallmark), abdominal cramps, tenesmus; higher colorectal cancer risk. Crohn's — variable symptoms (pain, diarrhoea, weight loss); abscesses and fistulae common; anaemia; extra-intestinal manifestations (skin, liver, joints, mouth); lifelong disease with remissions and relapses; lower CRC risk than UC. Diagnosis (both): colonoscopy + biopsy; imaging (MRI/CT); raised CRP/ESR; blood (anaemia, leucocytosis). Management: UC — 5-ASA compounds; glucocorticoids; biological therapy (anti-TNF); colectomy is curative. Crohn's — glucocorticoids; methotrexate; azathioprine; biological therapy (anti-TNF, anti-α4β7 integrin); smoking cessation; surgery for complications (not curative). Shared — antidiarrhoeals; antispasmodics; TPN if severe; transfusion for anaemia."},
  {topic:"Gastrointestinal", type:"LAQ",
   q:"Explain how cirrhosis predisposes to hepatocellular carcinoma. Describe the pathological features of HCC and distinguish primary from secondary liver cancer.",
   explain:"Background: Hepatocellular carcinoma (HCC) is the most common primary liver cancer and a major cause of cancer death worldwide. Approximately 80% of HCC cases occur in patients with established cirrhosis. How cirrhosis predisposes to HCC: (1) Chronic liver injury causes repeated hepatocyte death. (2) The liver compensates through regeneration — surviving hepatocytes undergo repeated rapid mitosis (cell division) to replace lost cells. (3) The high rate of mitosis significantly increases the probability of spontaneous DNA replication errors and mutations. (4) These mutations can activate oncogenes (genes driving uncontrolled cell growth) or inactivate tumour suppressor genes. (5) Over time, accumulated mutations produce malignant hepatocytes that proliferate uncontrollably → HCC. The longer and more extensive the cirrhotic process, the greater the cumulative mutation risk. Other contributing factors: chronic HBV/HCV infection (viral DNA integrates into hepatocyte genome); alcohol-related carcinogenesis. Pathological features of HCC: Tumour morphology — may develop as a single mass, multiple nodules scattered throughout the liver, or diffuse infiltration. Alpha-fetoprotein (AFP) — malignant hepatocytes re-express this fetal protein; elevated serum AFP is a key diagnostic and monitoring marker. Local invasion — HCC can directly invade adjacent abdominal organs. Metastasis — spreads to regional lymph nodes and distant organs. Primary vs secondary liver cancer: Primary HCC — originates directly from hepatocytes; strongly associated with cirrhosis and chronic viral hepatitis; treated with resection, ablation, TACE, or transplantation. Secondary (metastatic) liver cancer — cancer originates in another organ (colon, breast, lung) and spreads to the liver via haematogenous or lymphatic routes; treatment must address both the primary tumour and hepatic deposits; generally carries worse prognosis."},

  {topic:"Renal", type:"SAQ",
   q:"Explain the role of 'hyperfiltration' in the progression of Chronic Kidney Disease (CKD).",
   opts:null, ans:null,
   explain:"In CKD, as nephrons are lost, the remaining functional nephrons increase their filtration load (hyperfiltration) to compensate. However, this increased pressure and flow lead to glomerular basement membrane damage, resulting in proteinuria and further glomerulosclerosis, accelerating the loss of nephrons."},
  {topic:"CVS", type:"SAQ",
   q:"Define an aneurysm and identify the most dangerous complication associated with it.",
   opts:null, ans:null,
   explain:"An aneurysm is a pathological dilation of a blood vessel wall, typically exceeding 1.5 times the normal diameter. The most severe complication is a rupture, which causes acute, life-threatening internal haemorrhage and high mortality."},
  {topic:"CVS", type:"SAQ",
   q:"Why is 'permissive hypotension' sometimes used in the emergency management of a ruptured aneurysm?",
   opts:null, ans:null,
   explain:"Permissive hypotension is used to avoid over-resuscitation with IV fluids. By keeping blood pressure relatively low, clinicians aim to minimise further bleeding from the site of the rupture while maintaining minimal perfusion to vital organs."},
  {topic:"CVS", type:"LAQ",
   q:"Describe the 'vicious cycle' of heart failure, focusing on the neurohormonal compensatory mechanisms (SNS and RAAS) and how they eventually worsen the condition.",
   opts:null, ans:null,
   explain:"When the heart fails, cardiac output (CO) decreases. This triggers compensatory mechanisms: (1) The Sympathetic Nervous System (SNS) increases heart rate and contractility to maintain CO. (2) The Renin-Angiotensin-Aldosterone System (RAAS) is activated, causing vasoconstriction and sodium/water retention to increase blood volume. While these help initially, chronic activation leads to increased afterload and preload, which increases myocardial oxygen demand and workload. This results in myocardial remodelling (hypertrophy and dilatation), which further impairs the heart's ability to pump, creating a progressive downward spiral."},
  {topic:"CVS", type:"LAQ",
   q:"Discuss Virchow's Triad of Deep Vein Thrombosis (DVT) and provide two clinical examples of risk factors for each category of the triad.",
   opts:null, ans:null,
   explain:"Virchow's Triad describes the three primary factors leading to DVT: (1) Venous Stasis — slowed blood flow. Examples: prolonged bed rest/immobility and long-distance travel. (2) Endothelial Injury — damage to the vessel wall. Examples: trauma/fractures and surgical procedures. (3) Hypercoagulability — increased tendency of the blood to clot. Examples: malignancy (cancer) and use of oral contraceptives or pregnancy."},
  {topic:"CVS", type:"LAQ",
   q:"Explain the cellular cascade of a Myocardial Infarction (MI), including the timelines for reversible and irreversible changes.",
   opts:null, ans:null,
   explain:"The cellular cascade of MI follows a predictable sequence driven by cessation of oxygen delivery to cardiac myocytes. Timeline: 0–2 min — aerobic metabolism stops; ATP falls; loss of contractility within 60 sec (cells still viable). 2–20 min — anaerobic glycolysis produces lactic acid and intracellular acidosis (still potentially reversible with reperfusion). 20–40 min — irreversible injury begins; myocyte necrosis starts in the subendocardium and moves as a 'wavefront' toward the epicardium. 1–6 hrs — progressive necrosis; majority of at-risk myocardium irreversibly damaged by 6 hrs without intervention. Cellular cascade: (1) Ischaemia/Hypoxia — coronary occlusion halts the electron transport chain in mitochondria. (2) Anaerobic Metabolism — inefficient ATP production; lactic acid lowers intracellular pH and inhibits cellular enzymes. (3) Failure of Ion Pumps — ATP depletion causes Na+/K+ ATPase failure; sodium accumulates → osmotic water entry → cellular swelling (blebbing). (4) Calcium Overload — Ca2+ pump failure → cytosolic Ca2+ influx → activates proteases (cytoskeleton breakdown) and phospholipases (membrane damage). (5) Mitochondrial Dysfunction — mitochondria swell; release cytochrome c and pro-apoptotic factors into cytoplasm. (6) Membrane Rupture and Necrosis — plasma membrane loses integrity → intracellular proteins (Troponin T, Troponin I, CK-MB) leak into bloodstream → used as diagnostic biomarkers."},

];

const TOPICS_ALL = ["All", ...new Set(QUESTIONS.map(q => q.topic))];
let filtered = [...QUESTIONS];
let idx = 0;
let revealed = false;
let correct = 0, attempted = 0;
let activeTopic = "All";
let activeType = "All";

function init() {
  const nav = document.getElementById("topicNav");
  nav.innerHTML = TOPICS_ALL.map(t =>
    `<button class="topic-btn${t==="All"?" active":""}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">${t}</button>`
  ).join("");
  render();
}

function setTopic(t) {
  activeTopic = t;
  applyFilters();
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
}

function setType(t) {
  activeType = t;
  applyFilters();
  document.querySelectorAll(".type-btn").forEach(b => b.classList.toggle("active", b.textContent === t));
}

function applyFilters() {
  filtered = QUESTIONS.filter(q => {
    const topicMatch = activeTopic === "All" || q.topic === activeTopic;
    const typeMatch  = activeType  === "All" || q.type  === activeType;
    return topicMatch && typeMatch;
  });
  idx = 0; correct = 0; attempted = 0;
  render();
}

function render() {
  const q = filtered[idx];
  document.getElementById("qNum").textContent = `Question ${idx+1} of ${filtered.length}`;
  document.getElementById("qType").className = `q-type type-${q.type}`;
  document.getElementById("qType").textContent = q.type;
  document.getElementById("qTopic").textContent = q.topic;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("progFill").style.width = `${Math.round(((idx+1)/filtered.length)*100)}%`;

  const ab = document.getElementById("answerBox");
  ab.innerHTML = `<strong>Model answer</strong>${q.explain}`;
  ab.className = "answer-box";
  revealed = false;

  const optsDiv = document.getElementById("opts");
  if (q.opts) {
    optsDiv.innerHTML = q.opts.map((o,i) =>
      `<button class="opt" onclick="checkOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join("");
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("hint").textContent = "Select the best answer.";
  } else {
    optsDiv.innerHTML = "";
    document.getElementById("revealBtn").style.display = "inline-block";
    document.getElementById("hint").textContent = q.type === "LAQ" ? "Draft your full essay answer before revealing." : "Try to recall key points before revealing the model answer.";
  }
  updateScore();
}

function checkOpt(i) {
  if (revealed) return;
  revealed = true;
  attempted++;
  const q = filtered[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach((b, j) => {
    b.disabled = true;
    if (j === q.ans) b.classList.add("correct");
    else if (j === i) b.classList.add("wrong");
  });
  if (i === q.ans) correct++;
  document.getElementById("answerBox").classList.add("show");
  updateScore();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("answerBox").classList.add("show");
}

function next() {
  idx = (idx + 1) % filtered.length;
  render();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; correct = 0; attempted = 0;
  render();
}

function resetStats() {
  correct = 0; attempted = 0;
  updateScore();
}

function updateScore() {
  const sb = document.getElementById("scoreBar");
  if (attempted === 0) { sb.innerHTML = `<span class="score-pill">Attempt an MCQ to track your score</span>`; return; }
  const pct = Math.round((correct/attempted)*100);
  sb.innerHTML = `<span class="score-pill">MCQ score: <span>${correct}/${attempted}</span></span><span class="score-pill">Accuracy: <span>${pct}%</span></span>`;
}

init();
</script>
</body>
</html>
